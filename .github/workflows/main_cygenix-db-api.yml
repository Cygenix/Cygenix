name: Deploy cygenix-db-api v3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: azure-function
        run: npm install

      - name: Zip with node_modules included
        working-directory: azure-function
        run: zip -r ../function.zip . -x "*.md" -x "local.settings.json" -x ".git/*"

      - name: Verify zip contents
        run: unzip -l function.zip | grep -E "host.json|package.json|index.js|node_modules" | head -20

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy via Azure CLI
        run: |
          az functionapp deployment source config-zip \
            --resource-group Cygenix_UK \
            --name cygenix-db-api \
            --src function.zip
