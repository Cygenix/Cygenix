name: Deploy cygenix-db-api to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: azure-function
        run: npm install --omit=dev

      - name: Zip from inside azure-function folder
        working-directory: azure-function
        run: zip -r ../function.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy via Azure CLI
        run: |
          az functionapp deployment source config-zip \
            --resource-group Cygenix_UK \
            --name cygenix-db-api \
            --src function.zip \
            --build-remote true
