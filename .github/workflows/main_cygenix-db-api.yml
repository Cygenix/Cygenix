name: Deploy cygenix-db-api v3
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: azure-function
        run: npm install

      - name: Zip with node_modules included
        working-directory: azure-function
        run: zip -r ../function.zip . -x "*.md" -x "local.settings.json" -x ".git/*"

      # Sanity check the zip BEFORE deploying. If project-summary-document/index.js
      # is missing or has the wrong content, fail the workflow loudly here rather
      # than letting the deploy succeed-but-not-update.
      - name: Verify project-summary-document is in zip
        run: |
          echo "=== Zip root listing (first 25 entries, no node_modules) ==="
          unzip -l function.zip | grep -v "node_modules" | grep -v "/$" | head -25
          echo
          echo "=== project-summary-document/index.js header ==="
          unzip -p function.zip project-summary-document/index.js | head -3 \
            || (echo "ERROR: project-summary-document/index.js missing from zip" && exit 1)
          echo
          echo "=== Confirming @azure/cosmos is bundled ==="
          unzip -l function.zip | grep "@azure/cosmos/package.json" \
            || (echo "ERROR: @azure/cosmos not in zip — npm install probably failed" && exit 1)

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      # Deploy to Flex Consumption.
      #
      # Why NOT `az functionapp deployment source config-zip`:
      #   That command targets the legacy Kudu /api/zipdeploy endpoint, which
      #   doesn't exist on Flex Consumption. The CLI returns success because
      #   the call queues, but the running app is never replaced. This is the
      #   "green workflow, identical bytes in production" failure mode that
      #   wasted a deploy cycle on this repo.
      #
      # Azure/functions-action@v1 detects Flex and uses the correct
      # /api/publish OneDeploy endpoint, then waits for the worker to swap
      # in. It also handles the post-deploy restart, so the explicit
      # `az functionapp restart` step is no longer needed.
      - name: Deploy to Azure Functions (Flex-aware)
        uses: Azure/functions-action@v1
        with:
          app-name: cygenix-db-api
          package: function.zip
