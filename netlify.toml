[build]
  publish = "public"
  functions = "netlify/functions"

[[edge_functions]]
  path = "/api/analyse"
  function = "analyse"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/db"
  to = "/.netlify/functions/db-connect"
  status = 200
