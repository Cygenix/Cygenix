<!-- Site-wide theme overrides (Financial palette + future themes).
     Must load BEFORE the pre-paint script below so its CSS variables
     are available the moment data-theme is set. -->
<link rel="stylesheet" href="/cygenix-theme.css">
<!-- Theme pre-paint: reads the user's saved theme and applies it to <html>
     BEFORE any content renders, preventing a flash of the wrong theme.
     Reads from cygenix_app_prefs (same key the Settings page writes to). -->
<script>
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('cygenix_app_prefs') || '{}');
    var t = p.theme || 'light';
    // One-time migration to the Oracle light default: upgrade the old
    // 'dark' default to light. Users can re-pick any theme in Settings.
    if (!p.themeOracleMigrated) {
      if (t === 'dark') { t = 'light'; p.theme = 'light'; }
      p.themeOracleMigrated = true;
      try { localStorage.setItem('cygenix_app_prefs', JSON.stringify(p)); } catch(_e){}
    }
    if (t === 'auto') {
      t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', t);
  } catch (_) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222733;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#55606E;
  --accent:#4A5BD6;--accent-glow:rgba(74,91,214,0.15);
  --green:#22c97a;--green-bg:rgba(34,201,122,0.1);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);
  --red:#f04646;--red-bg:rgba(240,70,70,0.1);
  --teal:#17827C;--teal-bg:rgba(23,130,124,0.1);
  --purple:#6B4E8E;--purple-bg:rgba(107,78,142,0.1);
  --serif:'IBM Plex Sans','Helvetica Neue',Arial,sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:10px;--r-lg:14px;
}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-left:230px;transition:padding-left 0.2s ease}
body.cyg-collapsed{padding-left:54px}

body.cyg-nav-active{padding-left:230px}
body.cyg-nav-active.cyg-collapsed{padding-left:54px}
body.cyg-nav-active .topbar{left:230px;right:0}
body.cyg-nav-active.cyg-collapsed .topbar{left:54px}
@media(max-width:768px){
  body.cyg-nav-active{padding-left:230px}
  body.cyg-nav-active.cyg-collapsed{padding-left:54px}
  body.cyg-nav-active .topbar{left:230px}
  body.cyg-nav-active.cyg-collapsed .topbar{left:54px}
}

.topbar{position:fixed;top:0;right:0;left:230px;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;border-bottom:0.5px solid var(--border);background:var(--bg2);z-index:100;gap:0.75rem;transition:left 0.2s ease}
body.cyg-collapsed .topbar{left:54px}

.topbar-title{font-size:13px;color:var(--accent);font-weight:500;flex-shrink:0;display:flex;align-items:center;gap:0.5rem}
.topbar-title svg{width:16px;height:16px}
.topbar-pill{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border-radius:999px;background:var(--accent-glow);color:var(--accent);border:1px solid var(--border2)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s,transform .05s;line-height:1}
.btn:hover:not(:disabled){background:var(--bg4);border-color:var(--border2)}
.btn:active:not(:disabled){transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:#5d97ff;border-color:#5d97ff}
.btn-green{background:var(--green);border-color:var(--green);color:#082014}
.btn-green:hover:not(:disabled){background:#3ed98a}
.btn-ghost{background:transparent}
.btn-danger{background:transparent;border-color:rgba(240,70,70,.4);color:var(--red)}
.btn-danger:hover:not(:disabled){background:var(--red-bg);border-color:var(--red)}

.page{padding:72px 2rem 4rem;width:100%}
.page-inner{max-width:1400px;margin:0 auto}

.hero{margin-bottom:1.5rem}
.hero h1{font-family:var(--serif);font-weight:600;font-size:24px;letter-spacing:-0.01em;margin:0 0 0.4rem;display:flex;align-items:center;gap:0.65rem}
.hero h1 svg{width:24px;height:24px;color:var(--accent)}
.hero p{color:var(--text2);font-size:13.5px;line-height:1.55;max-width:720px;margin:0}

.stage{margin-top:1.25rem}

.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.5rem 1.5rem 1.25rem;margin-bottom:1rem}

.field{margin-bottom:1.1rem}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
.field .hint{font-size:11.5px;color:var(--text3);margin-top:0.35rem;line-height:1.5}
.form-input,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:9px 12px;font-family:inherit;font-size:13px;transition:border-color .15s,background .15s}
.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--accent);background:var(--bg4)}
.form-textarea{min-height:96px;resize:vertical;line-height:1.55;font-family:var(--serif)}

/* Source → Target preview */
.conn-flow{display:grid;grid-template-columns:1fr auto 1fr;gap:0.75rem;align-items:stretch}
@media(max-width:600px){.conn-flow{grid-template-columns:1fr}.conn-arrow{transform:rotate(90deg);margin:0 auto}}
.conn-card{padding:0.85rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);min-height:64px;display:flex;flex-direction:column;justify-content:center}
.conn-card-missing{border-style:dashed;border-color:rgba(245,158,11,0.4)}
.conn-role{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:0.3rem;display:flex;align-items:center;gap:6px}
.conn-role .conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.conn-card-missing .conn-role .conn-dot{background:var(--amber)}
.conn-label{font-size:13px;color:var(--text);font-weight:500;word-break:break-word;font-family:var(--mono)}
.conn-card-missing .conn-label{color:var(--amber);font-style:italic;font-weight:400;font-family:var(--serif)}
.conn-arrow{display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px;padding:0 0.4rem}

.notice{padding:0.85rem 1rem;background:var(--amber-bg);border:1px solid rgba(245,158,11,0.3);border-radius:var(--r);font-size:12.5px;color:var(--text);line-height:1.55;margin:1rem 0}
.notice strong{color:var(--amber)}
.notice a{color:var(--accent);text-decoration:none;margin-left:6px}
.notice a:hover{text-decoration:underline}

.budget-row{display:flex;align-items:center;gap:0.85rem;padding:0.7rem 0.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);font-size:12.5px}
.budget-row strong{color:var(--text);font-weight:600;font-family:var(--mono);font-size:14px}
.budget-row span{color:var(--text2)}

.actions{display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1.25rem}

/* ── New: Source overview + action card layout ────────────── */
.setup-grid{display:grid;grid-template-columns:1.45fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:1100px){.setup-grid{grid-template-columns:1fr}}

.panel{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;display:flex;flex-direction:column}
.panel-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:0 0 0.85rem}

.map-frame{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;height:340px}
.map-frame svg{width:100%;height:100%;display:block}
.map-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;padding:1.25rem;text-align:center;color:var(--text3);font-size:12px;line-height:1.5}
.map-overlay .spinner{margin-bottom:0.3rem}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-top:0.85rem}
.stat-tile{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0.6rem 0.75rem}
.stat-num{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text)}
.stat-num.warn{color:var(--amber)}
.stat-num.muted{color:var(--text3)}
.stat-lbl{font-size:10.5px;color:var(--text2);margin-top:2px;letter-spacing:0.02em}

.descriptor{margin-top:0.85rem;font-size:12.5px;color:var(--text2);line-height:1.55}
.descriptor code{font-family:var(--mono);font-size:11.5px;color:var(--text);background:var(--bg3);padding:1px 5px;border-radius:3px}

.action-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0.95rem 1rem;cursor:pointer;text-align:left;color:inherit;font-family:inherit;display:flex;flex-direction:column;gap:0.35rem;transition:border-color .15s,background .15s;width:100%}
.action-card:hover{border-color:var(--accent);background:var(--bg4)}
.action-card.active{border-color:var(--accent);background:var(--accent-glow);box-shadow:inset 0 0 0 1px var(--accent)}
.action-card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:0.45rem}
.action-card-title svg{width:14px;height:14px;color:var(--accent);flex-shrink:0}
.action-card-desc{font-size:11.5px;color:var(--text2);line-height:1.5}
.action-card-meta{font-size:10.5px;color:var(--text3);font-family:var(--mono);margin-top:0.15rem}

.action-card-controls{display:none;margin-top:0.6rem}
.action-card.active .action-card-controls{display:block}
.action-card-controls label{display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.3rem}
.action-card-controls select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:inherit;font-size:12.5px}
.action-card-controls select:focus{outline:none;border-color:var(--accent)}

/* ── Group carousel (NEW) ───────────────────────────────────────── */
.carousel-wrap{position:relative}
.carousel-empty{padding:2.5rem 1rem;text-align:center;color:var(--text3);font-size:12.5px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r)}
.carousel-track-wrap{position:relative;overflow:hidden;border-radius:var(--r)}
.carousel-track{display:flex;gap:0.85rem;overflow-x:auto;scroll-behavior:smooth;scroll-snap-type:x mandatory;padding:0.4rem 0.4rem 0.85rem;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.carousel-track::-webkit-scrollbar{height:6px}
.carousel-track::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.group-card{flex:0 0 280px;scroll-snap-align:start;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.05rem 0.9rem;cursor:pointer;text-align:left;color:inherit;font-family:inherit;display:flex;flex-direction:column;gap:0.5rem;transition:border-color .15s,background .15s,transform .12s;min-height:230px}
.group-card:hover{border-color:var(--accent);background:var(--bg4);transform:translateY(-2px)}
.group-card.active{border-color:var(--accent);background:var(--accent-glow);box-shadow:inset 0 0 0 1px var(--accent)}
.group-card-head{display:flex;align-items:center;gap:0.5rem}
.group-card-icon{font-size:18px;line-height:1;flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.group-card-name{font-size:13.5px;font-weight:600;color:var(--text)}
.group-card-stats{display:flex;flex-wrap:wrap;gap:0.45rem;font-size:10.5px;color:var(--text2);font-family:var(--mono)}
.group-card-stats .stat{background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:4px;white-space:nowrap}
.group-card-stats .stat.warn{color:var(--amber);border-color:rgba(245,158,11,0.25)}
.group-card-tables{flex:1;display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--text2);font-family:var(--mono);overflow:hidden}
.group-card-tables .row{display:flex;justify-content:space-between;gap:0.5rem;line-height:1.45}
.group-card-tables .row .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.group-card-tables .row .rows{color:var(--text3);flex-shrink:0}
.group-card-tables .more{color:var(--text3);font-size:10.5px;margin-top:2px}
.group-card-action{margin-top:auto;padding:7px 10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.group-card-action:hover{background:#5d97ff}
.group-card.active .group-card-action{background:#fff;color:var(--accent)}
.carousel-fade{position:absolute;top:0;bottom:0;width:36px;pointer-events:none;z-index:2;transition:opacity .2s}
.carousel-fade.left{left:0;background:linear-gradient(to right,var(--bg2),transparent)}
.carousel-fade.right{right:0;background:linear-gradient(to left,var(--bg2),transparent)}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;transition:background .15s,transform .12s;font-family:inherit;font-size:14px;line-height:1}
.carousel-arrow:hover:not(:disabled){background:var(--bg4);transform:translateY(-50%) scale(1.06)}
.carousel-arrow:disabled{opacity:0.35;cursor:not-allowed}
.carousel-arrow.prev{left:-4px}
.carousel-arrow.next{right:-4px}

/* ── Criteria panel (NEW) ───────────────────────────────────────── */
.criteria-loading{display:flex;align-items:center;gap:0.5rem;padding:1rem 0.4rem;color:var(--text2);font-size:12.5px}
.criteria-error{padding:0.85rem 1rem;background:rgba(240,70,70,0.08);border:1px solid rgba(240,70,70,0.3);border-radius:var(--r);color:var(--text2);font-size:12px;margin-bottom:0.85rem}
.criteria-list{display:flex;flex-direction:column;gap:0.55rem;margin-bottom:0.85rem}
.criterion{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0.7rem 0.9rem;display:flex;flex-direction:column;gap:0.4rem;transition:border-color .15s,background .15s}
.criterion.active{border-color:var(--accent);background:var(--accent-glow)}
.criterion-head{display:flex;align-items:flex-start;gap:0.6rem}
.criterion-toggle{flex-shrink:0;margin-top:2px;width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:bold;line-height:1;padding:0;transition:background .15s,border-color .15s}
.criterion.active .criterion-toggle{background:var(--accent);border-color:var(--accent)}
.criterion-body{flex:1;min-width:0}
.criterion-label{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.criterion-reason{font-size:11.5px;color:var(--text2);margin-top:2px;line-height:1.45}
.criterion-evidence{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.35rem}
.criterion-evidence .ev{font-size:10px;color:var(--text3);font-family:var(--mono);background:var(--bg);border:1px solid var(--border);padding:1px 6px;border-radius:3px}
.criterion-controls{margin-top:0.5rem;padding-top:0.5rem;border-top:0.5px dashed var(--border);display:none}
.criterion.active .criterion-controls{display:block}
.criterion-controls .row{display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;font-size:12px}
.criterion-controls .row label{font-size:11px;color:var(--text2);min-width:40px}
.criterion-controls input[type="date"],
.criterion-controls input[type="text"]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-family:inherit;font-size:12px;flex:1;min-width:100px}
.criterion-controls input[type="date"]:focus,
.criterion-controls input[type="text"]:focus{outline:none;border-color:var(--accent)}
.criterion-controls .enum-options{display:flex;flex-wrap:wrap;gap:0.35rem}
.criterion-controls .enum-opt{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s}
.criterion-controls .enum-opt.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.criterion-bool-row{font-size:11.5px;color:var(--text2)}
.criterion-bool-row strong{color:var(--text)}
.criteria-empty{padding:1rem;background:var(--bg3);border:1px dashed var(--border);border-radius:var(--r);color:var(--text2);font-size:12px;text-align:center;margin-bottom:0.85rem}
.tighten-row{margin-top:0.85rem}
.tighten-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.35rem;display:flex;justify-content:space-between;align-items:center}
.tighten-label .hint{font-size:10.5px;text-transform:none;letter-spacing:0;color:var(--text3);font-weight:400}
.tighten-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r);font-family:var(--mono);font-size:12px;line-height:1.5;resize:vertical;min-height:54px;box-sizing:border-box}
.tighten-input:focus{outline:none;border-color:var(--accent)}

/* ── Dependency panel (NEW) ─────────────────────────────────────── */
.dep-list{display:flex;flex-direction:column;gap:0.55rem;margin-bottom:0.85rem}
.dep-row{display:flex;gap:0.65rem;padding:0.7rem 0.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);align-items:flex-start}
.dep-icon{flex-shrink:0;font-size:18px;line-height:1;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.dep-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.dep-name{font-size:13px;font-weight:600;color:var(--text)}
.dep-meta{font-size:11px;font-weight:400;color:var(--text3);font-family:var(--mono)}
.dep-summary{font-size:11.5px;color:var(--text2);line-height:1.4}
.dep-fill{margin-top:3px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.dep-fill-bar{height:100%;background:var(--accent);transition:width 0.3s}
.dep-rec-hint{font-size:11.5px;color:var(--text3);font-style:italic;margin-bottom:0.6rem;padding:0 0.2rem}

.dep-choices{display:flex;flex-direction:column;gap:0.4rem}
.dep-choice{display:flex;align-items:flex-start;gap:0.6rem;padding:0.7rem 0.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .15s,background .15s}
.dep-choice:hover{border-color:var(--accent);background:var(--bg4)}
.dep-choice.active{border-color:var(--accent);background:var(--accent-glow);box-shadow:inset 0 0 0 1px var(--accent)}
.dep-choice input[type="radio"]{margin-top:3px;flex-shrink:0;accent-color:var(--accent)}

<script>
// Sidebar width mirror — same pattern as sql-editor.html
(function mirrorSidebarWidth(){
  function findSidebarEl(){
    const candidates = [
      document.getElementById('cyg-sidebar'),
      document.querySelector('.cyg-sidebar'),
      document.getElementById('cyg-sidebar-mount')
    ].filter(Boolean);
    return candidates.find(el => el.offsetWidth > 0) || candidates[0];
  }
  function sync(width){
    const shouldCollapse = width > 0 && width <= 80;
    document.body.classList.toggle('cyg-collapsed', shouldCollapse);
  }
  function attach(){
    const el = findSidebarEl();
    if (!el) { setTimeout(attach, 50); return; }
    requestAnimationFrame(() => sync(el.offsetWidth));
    if (typeof ResizeObserver !== 'undefined'){
      const ro = new ResizeObserver(entries => {
        for (const entry of entries) sync(entry.contentRect.width);
      });
      ro.observe(el);
    } else {
      setInterval(() => sync(el.offsetWidth), 200);
    }
  }
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', attach);
  } else {
    attach();
  }
})();
</script>

<script>
(function () {
  'use strict';

  const API_BASE  = 'https://cygenix-db-api-e4fng7a4edhydzc4.uksouth-01.azurewebsites.net/api';
  const FUNC_CODE = 'UfQpm2qJuc0lWIbYwtGUm_k6ys_FDEquCma-KCPl_e8rAzFu5qfwbA==';
  const POLL_INTERVAL_MS = 1500;
  const STORAGE_KEY = 'cygenix_agentive_migration';

  function buildApiUrl(path) {
    const sep = path.includes('?') ? '&' : '?';
    return `${API_BASE}${path}${sep}code=${FUNC_CODE}`;
  }

  const state = {
    currentRunId: null,
    polling: null,
    lastSeq: 0,
    featureEnabled: null,
    conns: { source: null, target: null },
    view: 'loading',

    // Source schema fetched from /agent/source-schema. null = not yet
    // loaded, 'pending' = in flight, object = loaded. The shape matches
    // the endpoint's response: { groups: [...], totals: {...} }.
    sourceSchema: null,
    sourceSchemaError: null,

    // Which source card is expanded (showing its table list with checkboxes
    // and per-table target matches). Only one open at a time.
    expandedSourceGroup: null,
    sourceGroupSearch: {},      // { [groupId]: 'fuzzy search text' }

    // Source-driven scope building. The user's picks are pairs
    // (sourceTable -> targetTable). Each entry: { source, target,
    // confidence, reason }. The set IS the scope's pair list when saved.
    // Map keyed by source fullName so a re-pick replaces the prior target.
    pickedPairs: new Map(),     // sourceFullName -> {source,target,confidence,reason}

    // Which source row currently has its "Change target" picker open.
    // null = none. When set, a small inline candidate list is shown.
    openTargetPicker: null,     // source fullName (string)
    targetPickerSearch: '',     // active search text in the open picker

    // Target-mode plan against the configured target connection.
    // null = none generated yet, 'pending' = generating, object = loaded.
    // STILL NEEDED — even in source-driven mode we use the plan for
    // FK closure when saving the scope, and as the candidate pool for
    // the heuristic's target table list.
    plan: null,
    planError: null,

    // Bucket cards derived from plan levels (DEMOTED to "Advanced" panel
    // — these now live behind a toggle, available for users who want to
    // add specific target tables that have no source counterpart).
    buckets: [],
    showAdvancedTargets: false, // toggle for the advanced panel

    // Which bucket card is currently expanded (showing its table list).
    // null = none expanded; only the card view is visible. Per-bucket
    // search text lives in bucketSearch keyed by bucket key.
    expandedBucket: null,
    bucketSearch: {},     // { [bucketKey]: 'fuzzy search text' }

    // Cross-bucket "Find a table" search. Empty string = picker hidden.
    // When non-empty, a list of matching tables across ALL buckets is
    // shown at the top of the cards section.
    globalSearch: '',

    // Standalone target tables picked from the Advanced panel (not via
    // a source pair). These get added as scope roots WITHOUT a paired
    // source. Used for things like seeding a 3E lookup table that has
    // no source data behind it.
    pickedStandaloneTargets: new Set(),
    savedScope: null,

    // Scopes available for this project (loaded from /api/agent/scope).
    scopeList: [],
  };

  const stage = document.getElementById('am-stage');

  // ── Auth ──────────────────────────────────────────────────────
  async function getAuthToken() {
    try {
      if (window.cygenixGetAccessToken) return await window.cygenixGetAccessToken();
      if (window.msalInstance) {
        const accounts = window.msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          const result = await window.msalInstance.acquireTokenSilent({
            scopes: ['openid', 'profile'], account: accounts[0],
          });
          return result.idToken;
        }
      }
    } catch (e) { console.warn('[AgentiveMigration] auth token unavailable', e); }
    return null;
  }

  class ApiNotImplementedError extends Error {
    constructor(path) {
      super(`Backend endpoint ${path} is not deployed yet`);
      this.name = 'ApiNotImplementedError';
      this.path = path;
    }
  }

  function getActiveUserId() {
    try {
      const entraStr = localStorage.getItem('cygenix_entra_account')
                    || sessionStorage.getItem('cygenix_entra_account');
      if (entraStr) {
        const a = JSON.parse(entraStr);
        if (a && (a.email || a.username || a.preferred_username)) {
          return a.email || a.username || a.preferred_username;
        }
      }
      const userStr = sessionStorage.getItem('cygenix_user')
                   || localStorage.getItem('cygenix_user');
      if (userStr) {
        const u = JSON.parse(userStr);
        if (u && u.email) return u.email;
      }
      const active = localStorage.getItem('cygenix_active_user');
      if (active) return active;
    } catch (e) {
      console.warn('[AgentiveMigration] could not resolve user id:', e.message);
    }
    return null;
  }

  async function api(path, options = {}) {
    const userId = getActiveUserId();
    const headers = {
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    };
    if (userId) headers['x-user-id'] = userId;

    const url = buildApiUrl(path);

    let res;
    try {
      res = await fetch(url, { ...options, headers });
    } catch (e) {
      throw new Error(`Network error calling ${path}: ${e.message}`);
    }

    const contentType = res.headers.get('content-type') || '';
    const isJson = contentType.includes('application/json');

    if (res.status === 404 || !isJson) {
      throw new ApiNotImplementedError(path);
    }
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error(`${res.status} ${res.statusText}: ${text.slice(0, 300)}`);
    }
    return res.json();
  }

  // ── Feature gate ──────────────────────────────────────────────
  async function checkFeatureEnabled() {
    try {
      const me = await api('/me');
      const tenantOn = me.tenant && me.tenant.agentiveMigrationEnabled === true;
      const userOn = me.user && me.user.aiAgentiveEnabled === true;
      state.featureEnabled = tenantOn && userOn;
    } catch (e) {
      console.warn('[AgentiveMigration] /me failed, assuming enabled for dev:', e.message);
      state.featureEnabled = true;
    }
  }

  // ── Connections ───────────────────────────────────────────────
  function readConnections() {
    const hasGlobal = (typeof CygenixConnections !== 'undefined');
    const hasGet = hasGlobal && typeof CygenixConnections.get === 'function';
    if (!hasGlobal || !hasGet) {
      console.warn('[AgentiveMigration] CygenixConnections not yet ready', { hasGlobal, hasGet });
      return { source: null, target: null };
    }
    let c;
    try {
      c = CygenixConnections.get() || {};
    } catch (e) {
      console.warn('[AgentiveMigration] CygenixConnections.get() threw:', e.message);
      return { source: null, target: null };
    }

    // Honour the explicit *ConnMode flag rather than guessing from which
    // field happens to be populated. Previously this guessed mode by field
    // presence, which would mis-label a target whose mode was 'azure' but
    // whose tgtFnUrl had not yet been populated (and vice versa). The
    // mode flag is the source of truth — the field values are derived.
    let source = null;
    if (c.srcConnMode === 'azure' && c.srcFnUrl) {
      source = { label: describeFnUrl(c.srcFnUrl), kind: 'azure' };
    } else if (c.srcConnMode === 'direct' && c.srcConnString) {
      source = { label: describeConnString(c.srcConnString), kind: 'direct' };
    } else if (c.srcFnUrl) {
      // Fall-through for legacy data without an explicit mode flag.
      source = { label: describeFnUrl(c.srcFnUrl), kind: 'azure' };
    } else if (c.srcConnString) {
      source = { label: describeConnString(c.srcConnString), kind: 'direct' };
    }
    let target = null;
    if (c.tgtConnMode === 'azure' && c.tgtFnUrl) {
      target = { label: describeFnUrl(c.tgtFnUrl), kind: 'azure' };
    } else if (c.tgtConnMode === 'direct' && c.tgtConnString) {
      target = { label: describeConnString(c.tgtConnString), kind: 'direct' };
    } else if (c.tgtFnUrl) {
      target = { label: describeFnUrl(c.tgtFnUrl), kind: 'azure' };
    } else if (c.tgtConnString) {
      target = { label: describeConnString(c.tgtConnString), kind: 'direct' };
    }
    return { source, target };
  }

  function describeConnString(s) {
    if (!s) return 'Configured connection';

    // mssql://USER:PASS@HOST:PORT/DBNAME — parse with URL for cleanliness.
    // Strip credentials so we never show user/password to the user.
    if (/^mssql:\/\//i.test(s)) {
      try {
        const u = new URL(s);
        const host = decodeURIComponent(u.hostname);
        const port = u.port ? `:${u.port}` : '';
        const db   = decodeURIComponent((u.pathname || '/').slice(1));
        if (host && db) return `${db} on ${host}${port}`;
        if (host) return `${host}${port}`;
        if (db)   return db;
      } catch { /* fall through to ADO.NET parsing */ }
    }

    // ADO.NET / SqlClient format: "Server=X;Database=Y;..." or "Data Source=X;Initial Catalog=Y;..."
    const server   = (s.match(/(?:Server|Data Source)\s*=\s*([^;]+)/i) || [])[1];
    const database = (s.match(/(?:Database|Initial Catalog)\s*=\s*([^;]+)/i) || [])[1];
    if (server && database) return `${database.trim()} on ${server.trim()}`;
    if (server)   return server.trim();
    if (database) return database.trim();
    return 'Configured connection';
  }

  function describeFnUrl(url) {
    try { const u = new URL(url); return `Azure Function · ${u.hostname.split('.')[0]}`; }
    catch { return 'Azure Function endpoint'; }
  }

  let connWatcher = null;
  function startConnectionWatcher() {
    if (connWatcher) clearInterval(connWatcher);
    connWatcher = setInterval(() => {
      if (state.view !== 'setup') return;
      const next = readConnections();
      const connsChanged =
        (!!next.source) !== (!!state.conns.source) ||
        (!!next.target) !== (!!state.conns.target) ||
        (next.source && state.conns.source && next.source.label !== state.conns.source.label) ||
        (next.target && state.conns.target && next.target.label !== state.conns.target.label);
      if (connsChanged) {
        state.conns = next;
        // Connections changed — the previously-generated plan no longer
        // applies. Drop everything plan/scope-related and re-render. The
        // user can regenerate the plan against the new target.
        state.plan = null;
        state.planError = null;
        state.buckets = [];
        state.pickedStandaloneTargets = new Set();
        state.pickedPairs = new Map();
        state.openTargetPicker = null;
        state.targetPickerSearch = '';
        state.sourceSchema = null;
        state.sourceSchemaError = null;
        state.expandedSourceGroup = null;
        state.sourceGroupSearch = {};
        state.expandedBucket = null;
        state.bucketSearch = {};
        state.globalSearch = '';
        state.savedScope = null;
        autoMatchCache = {};
        renderSetup();
        // Kick off fresh schema loads
        if (state.conns.source) loadSourceSchema(true);
      }
    }, 4000);
  }
  function stopConnectionWatcher() {
    if (connWatcher) { clearInterval(connWatcher); connWatcher = null; }
  }

  // ── Persistence ───────────────────────────────────────────────
  function saveActiveRun(runId) {
    try {
      const userKey = (localStorage.getItem('cygenix_active_user') || 'anon');
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      data[userKey] = { runId, savedAt: Date.now() };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) { /* ignore */ }
  }
  function loadActiveRun() {
    try {
      const userKey = (localStorage.getItem('cygenix_active_user') || 'anon');
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const entry = data[userKey];
      if (entry && Date.now() - entry.savedAt < 24 * 60 * 60 * 1000) return entry.runId;
    } catch (e) { /* ignore */ }
    return null;
  }
  function clearActiveRun() {
    try {
      const userKey = (localStorage.getItem('cygenix_active_user') || 'anon');
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      delete data[userKey];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) { /* ignore */ }
  }

  // ── Helpers ───────────────────────────────────────────────────
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function setTopbarStatus(text) {
    const el = document.getElementById('topbar-status');
    if (el) el.textContent = text || '';
  }

  function formatRows(n) {
    if (n == null) return '';
    if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
    return String(n);
  }

  // ── Plan, scope, and bucket logic (NEW — phase 1 of UI rework) ────────
  //
  // The new flow replaces the source-side semantic-group carousel with
  // target-mode planning + scope selection. The user:
  //   1. Sees a plan (auto-generated against the target) split into 5
  //      thematic buckets in load order (reference → master → setup →
  //      transactions → details).
  //   2. Clicks bucket cards to add their tables to a working scope.
  //   3. Names and saves the scope; the agent runs against it.
  //
  // No source-side introspection happens client-side any more. The agent
  // does that work inside its run, anchored by the scope.

  // Fixed bucket definitions. Level boundaries derived empirically against
  // a 3E target; refine later if needed. See agent-dependency-planner-3e-
  // noise-patterns.md for noise-table handling.
  const BUCKET_DEFS = [
    { key: 'reference', label: 'Reference data',          range: [0, 0],
      description: 'Lookup tables, currencies, country codes, status codes' },
    { key: 'master',    label: 'Master entities',         range: [1, 3],
      description: 'Top-level entities: Entity, Client, Matter, Timekeeper' },
    { key: 'setup',     label: 'Configuration & setup',   range: [4, 8],
      description: 'Bank accounts, billing rates, fee arrangements, security' },
    { key: 'transactions', label: 'Transactions',         range: [9, 15],
      description: 'Bills, time entries, costs, trust receipts, payments' },
    { key: 'details',   label: 'Details & audit',         range: [16, 999],
      description: 'Child detail tables and audit history' }
  ];

  // Generate (or regenerate) a target plan. Caches the result in state.plan.
  // Calls the planner with the user's TARGET connection — the planner reads
  // ── Source-driven helpers (Piece C) ────────────────────────────────────
  //
  // Load the source schema once on page mount. The endpoint returns 5
  // pre-classified themed groups (Matters & Cases, Contacts & People,
  // Financial Data, Time & Activity, Other), each with a tables array.
  async function loadSourceSchema(force) {
    if (!force && state.sourceSchema && state.sourceSchema !== 'pending') return;
    if (!state.conns.source) {
      state.sourceSchemaError = 'Source connection not configured.';
      renderSetup();
      return;
    }
    state.sourceSchema = 'pending';
    state.sourceSchemaError = null;
    renderSetup();

    let body = {};
    try {
      const c = (typeof CygenixConnections !== 'undefined' && CygenixConnections.get)
        ? (CygenixConnections.get() || {}) : {};
      const srcMode = c.srcConnMode === 'azure' ? 'azure' : 'direct';
      if (srcMode === 'direct' && c.srcConnString) body.srcConnString = c.srcConnString;
      else if (srcMode === 'azure' && c.srcFnUrl) {
        body.srcFnUrl = c.srcFnUrl;
        if (c.srcFnKey) body.srcFnKey = c.srcFnKey;
      } else {
        state.sourceSchema = null;
        state.sourceSchemaError = 'Source connection is missing required fields.';
        renderSetup();
        return;
      }
    } catch (e) {
      state.sourceSchema = null;
      state.sourceSchemaError = 'Could not read source connection: ' + e.message;
      renderSetup();
      return;
    }
    try {
      const data = await api('/agent/source-schema', { method: 'POST', body: JSON.stringify(body) });
      state.sourceSchema = data;
      // Once both source schema and plan are loaded, auto-run the heuristic
      // for every source table so candidates are already computed by the
      // time the user clicks open a card. Re-runs are cheap; the function
      // is pure JS.
      maybeComputeAutoMatches();
      renderSetup();
    } catch (e) {
      state.sourceSchema = null;
      state.sourceSchemaError = e.message || 'Schema introspection failed.';
      renderSetup();
    }
  }

  // ── Source-to-target heuristic (inline copy of lib/source-to-target-
  // heuristic.js, kept here so the page is single-file deployable). ──────
  const ABBREV_EXPANSIONS = {
    matt: 'matter', mtr: 'matter', cli: 'client', tkpr: 'timekeeper',
    tkp: 'timekeeper', addr: 'address', addl: 'additional',
    info: 'information', org: 'organisation', wip: 'workinprogress',
    chrg: 'charge', spv: 'supervisor', prlf: 'profile',
    recv: 'receive', rcpt: 'receipt'
  };
  function htNormalize(s) {
    return String(s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  }
  function htStripDm(name) {
    return name.replace(/_DM$/i, '').replace(/_dm$/i, '');
  }
  function htExpand(name) {
    const parts = name.replace(/([A-Z])/g, ' $1').trim().split(/\s+/);
    return parts.map(p => {
      const k = p.toLowerCase();
      if (ABBREV_EXPANSIONS[k]) {
        const r = ABBREV_EXPANSIONS[k];
        return r.charAt(0).toUpperCase() + r.slice(1);
      }
      return p;
    }).join('');
  }
  function htFuzzy(query, candidate) {
    const q = htNormalize(query), c = htNormalize(candidate);
    if (!q || !c)        return 0;
    if (c === q)         return 1.0;
    if (c.includes(q))   return 0.85 - Math.min(0.3, (c.length - q.length) / c.length * 0.3);
    if (q.includes(c))   return 0.50 + 0.32 * (c.length / q.length);
    let qi = 0, ci = 0, runs = 0, last = -2;
    while (ci < c.length && qi < q.length) {
      if (c[ci] === q[qi]) {
        if (ci !== last + 1) runs++;
        last = ci; qi++;
      }
      ci++;
    }
    if (qi !== q.length) return 0;
    const cov = q.length / c.length;
    const coh = 1 - (runs - 1) / Math.max(q.length - 1, 1);
    return Math.max(0, Math.min(0.65, 0.4 * cov + 0.25 * coh));
  }
  function matchSourceToTarget(sourceName, targetNames, opts) {
    opts = opts || {};
    const topK = opts.topK || 5;
    const minConf = opts.minConfidence || 0.3;
    const sShort = sourceName.split('.').pop();
    const sStrip = htStripDm(sShort);
    const sExp   = htExpand(sStrip);
    const cands = [];
    for (const tgt of targetNames) {
      const tShort = tgt.split('.').pop();
      let s = 0, reason = null;
      if (tShort === sShort) { s = 1.0; reason = 'exact match'; }
      else if (tShort.toLowerCase() === sStrip.toLowerCase()) { s = 0.95; reason = '_DM stripped'; }
      else if (tShort.toLowerCase() === sExp.toLowerCase()) { s = 0.80; reason = 'abbreviations expanded'; }
      else {
        const s1 = htFuzzy(sStrip, tShort);
        const s2 = htFuzzy(sExp, tShort);
        if (s1 >= s2 && s1 > 0) { s = s1; reason = 'fuzzy (_DM stripped)'; }
        else if (s2 > 0)        { s = s2; reason = 'fuzzy (expanded)'; }
      }
      if (s >= minConf) cands.push({ target: tgt, confidence: s, reason });
    }
    cands.sort((a, b) => b.confidence - a.confidence || a.target.localeCompare(b.target));
    return { sourceTable: sourceName, candidates: cands.slice(0, topK), top: cands[0] || null };
  }
  function confidenceBucket(score) {
    if (score >= 0.90) return 'high';
    if (score >= 0.60) return 'medium';
    if (score >= 0.30) return 'low';
    return 'none';
  }

  // Cache of pre-computed match results keyed by source fullName.
  // Populated by maybeComputeAutoMatches() once source schema + plan are
  // both loaded; cleared when either changes.
  let autoMatchCache = {};
  function maybeComputeAutoMatches() {
    autoMatchCache = {};
    if (!state.sourceSchema || state.sourceSchema === 'pending') return;
    if (!Array.isArray(state.buckets) || state.buckets.length === 0)  return;
    // Build flat target list (all non-noise tables across all buckets)
    const targetNames = [];
    for (const b of state.buckets) {
      for (const t of b.tables) targetNames.push(t.fullName);
    }
    const groups = (state.sourceSchema && state.sourceSchema.groups) || [];
    for (const g of groups) {
      for (const t of (g.tables || [])) {
        autoMatchCache[t.fullName] = matchSourceToTarget(t.fullName, targetNames);
      }
    }
  }

  // Toggle a source table's pair status. If currently unpicked, auto-match
  // is used to pick the top candidate; user can change target via the
  // picker dropdown. If picked, removes the pair entirely.
  function togglePairPick(sourceFullName) {
    if (state.pickedPairs.has(sourceFullName)) {
      state.pickedPairs.delete(sourceFullName);
      // Also close target-picker if it was open on this source
      if (state.openTargetPicker === sourceFullName) {
        state.openTargetPicker = null;
        state.targetPickerSearch = '';
      }
    } else {
      const match = autoMatchCache[sourceFullName];
      if (match && match.top) {
        state.pickedPairs.set(sourceFullName, {
          source:     sourceFullName,
          target:     match.top.target,
          confidence: match.top.confidence,
          reason:     match.top.reason
        });
      } else {
        // No auto-match — add with empty target, force-open the picker so
        // the user must choose.
        state.pickedPairs.set(sourceFullName, {
          source:     sourceFullName,
          target:     '',
          confidence: 0,
          reason:     'manual'
        });
        state.openTargetPicker = sourceFullName;
        state.targetPickerSearch = '';
      }
    }
    state.savedScope = null;
    renderSetup();
  }

  function setPairTarget(sourceFullName, targetFullName, confidence, reason) {
    if (!state.pickedPairs.has(sourceFullName)) return;
    state.pickedPairs.set(sourceFullName, {
      source:     sourceFullName,
      target:     targetFullName,
      confidence: typeof confidence === 'number' ? confidence : 1.0,
      reason:     reason || 'manual override'
    });
    state.openTargetPicker = null;
    state.targetPickerSearch = '';
    state.savedScope = null;
    renderSetup();
  }

  function openTargetPickerFor(sourceFullName) {
    state.openTargetPicker = state.openTargetPicker === sourceFullName ? null : sourceFullName;
    state.targetPickerSearch = '';
    renderSetup();
  }

  // Combined picked target tables: pair targets ∪ standalone picks. Used as
  // the scope's rootTables when saving.
  function collectPickedTargets() {
    const set = new Set();
    for (const p of state.pickedPairs.values()) {
      if (p.target) set.add(p.target);
    }
    for (const t of state.pickedStandaloneTargets) set.add(t);
    return [...set];
  }

  // Toggle expansion of a source group card. Closes others (only one open).
  function expandSourceGroup(groupId) {
    state.expandedSourceGroup = (state.expandedSourceGroup === groupId) ? null : groupId;
    state.sourceGroupSearch[groupId] = state.sourceGroupSearch[groupId] || '';
    renderSetup();
  }

  function setSourceGroupSearch(groupId, value) {
    state.sourceGroupSearch[groupId] = value || '';
    renderSetup();
    Promise.resolve().then(() => {
      const el = document.getElementById('am-srcgroup-search-' + groupId);
      if (el) { el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
    });
  }

  function visibleSourceTables(group) {
    const q = (state.sourceGroupSearch[group.id] || '').trim().toLowerCase();
    if (!q) return [...(group.tables || [])].sort((a, b) => a.name.localeCompare(b.name));
    // Cheap substring filter — source-side lists are small (max ~25)
    return (group.tables || []).filter(t =>
      t.name.toLowerCase().includes(q) || t.fullName.toLowerCase().includes(q)
    );
  }

  // ── Target-mode plan (kept; needed for FK closure and as candidate pool
  // for the source-to-target heuristic). ────────────────────────────────
  // Generate (or regenerate) a target plan. Caches the result in state.plan.
  // Calls the planner with the user's TARGET connection — the planner reads
  async function loadOrCreatePlan(force) {
    if (!force && state.plan && state.plan.planId) return;
    if (!state.conns.target) {
      state.planError = 'Target connection not configured.';
      renderSetup();
      return;
    }
    state.plan = 'pending';
    state.planError = null;
    renderSetup();

    let body = {};
    body.projectId = getActiveProjectId();
    try {
      const c = (typeof CygenixConnections !== 'undefined' && CygenixConnections.get)
        ? (CygenixConnections.get() || {}) : {};
      const tgtMode = c.tgtConnMode === 'azure' ? 'azure' : 'direct';
      if (tgtMode === 'direct' && c.tgtConnString) {
        body.tgtConnString = c.tgtConnString;
      } else {
        // Plan only supports direct conn strings today; flag for the user.
        state.plan = null;
        state.planError = 'Target plan requires a direct connection string. Azure-function-mode targets are not yet supported by the planner.';
        renderSetup();
        return;
      }
    } catch (e) {
      state.plan = null;
      state.planError = 'Could not read target connection: ' + e.message;
      renderSetup();
      return;
    }

    try {
      const plan = await api('/agent/plan', {
        method: 'POST',
        body: JSON.stringify(body)
      });
      if (!plan || !plan.planId) {
        state.plan = null;
        state.planError = 'Planner did not return a plan id.';
        renderSetup();
        return;
      }
      state.plan = plan;
      // Fetch each level's table list so we can populate buckets. Levels
      // come from agent_plan_levels. We pull them all up front since they're
      // already cached server-side and we need the full list for buckets.
      const levelCount = (plan.overview && plan.overview.summary && plan.overview.summary.totalLevels) || 0;
      const levelDocs = [];
      for (let i = 0; i < levelCount; i++) {
        try {
          const lvl = await api(`/agent/plan/${plan.planId}/level/${i}`);
          levelDocs.push(lvl);
        } catch (e) {
          // A level fetch failure shouldn't kill the whole flow; just skip
          // that level — its tables won't appear in any bucket but the
          // overall plan/cards still work.
          console.warn(`Could not fetch plan level ${i}:`, e.message);
        }
      }
      state.buckets = buildBuckets(plan, levelDocs);
      // Buckets now contain the full target table list — recompute the
      // heuristic for every source table.
      maybeComputeAutoMatches();
      renderSetup();
    } catch (e) {
      state.plan = null;
      state.planError = e.message || 'Plan generation failed.';
      renderSetup();
    }
  }

  // Curated list of 3E target tables that should ALWAYS land in the
  // "Master entities" bucket regardless of their FK depth in the plan.
  //
  // Why this is needed: the planner topo-sorts by FK dependencies, which
  // pushes 3E core entities like Client and Matter down to Level 11+ because
  // they reference many lookup tables. From a consultant's mental model
  // those ARE master files, not transactions — so we override the
  // level-based bucket assignment for known master entities.
  //
  // List intentionally short and conservative. Tables not on this list are
  // bucketed by level as before. Extend this list as patterns emerge.
  const MASTER_ENTITY_OVERRIDES = new Set([
    // 3E top-level entities
    'Client', 'Matter', 'Entity', 'Timekeeper', 'NMaster',
    'Vendor', 'Office', 'Department', 'PracticeArea', 'PracticeGroup',
    'Industry', 'Region',
    // First-class entity extensions
    'ClientAdditionalInfo', 'MatterAdditionalInfo',
    'Site', 'Address', 'Phone', 'Email', 'Relate',
    // Common 3E master configurations consultants treat as master data
    'BillTo', 'TaxCode', 'BankAcct'
  ]);

  // Build the 5 buckets from the plan's levels. Each bucket gets the set of
  // non-noise tables that fall in its level range, sorted by load level.
  // Tables matching MASTER_ENTITY_OVERRIDES are FORCED into the 'master'
  // bucket regardless of their level.
  function buildBuckets(plan, levelDocs) {
    const buckets = BUCKET_DEFS.map(def => ({
      key:         def.key,
      label:       def.label,
      description: def.description,
      range:       def.range,
      tables:      [],
      totalRows:   0
    }));
    const masterBucket = buckets.find(b => b.key === 'master');
    for (const lvl of levelDocs) {
      if (!lvl || !Array.isArray(lvl.tables)) continue;
      for (const t of lvl.tables) {
        if (t.isNoise) continue;     // hide noise from bucket cards
        const tableEntry = {
          fullName: t.fullName,
          schema:   t.schema,
          name:     t.name,
          rows:     t.rows || 0,
          level:    lvl.level
        };
        // Override: if the table name matches a known master entity, force
        // it into the master bucket regardless of level.
        const targetBucket = MASTER_ENTITY_OVERRIDES.has(t.name)
          ? masterBucket
          : buckets.find(b => lvl.level >= b.range[0] && lvl.level <= b.range[1]);
        if (!targetBucket) continue;
        targetBucket.tables.push(tableEntry);
        targetBucket.totalRows += (t.rows || 0);
      }
    }
    return buckets;
  }

  // ── Bucket expansion / table-level picking ─────────────────────────────
  //
  // Cards are a filter/browser, not the unit of selection. Clicking a card
  // expands it to reveal its table list with checkboxes and fuzzy search.
  // Selection happens per-table. The scope's root tables are the union of
  // ticked table names.

  function expandBucket(bucketKey) {
    // Toggle: clicking the same expanded card closes it.
    state.expandedBucket = (state.expandedBucket === bucketKey) ? null : bucketKey;
    renderSetup();
  }

  // Advanced-panel standalone target picking. These operate on the target
  // bucket cards (now demoted behind the "Add standalone target" toggle).
  // For source-driven picks, see togglePairPick above.
  function toggleTablePick(fullName) {
    if (state.pickedStandaloneTargets.has(fullName)) {
      state.pickedStandaloneTargets.delete(fullName);
    } else {
      state.pickedStandaloneTargets.add(fullName);
    }
    state.savedScope = null;
    renderSetup();
  }

  function selectAllVisibleInBucket(bucketKey) {
    const bucket = state.buckets.find(b => b.key === bucketKey);
    if (!bucket) return;
    const visible = visibleTablesForBucket(bucket);
    for (const t of visible) state.pickedStandaloneTargets.add(t.fullName);
    state.savedScope = null;
    renderSetup();
  }

  function deselectAllVisibleInBucket(bucketKey) {
    const bucket = state.buckets.find(b => b.key === bucketKey);
    if (!bucket) return;
    const visible = visibleTablesForBucket(bucket);
    for (const t of visible) state.pickedStandaloneTargets.delete(t.fullName);
    state.savedScope = null;
    renderSetup();
  }

  // Combined Set: every target that is part of the scope, whether it came
  // via a source pair or as a standalone advanced pick. Used by the bucket
  // UI's per-row checkboxes and counters.
  function allPickedTargets() {
    const set = new Set(state.pickedStandaloneTargets);
    for (const p of state.pickedPairs.values()) {
      if (p.target) set.add(p.target);
    }
    return set;
  }

  // Fuzzy-score a single (name, fullName) pair against a lowercase query.
  // Returns a positive score for a match, or null for no match.
  //   - Substring on name (highest), score boosted for earlier match position
  //   - Subsequence (chars of q appear in order in name), score penalised by
  //     how scattered the matched chars are
  function fuzzyScore(name, fullName, q) {
    const lname = name.toLowerCase();
    const lfq   = fullName.toLowerCase();
    if (lname.includes(q) || lfq.includes(q)) {
      const pos = lname.indexOf(q);
      return 1000 + (pos === -1 ? 50 : (50 - Math.min(pos, 50)));
    }
    // Subsequence match against name
    let ni = 0, qi = 0, runs = 0, lastIdx = -2;
    while (ni < lname.length && qi < q.length) {
      if (lname[ni] === q[qi]) {
        if (ni !== lastIdx + 1) runs++;
        lastIdx = ni;
        qi++;
      }
      ni++;
    }
    if (qi === q.length) return 500 - runs * 10;
    return null;
  }

  // Apply the per-bucket fuzzy search filter. Returns the bucket's tables
  // ordered by how strongly they match (when searching) or by load level
  // then name (when not).
  function visibleTablesForBucket(bucket) {
    const q = (state.bucketSearch[bucket.key] || '').trim().toLowerCase();
    if (!q) {
      return [...bucket.tables].sort((a, b) =>
        a.level - b.level || a.name.localeCompare(b.name)
      );
    }
    const scored = [];
    for (const t of bucket.tables) {
      const s = fuzzyScore(t.name, t.fullName, q);
      if (s !== null) scored.push({ t, score: s });
    }
    scored.sort((a, b) => b.score - a.score || a.t.name.localeCompare(b.t.name));
    return scored.map(s => s.t);
  }

  // Cross-bucket search: scan every bucket's tables and return matches with
  // their bucket key attached so the UI can show "table · bucket · level".
  function visibleTablesGlobal() {
    const q = (state.globalSearch || '').trim().toLowerCase();
    if (!q) return [];
    const scored = [];
    for (const bucket of state.buckets) {
      for (const t of bucket.tables) {
        const s = fuzzyScore(t.name, t.fullName, q);
        if (s !== null) {
          scored.push({ t, bucket: bucket.key, bucketLabel: bucket.label, score: s });
        }
      }
    }
    scored.sort((a, b) => b.score - a.score || a.t.name.localeCompare(b.t.name));
    return scored;
  }

  function setGlobalSearch(value) {
    state.globalSearch = value || '';
    renderSetup();
    // Restore focus on the input — same focus-after-rerender trick as
    // setBucketSearch.
    Promise.resolve().then(() => {
      const el = document.getElementById('am-global-search');
      if (el) {
        el.focus();
        const len = el.value.length;
        el.setSelectionRange(len, len);
      }
    });
  }

  function collectPickedTables() {
    // Returns every target table that should be in the scope's root list:
    // pair targets ∪ standalone advanced picks.
    return collectPickedTargets();
  }

  // For the scope panel summary: which buckets contain at least one picked
  // target? Used to give a friendly summary like "3 buckets · 42 tables".
  function pickedBucketCount() {
    const picked = allPickedTargets();
    if (picked.size === 0) return 0;
    let count = 0;
    for (const b of state.buckets) {
      for (const t of b.tables) {
        if (picked.has(t.fullName)) { count++; break; }
      }
    }
    return count;
  }

  function setBucketSearch(bucketKey, value) {
    state.bucketSearch[bucketKey] = value;
    renderSetup();
    // Restore focus on the search input — renderSetup rebuilds the DOM so
    // we lose focus by default. Use a microtask to ensure the element exists.
    Promise.resolve().then(() => {
      const el = document.getElementById('am-bucket-search-' + bucketKey);
      if (el) {
        el.focus();
        // Put cursor at end
        const len = el.value.length;
        el.setSelectionRange(len, len);
      }
    });
  }

  async function saveScope(name) {
    const cleanName = (name || '').trim();
    if (!cleanName) { alert('Please enter a name for this scope.'); return; }
    if (!state.plan || !state.plan.planId) { alert('No plan loaded.'); return; }
    const rootTables = collectPickedTables();
    if (rootTables.length === 0) {
      alert('Pick at least one source table (or one standalone target in the advanced section) before saving the scope.');
      return;
    }

    // Pairs to send to the backend. Only include pairs with a non-empty target.
    const incompletePairs = [];
    const completePairs   = [];
    for (const p of state.pickedPairs.values()) {
      if (!p.target) incompletePairs.push(p.source);
      else completePairs.push({
        source: p.source, target: p.target,
        confidence: typeof p.confidence === 'number' ? p.confidence : null,
        reason: p.reason || null
      });
    }
    if (incompletePairs.length > 0) {
      alert('Some picked source tables have no target chosen yet:\n\n' +
            incompletePairs.map(s => '  • ' + s).join('\n') +
            '\n\nClick "Pick target" on each of those rows, or untick them.');
      return;
    }

    // Step 1: create / update the scope, including the pairs
    const description = completePairs.length > 0
      ? `${completePairs.length} source→target pair${completePairs.length === 1 ? '' : 's'}`
        + (state.pickedStandaloneTargets.size > 0
            ? ` + ${state.pickedStandaloneTargets.size} standalone target${state.pickedStandaloneTargets.size === 1 ? '' : 's'}`
            : '')
      : `${rootTables.length} standalone targets`;
    const created = await api('/agent/scope', {
      method: 'POST',
      body: JSON.stringify({
        projectId:         getActiveProjectId() || 'default',
        name:              cleanName,
        description,
        rootTables,
        sourceTargetPairs: completePairs
      })
    });
    if (!created || !created.scope) { alert('Save failed.'); return; }

    // Step 2: expand FK closure against the current plan
    const expanded = await api('/agent/scope/expand', {
      method: 'POST',
      body: JSON.stringify({
        scopeId: created.scope.scopeId,
        planId:  state.plan.planId,
        includeChildren: false
      })
    });
    if (!expanded || !expanded.scope) { alert('Scope save succeeded but expansion failed.'); return; }
    state.savedScope = expanded.scope;
    await loadScopeList();
    renderSetup();
  }

  async function loadScopeList() {
    try {
      const projId = getActiveProjectId();
      const r = await api('/agent/scope?projectId=' + encodeURIComponent(projId || ''));
      state.scopeList = (r && r.scopes) || [];
    } catch (e) {
      console.warn('Could not load scope list:', e.message);
      state.scopeList = [];
    }
  }

  async function selectScope(scopeId) {
    if (!scopeId) {
      // Clear any selection — go back to building from cards.
      state.savedScope = null;
      state.pickedPairs = new Map();
      state.pickedStandaloneTargets = new Set();
      renderSetup();
      return;
    }
    try {
      const scope = await api('/agent/scope/' + encodeURIComponent(scopeId));
      if (!scope || !scope.scopeId) return;
      state.savedScope = scope;
      // Re-hydrate the picks from the saved scope so the UI reflects what
      // the agent will run against. Pairs come from sourceTargetPairs;
      // standalone targets are roots that aren't the target of any pair.
      const pairs = Array.isArray(scope.sourceTargetPairs) ? scope.sourceTargetPairs : [];
      const pairTargets = new Set(pairs.map(p => p.target));
      state.pickedPairs = new Map();
      for (const p of pairs) {
        state.pickedPairs.set(p.source, {
          source: p.source, target: p.target,
          confidence: typeof p.confidence === 'number' ? p.confidence : null,
          reason: p.reason || null
        });
      }
      state.pickedStandaloneTargets = new Set(
        (scope.rootTables || []).filter(t => !pairTargets.has(t))
      );
      renderSetup();
    } catch (e) {
      console.warn('Could not load scope:', e.message);
    }
  }

  // Cross-bucket picker: a search box that finds tables across ALL buckets,

    const shown = results.slice(0, CAP);

    let listHtml = '';

      listHtml = shown.map(({ t, bucket, bucketLabel }) => {

        return `

            <div style="font-size:10.5px;color:var(--accent);background:var(--accent-glow);padding:2px 8px;border-radius:999px;flex-shrink:0">${escapeHtml(bucketLabel)}</div>

    const overflowNote = (q && results.length > CAP)
      ? `<div style="padding:0.55rem 0.85rem;background:var(--amber-bg);border:1px solid rgba(245,158,11,0.3);border-radius:var(--r);font-size:11.5px;color:var(--text2);margin-top:0.5rem">
           Showing first ${CAP} of ${results.length} matches. Narrow your search to see the rest.
         </div>`

    const summary = q
      ? `<div style="font-size:11.5px;color:var(--text3);margin-top:4px">

      : `<div style="font-size:11.5px;color:var(--text3);margin-top:4px">

         </div>`;

            <div class="panel-title" style="margin-bottom:0.35rem">Find a table</div>
