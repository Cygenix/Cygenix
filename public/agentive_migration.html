<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222733;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --accent:#3d7eff;--accent-glow:rgba(61,126,255,0.15);
  --green:#22c97a;--green-bg:rgba(34,201,122,0.1);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);
  --red:#f04646;--red-bg:rgba(240,70,70,0.1);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.1);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.1);
  --serif:'Syne',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:8px;--r-lg:12px;
}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-left:230px;transition:padding-left 0.2s ease}
body.cyg-collapsed{padding-left:54px}

/* Override /nav.js padding (same pattern sql-editor.html uses) */
body.cyg-nav-active{padding-left:230px}
body.cyg-nav-active.cyg-collapsed{padding-left:54px}
body.cyg-nav-active .topbar{left:230px;right:0}
body.cyg-nav-active.cyg-collapsed .topbar{left:54px}
@media(max-width:768px){
  body.cyg-nav-active{padding-left:230px}
  body.cyg-nav-active.cyg-collapsed{padding-left:54px}
  body.cyg-nav-active .topbar{left:230px}
  body.cyg-nav-active.cyg-collapsed .topbar{left:54px}
}

.topbar{position:fixed;top:0;right:0;left:230px;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;border-bottom:0.5px solid var(--border);background:var(--bg2);z-index:100;gap:0.75rem;transition:left 0.2s ease}
body.cyg-collapsed .topbar{left:54px}

.topbar-title{font-size:13px;color:var(--accent);font-weight:500;flex-shrink:0;display:flex;align-items:center;gap:0.5rem}
.topbar-title svg{width:16px;height:16px}
.topbar-pill{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border-radius:999px;background:var(--accent-glow);color:var(--accent);border:1px solid var(--border2)}

/* Buttons (matching sql-editor.html conventions) */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s,transform .05s;line-height:1}
.btn:hover:not(:disabled){background:var(--bg4);border-color:var(--border2)}
.btn:active:not(:disabled){transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:#5d97ff;border-color:#5d97ff}
.btn-green{background:var(--green);border-color:var(--green);color:#082014}
.btn-green:hover:not(:disabled){background:#3ed98a}
.btn-ghost{background:transparent}
.btn-danger{background:transparent;border-color:rgba(240,70,70,.4);color:var(--red)}
.btn-danger:hover:not(:disabled){background:var(--red-bg);border-color:var(--red)}

/* Page content area — sits beneath fixed topbar. Spans the full available
   width (sidebar already shrinks the body), matching how other pages render.
   Cards inside cap at a comfortable reading width so they don't stretch on

.page{padding:72px 2rem 4rem;width:100%}
.page-inner{max-width:1400px;margin:0 auto}

.hero{margin-bottom:1.5rem}
.hero h1{font-family:var(--serif);font-weight:600;font-size:24px;letter-spacing:-0.01em;margin:0 0 0.4rem;display:flex;align-items:center;gap:0.65rem}

.hero p{color:var(--text2);font-size:13.5px;line-height:1.55;max-width:720px;margin:0}

.stage{margin-top:1.25rem}

.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.5rem 1.5rem 1.25rem;margin-bottom:1rem}

.field{margin-bottom:1.1rem}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
.field .hint{font-size:11.5px;color:var(--text3);margin-top:0.35rem;line-height:1.5}
.form-input,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:9px 12px;font-family:inherit;font-size:13px;transition:border-color .15s,background .15s}
.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--accent);background:var(--bg4)}
.form-textarea{min-height:96px;resize:vertical;line-height:1.55;font-family:var(--serif)}

@media(max-width:600px){.conn-flow{grid-template-columns:1fr}.conn-arrow{transform:rotate(90deg);margin:0 auto}}
.conn-card{padding:0.85rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);min-height:64px;display:flex;flex-direction:column;justify-content:center}

.notice{padding:0.85rem 1rem;background:var(--amber-bg);border:1px solid rgba(245,158,11,0.3);border-radius:var(--r);font-size:12.5px;color:var(--text);line-height:1.55;margin:1rem 0}
.notice strong{color:var(--amber)}
.notice a{color:var(--accent);text-decoration:none;margin-left:6px}

.status-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 var(--accent);animation:pulse 1.6s ease-out infinite;flex-shrink:0}

.status-meta{font-size:11.5px;color:var(--text2)}

.log{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:0.4rem;max-height:60vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

.log-icon{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;margin-top:1px;font-size:11px;font-weight:600;font-family:var(--mono)}

.log-title{color:var(--text);font-weight:500}

.approval-banner{display:flex;align-items:center;gap:0.7rem;padding:0.85rem 1rem;background:var(--amber-bg);border:1px solid rgba(245,158,11,0.35);border-radius:var(--r-lg);margin-bottom:1rem;font-size:13px}

.proposal-summary{padding:1rem 1.1rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1rem;font-size:13px;line-height:1.6;color:var(--text)}

.mapping-preview{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.1rem}

.mapping-name{display:flex;align-items:center;gap:0.6rem;font-weight:500;color:var(--text);font-family:var(--mono)}
.mapping-arrow{color:var(--text3)}

.question h3{margin:0 0 0.4rem;font-size:15px;color:var(--text);font-weight:600}
.question .context{color:var(--text2);font-size:12.5px;margin-bottom:1rem;line-height:1.5}
.question-options{display:flex;flex-direction:column;gap:0.45rem}
.question-option{padding:0.7rem 0.85rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:12.5px;text-align:left;color:var(--text);font-family:inherit;transition:border-color .15s,background .15s}
.question-option:hover{border-color:var(--accent);background:var(--accent-glow)}

.completed{text-align:center;padding:2.5rem 1.5rem}
.success-icon{width:52px;height:52px;border-radius:50%;background:var(--green-bg);color:var(--green);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem}
.completed h2{margin:0 0 0.4rem;font-size:17px;font-weight:600}

.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.15);border-top-color:var(--text);border-radius:50%;animation:spin 0.8s linear infinite}

</style>

<script>
// Sidebar width mirror — same pattern as sql-editor.html
(function mirrorSidebarWidth(){
  function findSidebarEl(){
    const candidates = [
      document.getElementById('cyg-sidebar'),
      document.querySelector('.cyg-sidebar'),
      document.getElementById('cyg-sidebar-mount')
    ].filter(Boolean);
    return candidates.find(el => el.offsetWidth > 0) || candidates[0];
  }
  function sync(width){
    const shouldCollapse = width > 0 && width <= 80;
    document.body.classList.toggle('cyg-collapsed', shouldCollapse);
  }
  function attach(){
    const el = findSidebarEl();
    if (!el) { setTimeout(attach, 50); return; }
    requestAnimationFrame(() => sync(el.offsetWidth));
    if (typeof ResizeObserver !== 'undefined'){
      const ro = new ResizeObserver(entries => {
        for (const entry of entries) sync(entry.contentRect.width);
      });
      ro.observe(el);
    } else {
      setInterval(() => sync(el.offsetWidth), 200);
    }
  }
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', attach);
  } else {
    attach();
  }
})();
</script>

<script>
(function () {
  'use strict';

  // Azure Function endpoint. We call it directly rather than via /api/* —
  // matching the pattern used by cygenix-cosmos-sync.js, admin.html, etc.
  // Netlify's redirects only cover /api/db and /api/health; /api/agent/* would
  // 404 at the Netlify layer otherwise.
  const API_BASE  = 'https://cygenix-db-api-e4fng7a4edhydzc4.uksouth-01.azurewebsites.net/api';
  // HOST-LEVEL function key (Azure Portal → cygenix-db-api → App keys →
  // "default" under Host keys). The per-function `data` key (WjSmoWxg…) does
  // NOT work here because the agent endpoints are separate functions.
  const FUNC_CODE = 'UfQpm2qJuc0lWIbYwtGUm_k6ys_FDEquCma-KCPl_e8rAzFu5qfwbA==';
  const POLL_INTERVAL_MS = 1500;
  const STORAGE_KEY = 'cygenix_agentive_migration';

  // Build the full URL for a given API path, appending the function key as
  // a query parameter. Handles paths that already have query params (e.g.
  // '/agent/run/abc?sinceSeq=5' becomes '...?sinceSeq=5&code=KEY').
  function buildApiUrl(path) {
    const sep = path.includes('?') ? '&' : '?';
    return `${API_BASE}${path}${sep}code=${FUNC_CODE}`;
  }

  const state = {
    currentRunId: null,
    polling: null,
    lastSeq: 0,
    featureEnabled: null,
    conns: { source: null, target: null },
    view: 'loading',
  };

  const stage = document.getElementById('am-stage');

  // ── Auth ──────────────────────────────────────────────────────
  async function getAuthToken() {
    try {
      if (window.cygenixGetAccessToken) return await window.cygenixGetAccessToken();
      if (window.msalInstance) {
        const accounts = window.msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          const result = await window.msalInstance.acquireTokenSilent({
            scopes: ['openid', 'profile'], account: accounts[0],
          });
          return result.idToken;
        }
      }
    } catch (e) { console.warn('[AgentiveMigration] auth token unavailable', e); }
    return null;
  }

  // Custom error type so callers can distinguish "endpoint doesn't exist yet"
  // from real API errors. The Netlify 404 page returns text/html, not JSON,
  // so trying to res.json() it would throw an unhelpful SyntaxError.
  class ApiNotImplementedError extends Error {
    constructor(path) {
      super(`Backend endpoint ${path} is not deployed yet`);
      this.name = 'ApiNotImplementedError';
      this.path = path;
    }
  }

  // Get the active user's email for the x-user-id header. This matches the
  // auth pattern used elsewhere on the site — Azure Function endpoints
  // identify the user via the x-user-id header, not via JWT validation.
  function getActiveUserId() {
    try {
      // Try Entra account stored by login.html (preferred)
      const entraStr = localStorage.getItem('cygenix_entra_account')
                    || sessionStorage.getItem('cygenix_entra_account');
      if (entraStr) {
        const a = JSON.parse(entraStr);
        if (a && (a.email || a.username || a.preferred_username)) {
          return a.email || a.username || a.preferred_username;
        }
      }
      // Fallback: legacy cygenix_user
      const userStr = sessionStorage.getItem('cygenix_user')
                   || localStorage.getItem('cygenix_user');
      if (userStr) {
        const u = JSON.parse(userStr);
        if (u && u.email) return u.email;
      }
      // Last resort: cygenix_active_user (set by cygenix-cosmos-sync.js)
      const active = localStorage.getItem('cygenix_active_user');
      if (active) return active;
    } catch (e) {
      console.warn('[AgentiveMigration] could not resolve user id:', e.message);
    }
    return null;
  }

  async function api(path, options = {}) {
    const userId = getActiveUserId();
    const headers = {
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    };
    if (userId) headers['x-user-id'] = userId;

    const url = buildApiUrl(path);

    let res;
    try {
      res = await fetch(url, { ...options, headers });
    } catch (e) {
      throw new Error(`Network error calling ${path}: ${e.message}`);
    }

    // Detect "endpoint doesn't exist" from either a 404 status or a
    // non-JSON response (e.g. an Azure or Netlify HTML error page).
    const contentType = res.headers.get('content-type') || '';
    const isJson = contentType.includes('application/json');

    if (res.status === 404 || !isJson) {
      throw new ApiNotImplementedError(path);
    }
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error(`${res.status} ${res.statusText}: ${text.slice(0, 300)}`);
    }
    return res.json();
  }

  // ── Feature gate ──────────────────────────────────────────────
  async function checkFeatureEnabled() {
    try {
      const me = await api('/me');
      const tenantOn = me.tenant && me.tenant.agentiveMigrationEnabled === true;
      const userOn = me.user && me.user.aiAgentiveEnabled === true;
      state.featureEnabled = tenantOn && userOn;
    } catch (e) {
      // /me not implemented yet — default to enabled for development
      console.warn('[AgentiveMigration] /me failed, assuming enabled for dev:', e.message);
      state.featureEnabled = true;
    }
  }

  // ── Connections ───────────────────────────────────────────────
  // Match insights.html's pattern exactly: call CygenixConnections.get()
  // as a bare global, no window. prefix, no DOMContentLoaded gating.
  // The script tag in <head> means it's already defined by the time any
  // body script runs.
  function readConnections() {
    // Diagnostic — surfaced in DevTools console so we can see the actual state
    const hasGlobal = (typeof CygenixConnections !== 'undefined');
    const hasGet = hasGlobal && typeof CygenixConnections.get === 'function';
    if (!hasGlobal || !hasGet) {
      console.warn('[AgentiveMigration] CygenixConnections not yet ready', { hasGlobal, hasGet });
      return { source: null, target: null };
    }
    let c;
    try {
      c = CygenixConnections.get() || {};
    } catch (e) {
      console.warn('[AgentiveMigration] CygenixConnections.get() threw:', e.message);
      return { source: null, target: null };
    }

    console.log('[AgentiveMigration] CygenixConnections.get() returned:', {
      hasSrcConnString: !!c.srcConnString,
      hasTgtConnString: !!c.tgtConnString,
      hasTgtFnUrl: !!c.tgtFnUrl,
      keys: Object.keys(c),
    });

    const source = c.srcConnString
      ? { label: describeConnString(c.srcConnString), kind: 'direct' }
      : null;
    let target = null;
    if (c.tgtFnUrl) {
      target = { label: describeFnUrl(c.tgtFnUrl), kind: 'azure' };
    } else if (c.tgtConnString) {
      target = { label: describeConnString(c.tgtConnString), kind: 'direct' };
    }
    return { source, target };
  }

  function describeConnString(s) {
    if (!s) return 'Configured connection';
    const server = (s.match(/(?:Server|Data Source)\s*=\s*([^;]+)/i) || [])[1];
    const database = (s.match(/(?:Database|Initial Catalog)\s*=\s*([^;]+)/i) || [])[1];
    if (server && database) return `${database.trim()} on ${server.trim()}`;
    if (server) return server.trim();
    if (database) return database.trim();
    return 'Configured connection';
  }

  function describeFnUrl(url) {
    try { const u = new URL(url); return `Azure Function · ${u.hostname.split('.')[0]}`; }
    catch { return 'Azure Function endpoint'; }
  }

  // Poll for connection changes while on the setup view — the project
  // context can load asynchronously (especially right after page load)
  // and the user can also open a tab and switch projects elsewhere.
  let connWatcher = null;
  function startConnectionWatcher() {
    if (connWatcher) clearInterval(connWatcher);
    connWatcher = setInterval(() => {
      if (state.view !== 'setup') return;
      const next = readConnections();
      const changed =
        (!!next.source) !== (!!state.conns.source) ||
        (!!next.target) !== (!!state.conns.target) ||
        (next.source && state.conns.source && next.source.label !== state.conns.source.label) ||
        (next.target && state.conns.target && next.target.label !== state.conns.target.label);
      if (changed) { state.conns = next; renderSetup(); }
    }, 800);
  }
  function stopConnectionWatcher() {
    if (connWatcher) { clearInterval(connWatcher); connWatcher = null; }
  }

  // ── Persistence ───────────────────────────────────────────────
  function saveActiveRun(runId) {
    try {
      const userKey = (localStorage.getItem('cygenix_active_user') || 'anon');
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      data[userKey] = { runId, savedAt: Date.now() };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) { /* ignore */ }
  }
  function loadActiveRun() {
    try {
      const userKey = (localStorage.getItem('cygenix_active_user') || 'anon');
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const entry = data[userKey];
      if (entry && Date.now() - entry.savedAt < 24 * 60 * 60 * 1000) return entry.runId;
    } catch (e) { /* ignore */ }
    return null;
  }
  function clearActiveRun() {
    try {
      const userKey = (localStorage.getItem('cygenix_active_user') || 'anon');
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      delete data[userKey];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) { /* ignore */ }
  }

  // ── Helpers ───────────────────────────────────────────────────
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function setTopbarStatus(text) {
    const el = document.getElementById('topbar-status');
    if (el) el.textContent = text || '';
  }

  // ── Views ─────────────────────────────────────────────────────

    stage.innerHTML = `
      <div class="disabled-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3)">

      </div>`;

  function renderSetup() {

          <textarea id="am-goal" class="form-textarea" placeholder="Example: Propose a mapping for the sales schema. Preserve foreign key relationships. Exclude any PII columns and ask me before including columns that look sensitive." ${bothConfigured ? '' : 'disabled'}></textarea>

        </div>

        <div class="field">

  async function startRun() {
    const goal = document.getElementById('am-goal').value.trim();
    if (!state.conns.source || !state.conns.target) {
      alert('Both source and target connections must be configured first.');
      return;
    }
    if (goal.length < 10) {
      alert('Please describe what the agent should do (at least a sentence).');
      return;
    }
    stopConnectionWatcher();
    renderLoading('Starting agent…');
    try {
      const result = await api('/agent/migrate', {
        method: 'POST',
        body: JSON.stringify({ direction: 'source_to_target', goal }),
      });
      state.currentRunId = result.runId;
      state.lastSeq = 0;
      saveActiveRun(result.runId);
      startPolling();
    } catch (e) {
      if (e instanceof ApiNotImplementedError) {
        renderBackendPending();
      } else {
        renderError(e.message);
      }
    }
  }

  function renderRunning(run, messages) {
    state.view = 'running';
    setTopbarStatus('Running');

    const usage = run.tokenUsage || { input: 0, output: 0, costUSD: 0 };
    const cap = (run.budgetCap && run.budgetCap.maxCostUSD) || 2.0;
    const pct = Math.min(100, Math.round((usage.costUSD / cap) * 100));
    const entries = messagesToLogEntries(messages);

    // Progress signals: count assistant turns (proxy for model round-trips),
    // count proposals so far (from propose_table_mapping calls), and show
    // elapsed time since the run was created.
    const turnCount = (messages || []).filter(m => m.role === 'assistant').length;
    const proposalCount = (messages || []).reduce((acc, m) => {
      if (m.role === 'assistant' && Array.isArray(m.content)) {
        for (const b of m.content) {
          if (b.type === 'tool_use' && b.name === 'propose_table_mapping') acc++;
        }
      }
      return acc;
    }, 0);
    const startedAt = run.createdAt ? new Date(run.createdAt).getTime() : Date.now();
    const elapsedSec = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
    const elapsedStr = elapsedSec < 60 ? `${elapsedSec}s` : `${Math.floor(elapsedSec / 60)}m ${elapsedSec % 60}s`;

    stage.innerHTML = `
      <div class="status-bar">
        <div class="status-left">
          <div class="status-dot"></div>
          <div>
            <div class="status-text">Agent running</div>
            <div class="status-meta">${escapeHtml(currentActivity(messages))}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:0.85rem;flex-wrap:wrap;justify-content:flex-end">
          <div class="status-meta" title="Elapsed time since run started">
            ⏱ ${elapsedStr}
          </div>
          <div class="status-meta" title="Model round-trips so far (cap: 12)">
            Turn ${turnCount}/12
          </div>
          ${proposalCount > 0 ? `<div class="status-meta">${proposalCount} proposal${proposalCount === 1 ? '' : 's'}</div>` : ''}
          <div class="cost-meter">
            <strong>$${usage.costUSD.toFixed(3)}</strong>
            <span>/ $${cap.toFixed(2)}</span>
            <span style="margin-left:4px">(${pct}%)</span>
          </div>
          <button class="btn btn-danger btn-sm" id="am-cancel-btn">Cancel</button>
        </div>
      </div>
      <div class="log" id="am-log">
        ${entries.length === 0
          ? '<div class="log-empty">Waiting for the agent to start…</div>'
          : entries.map(renderLogEntry).join('')}
      </div>`;

    const cancelBtn = document.getElementById('am-cancel-btn');
    if (cancelBtn) cancelBtn.addEventListener('click', cancelRun);
    const logEl = document.getElementById('am-log');
    if (logEl) logEl.scrollTop = logEl.scrollHeight;
  }

  function currentActivity(messages) {
    if (!messages || messages.length === 0) return 'Initializing…';
    const last = messages[messages.length - 1];
    if (last.role === 'assistant' && last.content) {
      for (const block of last.content) {
        if (block.type === 'tool_use') return prettyToolName(block.name) + '…';
      }
    }
    return 'Thinking…';
  }

  function prettyToolName(name) {
    return ({
      // Stage 2b/2c introspection tools
      list_schemas:            'Listing schemas',
      list_tables:             'Listing tables',
      search_tables:           'Searching tables',
      describe_tables:         'Describing tables',
      get_table_relationships: 'Reading relationships',
      sample_table:            'Sampling rows',
      // Stage 2c terminal tools
      propose_table_mapping:   'Proposing mapping',
      finalize_proposal:       'Finalizing proposal',
      // Legacy stub names
      introspect_source_schema: 'Reading source schema',
      introspect_target_schema: 'Reading target schema',
      propose_mapping:         'Preparing proposal',
      ask_user:                'Awaiting your input',
    })[name] || name;
  }

  function messagesToLogEntries(messages) {
    const entries = [];
    for (const msg of messages || []) {
      if (msg.role === 'assistant' && Array.isArray(msg.content)) {
        for (const block of msg.content) {
          if (block.type === 'text' && block.text && block.text.trim()) {
            entries.push({ kind: 'thinking', title: 'Thinking', detail: block.text.trim() });
          } else if (block.type === 'tool_use') {
            entries.push({ kind: 'tool', title: prettyToolName(block.name), detail: summarizeToolInput(block.name, block.input) });
          }
        }
      } else if (msg.role === 'user' && Array.isArray(msg.content)) {
        for (const block of msg.content) {
          if (block.type === 'tool_result') {
            entries.push({
              kind: block.is_error ? 'error' : 'result',
              title: block.is_error ? 'Tool error' : 'Result received',
              detail: summarizeToolResult(block.content),
            });
          }
        }
      }
    }
    return entries;
  }

  function summarizeToolInput(name, input) {
    if (!input) return '';
    switch (name) {
      case 'list_schemas':
        return input.side ? `${input.side}` : '';
      case 'list_tables': {
        const parts = [`${input.side || ''}`];
        if (input.schema) parts.push(`schema: ${input.schema}`);
        if (input.namePattern) parts.push(`pattern: ${input.namePattern}`);
        return parts.filter(Boolean).join(' · ');
      }
      case 'search_tables':
        return input.term ? `${input.side} · "${input.term}"` : input.side || '';
      case 'describe_tables': {
        const tables = Array.isArray(input.tables) ? input.tables : [];
        const preview = tables.slice(0, 3).join(', ');
        const more = tables.length > 3 ? ` +${tables.length - 3} more` : '';
        return `${input.side} · ${preview}${more}`;
      }
      case 'get_table_relationships':
        return `${input.side} · ${input.table || ''}`;
      case 'sample_table':
        return `${input.side} · ${input.table || ''} (${input.n || 5} rows)`;
      case 'propose_table_mapping':
        return `${input.sourceTable || '?'} → ${input.targetTable || '?'}`;
      case 'finalize_proposal':
        return input.summary ? input.summary.slice(0, 80) + (input.summary.length > 80 ? '…' : '') : '';
      // Legacy fallback
      case 'introspect_source_schema':
      case 'introspect_target_schema': {
        const parts = [];
        if (input.schemaFilter) parts.push(`schema: ${input.schemaFilter}`);
        if (input.tablePattern) parts.push(`pattern: ${input.tablePattern}`);
        return parts.length ? parts.join(', ') : 'all tables';
      }
      default:
        return JSON.stringify(input).slice(0, 160);
    }
  }

  function summarizeToolResult(content) {
    const text = typeof content === 'string' ? content : JSON.stringify(content);
    return text.length <= 200 ? text : text.slice(0, 200) + '…';
  }

  function renderLogEntry(entry) {
    const icons = { thinking: '·', tool: '→', result: '✓', error: '!' };
    return `
      <div class="log-entry log-${entry.kind}">
        <div class="log-icon">${icons[entry.kind] || '·'}</div>
        <div class="log-body">
          <div class="log-title">${escapeHtml(entry.title)}</div>
          ${entry.detail ? `<div class="log-detail">${escapeHtml(entry.detail)}</div>` : ''}
        </div>
      </div>`;
  }

  async function cancelRun() {
    if (!state.currentRunId) return;
    if (!confirm('Cancel this agent run? You can start a new one afterwards.')) return;
    try {
      await api(`/agent/run/${state.currentRunId}/cancel`, { method: 'POST' });
    } catch (e) { console.warn('[AgentiveMigration] cancel failed:', e.message); }
    stopPolling();
    clearActiveRun();
    state.currentRunId = null;
    state.conns = readConnections();
    renderSetup();
    startConnectionWatcher();
  }

  // Read the user's currently-active project ID from localStorage. Object
  // Mapping uses this same key to filter jobs by project, so any new job we
  // create needs the same projectId to appear in the right view.
  function getActiveProjectId() {
    try {
      return localStorage.getItem('cygenix_active_project_id') || '';
    } catch { return ''; }
  }

  function renderProposalApproval(run) {
    state.view = 'approval';

    const summary = payload.summary || 'No summary provided.';

    const decisionsForUser = Array.isArray(payload.decisionsForUser) ? payload.decisionsForUser : [];
    const risks = Array.isArray(payload.risks) ? payload.risks : [];
    const finalized = !!payload.finalized;

    // Counts used in the banner
    const totalCols = proposedJobs.reduce((acc, j) => acc + (Array.isArray(j.columnMapping) ? j.columnMapping.length : 0), 0);

    const noJobsNotice = (proposedJobs.length === 0) ? `
      <div class="notice">

          : 'The agent did not finalize properly (likely hit a limit). The summary below shows what it had time to figure out.'}

    stage.innerHTML = `
      <div class="approval-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 9v4"/><path d="M12 17h.01"/>

      <div class="card">
        <div class="section-label">Summary</div>
        <div class="proposal-summary">${escapeHtml(summary)}</div>

        ${noJobsNotice}

        ${proposedJobs.length > 0 ? `

              ${proposedJobs.map(j => {

                const high = cols.filter(c => c.match === 'HIGH').length;
                const med  = cols.filter(c => c.match === 'MEDIUM').length;
                const low  = cols.filter(c => c.match === 'LOW').length;
                const conf = j.confidence || 'MEDIUM';

                return `
                  <div class="mapping-row">

                      <span class="decision-confidence ${escapeHtml(conf.toLowerCase())}" style="margin-left:auto">${escapeHtml(conf)}</span>
                    </div>
                    <div class="mapping-meta">
                      ${cols.length} column${cols.length === 1 ? '' : 's'}

                      ${warn > 0 ? ` · ⚠ ${warn} warning${warn === 1 ? '' : 's'}` : ''}
                    </div>
                    ${j.reasoning ? `<div class="decision-reasoning" style="margin-top:6px">${escapeHtml(j.reasoning)}</div>` : ''}
                  </div>`;
              }).join('')}
            </div>
          </div>
        ` : ''}

        ${decisionsForUser.length > 0 ? `
          <div class="decisions">
            <div class="section-label">Decisions for you to weigh in on</div>
            ${decisionsForUser.map(d => `
              <div class="decision">
                <div class="decision-label">${escapeHtml(d.question || '')}</div>
                <div class="decision-reasoning">${escapeHtml(d.context || '')}</div>
              </div>`).join('')}
          </div>` : ''}

        ${risks.length > 0 ? `
          <div class="decisions">
            <div class="section-label">Risks</div>
            ${risks.map(r => `
              <div class="decision">
                <div class="decision-reasoning">⚠ ${escapeHtml(r)}</div>
              </div>`).join('')}
          </div>` : ''}

        <div class="actions">
          <button class="btn btn-danger btn-sm" id="am-reject-btn">Reject &amp; revise</button>
          <button class="btn btn-green btn-sm" id="am-approve-btn"${proposedJobs.length === 0 ? ' disabled' : ''}>
            ✓ Approve &amp; save ${proposedJobs.length} job${proposedJobs.length === 1 ? '' : 's'}
          </button>
        </div>
      </div>`;

    document.getElementById('am-approve-btn').addEventListener('click', () => {
      const projectId = getActiveProjectId();
      respondToApproval('approve', null, null, null, projectId);
    });
    document.getElementById('am-reject-btn').addEventListener('click', async () => {
      const feedback = prompt('What should the agent change? Be specific.');
      if (feedback && feedback.trim()) respondToApproval('reject', null, feedback.trim());
    });
  }

  function renderQuestion(run) {
    state.view = 'question';
    setTopbarStatus('Awaiting your input');
    const payload = (run.pendingApproval && run.pendingApproval.payload) || {};
    const options = Array.isArray(payload.options) ? payload.options : [];

    stage.innerHTML = `
      <div class="card question">
        <h3>${escapeHtml(payload.question || 'The agent has a question.')}</h3>
        ${payload.context ? `<div class="context">${escapeHtml(payload.context)}</div>` : ''}
        <div class="question-options">
          ${options.map((opt, i) => `<button class="question-option" data-idx="${i}">${escapeHtml(opt.label || opt.value || '')}</button>`).join('')}
        </div>
        <div style="margin-top:1rem;display:flex;justify-content:flex-end">
          <button class="btn btn-danger btn-sm" id="am-cancel-q-btn">Cancel run</button>
        </div>
      </div>`;

    document.querySelectorAll('.question-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx, 10);
        const chosen = options[idx];
        if (chosen) respondToApproval('answer', null, null, chosen.value);
      });
    });
    document.getElementById('am-cancel-q-btn').addEventListener('click', cancelRun);
  }

  async function respondToApproval(action, mapping, feedback, answer, projectId) {
    if (!state.currentRunId) return;
    renderLoading('Submitting your response…');
    try {
      const body = { action };
      if (mapping) body.mapping = mapping;
      if (feedback) body.feedback = feedback;
      if (answer != null) body.answer = answer;
      if (projectId) body.projectId = projectId;
      await api(`/agent/run/${state.currentRunId}/respond`, {
        method: 'POST', body: JSON.stringify(body),
      });
      startPolling();
    } catch (e) { renderError(e.message); }
  }

  function renderCompleted(run) {
    state.view = 'completed';
    setTopbarStatus('Completed');
    const result = run.result || {};
    const firstJobId = result.firstJobId;
    const jobCount = result.jobCount || 0;

    stage.innerHTML = `
      <div class="card completed">
        <div class="success-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2>${jobCount > 0 ? `Saved ${jobCount} mapping job${jobCount === 1 ? '' : 's'}` : 'Run complete'}</h2>
        <p>${escapeHtml(result.summary || 'The run is finished.')}</p>
        <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap">
          ${firstJobId ? `<a class="btn btn-primary btn-sm" href="/object_mapping.html?edit=${encodeURIComponent(firstJobId)}">Open first job in Object Mapping</a>` : ''}
          ${jobCount > 1 ? `<a class="btn btn-sm" href="/dashboard.html#jobs">View all jobs</a>` : ''}
          <button class="btn btn-sm" id="am-new-btn">Start a new run</button>
        </div>
      </div>`;
    document.getElementById('am-new-btn').addEventListener('click', () => {
      clearActiveRun();
      state.currentRunId = null;
      state.conns = readConnections();
      renderSetup();
      startConnectionWatcher();
    });
  }

  function renderFailed(run) {
    state.view = 'failed';
    setTopbarStatus('Failed');
    stage.innerHTML = `
      <div class="error-card">
        <h3>Run failed</h3>
        <p>${escapeHtml((run.result && run.result.error) || 'The agent encountered an error and could not complete.')}</p>
        <button class="btn btn-sm" id="am-retry-btn">Start a new run</button>
      </div>`;
    document.getElementById('am-retry-btn').addEventListener('click', () => {
      clearActiveRun();
      state.currentRunId = null;
      state.conns = readConnections();
      renderSetup();
      startConnectionWatcher();
    });
  }

  // ── Polling ───────────────────────────────────────────────────
  function startPolling() {
    stopPolling();
    poll();
    state.polling = setInterval(poll, POLL_INTERVAL_MS);
  }
  function stopPolling() {
    if (state.polling) { clearInterval(state.polling); state.polling = null; }
  }

  async function poll() {
    if (!state.currentRunId) return;
    try {
      const data = await api(`/agent/run/${state.currentRunId}?sinceSeq=${state.lastSeq}`);
      const run = data.run;
      const messages = data.messages || [];
      if (messages.length > 0) state.lastSeq = messages[messages.length - 1].seq || state.lastSeq;

      switch (run.status) {
        case 'running':
          renderRunning(run, data.allMessages || messages);
          break;
        case 'awaiting_approval':
          stopPolling();
          if (run.pendingApproval && run.pendingApproval.type === 'ask_user') renderQuestion(run);
          else renderProposalApproval(run);
          break;
        case 'completed':
          stopPolling();
          clearActiveRun();
          renderCompleted(run);
          break;
        case 'failed':
        case 'cancelled':
          stopPolling();
          clearActiveRun();
          renderFailed(run);
          break;
      }
    } catch (e) {
      console.warn('[AgentiveMigration] poll error:', e.message);
    }
  }

  // ── Boot ──────────────────────────────────────────────────────
  async function init() {
    // Diagnostic snapshot — visible in DevTools console
    console.log('[AgentiveMigration] boot diagnostics:', {
      hasCygenixConnections: typeof CygenixConnections !== 'undefined',
      activeProjectId: localStorage.getItem('cygenix_active_project_id'),
      activeProjectSession: sessionStorage.getItem('cygenix_active_project'),
      hasProjects: !!localStorage.getItem('cygenix_projects'),
      projectsLength: (() => {
        try { return JSON.parse(localStorage.getItem('cygenix_projects') || '[]').length; }
        catch { return 'parse-error'; }
      })(),
      hasToken: !!sessionStorage.getItem('cygenix_token'),
    });

    renderLoading('Checking access…');
    await checkFeatureEnabled();
    if (!state.featureEnabled) { renderDisabled(); return; }

    const existing = loadActiveRun();
    if (existing) {
      state.currentRunId = existing;
      renderLoading('Resuming run…');
      startPolling();
      return;
    }

    renderLoading('Loading connections…');
    state.conns = readConnections();
    renderSetup();
    startConnectionWatcher();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
