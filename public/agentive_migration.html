  // ── Source-driven primary picker ──────────────────────────────────────
  function renderSourceCards() {
    if (state.sourceSchema === 'pending') {
      return `<div class="card">
        <div style="display:flex;align-items:center;gap:0.85rem">
          <div class="spinner"></div>
          <div>
            <div style="font-weight:600">Reading the source schema…</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:2px">Inspecting tables, columns, and themes.</div>
          </div>
        </div>
      </div>`;
    }
    if (!state.sourceSchema) {
      const errBlock = state.sourceSchemaError
        ? `<div class="notice" style="margin-top:0.85rem"><strong>Source schema failed to load.</strong> ${escapeHtml(state.sourceSchemaError)}</div>`
        : '';
      return `<div class="card">
        <div style="display:flex;align-items:center;gap:0.85rem;justify-content:space-between">
          <div>
            <div style="font-weight:600">Source schema not loaded</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:2px">Cygenix needs to read the source so you can pick tables to migrate.</div>
          </div>
          <button class="btn btn-primary btn-sm" id="am-load-source-btn">Read source schema</button>
        </div>
        ${errBlock}
      </div>`;
    }
    if (!state.plan || state.plan === 'pending') {
      // Plan still loading — show source schema overview but disable picking
      // since we have no target candidates yet for the heuristic.
      return `<div class="card">
        <div style="font-weight:600;margin-bottom:0.4rem">Source schema loaded</div>
        <div style="font-size:11.5px;color:var(--text3);line-height:1.55">
          ${(state.sourceSchema.totals && state.sourceSchema.totals.tables) || 0} tables across
          ${(state.sourceSchema.totals && state.sourceSchema.totals.schemas) || 0} schema(s).
          Waiting for target plan to finish loading before showing source-to-target matches…
        </div>
      </div>`;
    }

    const groups = (state.sourceSchema && state.sourceSchema.groups) || [];
    const expanded = state.expandedSourceGroup
      ? groups.find(g => g.id === state.expandedSourceGroup)
      : null;

    const cardsHtml = groups.map(g => {
      const tableCount = (g.tables || []).length;
      // How many tables in this group are currently picked as pairs?
      let pickedInGroup = 0;
      for (const t of (g.tables || [])) {
        if (state.pickedPairs.has(t.fullName)) pickedInGroup++;
      }
      const isExpanded = expanded && expanded.id === g.id;
      const pickedBadge = pickedInGroup > 0
        ? `<div style="font-size:11px;color:var(--accent);font-weight:600;margin-top:0.15rem">${pickedInGroup}/${tableCount} picked</div>`
        : '';
      const previewNames = (g.tables || []).slice(0, 5).map(t => t.name);
      const previewHtml = previewNames.map(n => `<div style="font-size:11.5px;color:var(--text2);font-family:var(--mono)">${escapeHtml(n)}</div>`).join('');
      const moreHtml = tableCount > 5
        ? `<div style="font-size:10.5px;color:var(--text3);margin-top:0.2rem">+${tableCount - 5} more</div>`
        : '';
      const buttonLabel = isExpanded ? 'Close' : (pickedInGroup > 0 ? 'Refine' : 'Open');
      const cardClass = 'action-card' + (isExpanded ? ' active' : '') + (pickedInGroup > 0 ? ' has-picks' : '');
      const piiNote = g.piiCount > 0
        ? `<div style="font-size:10.5px;color:var(--amber);margin-top:2px">⚠ ${g.piiCount} PII column${g.piiCount === 1 ? '' : 's'}</div>`
        : '';
      const icon = g.icon ? `<span style="font-size:18px;margin-right:6px">${escapeHtml(g.icon)}</span>` : '';
      return `
        <div class="${cardClass}" data-srcgroup="${escapeHtml(g.id)}" role="button" tabindex="0" style="min-width:220px;max-width:240px;flex-shrink:0;display:flex;flex-direction:column">
          <div class="action-card-title">${icon}${escapeHtml(g.name)}</div>
          <div class="action-card-desc">${escapeHtml(g.description || '')}</div>
          <div class="action-card-meta">${tableCount} table${tableCount === 1 ? '' : 's'} · ${formatRows(g.totalRows || 0)} rows</div>
          ${piiNote}
          ${pickedBadge}
          <div style="margin-top:0.6rem;display:flex;flex-direction:column;gap:0.2rem;min-height:90px">
            ${tableCount === 0 ? '<div style="font-size:11px;color:var(--text3);font-style:italic">(no tables in this group)</div>' : previewHtml + moreHtml}
          </div>
          <button class="btn btn-sm ${isExpanded ? 'btn-primary' : ''}" style="margin-top:0.85rem" data-srcgroup-btn="${escapeHtml(g.id)}" ${tableCount === 0 ? 'disabled' : ''}>${escapeHtml(buttonLabel)}</button>
        </div>`;
    }).join('');

    let html = `
      <div class="card">
        <div class="panel-title" style="margin-bottom:0.85rem">Pick source tables to migrate</div>
        <div style="font-size:11.5px;color:var(--text3);margin-bottom:0.85rem;line-height:1.5">
          Source tables are grouped by theme. Open a card to see its tables — when you tick one, Cygenix proposes a target table to map to. You can confirm or change the proposed target.
        </div>
        <div class="carousel-track-wrap">
          <div class="carousel-track">${cardsHtml}</div>
        </div>
      </div>`;

    if (expanded) html += renderExpandedSourceGroup(expanded);
    return html;
  }

  function renderExpandedSourceGroup(group) {
    const visible = visibleSourceTables(group);
    const search = state.sourceGroupSearch[group.id] || '';
    const pickedInGroup = (group.tables || []).filter(t => state.pickedPairs.has(t.fullName)).length;

    const rowsHtml = visible.map(t => {
      const picked = state.pickedPairs.has(t.fullName);
      const pair   = picked ? state.pickedPairs.get(t.fullName) : null;
      const match  = autoMatchCache[t.fullName];
      const top    = match && match.top;

      // Target column content varies by state:
      //   - not picked: show top candidate as "→ Matter (high 0.95)" greyed out
      //   - picked: show the picked target with confidence + Change button
      let targetHtml;
      if (picked) {
        if (pair.target) {
          const tShort  = pair.target.split('.').pop();
          const conf    = (typeof pair.confidence === 'number') ? pair.confidence : null;
          const bucket  = conf == null ? '' : confidenceBucket(conf);
          const confTag = conf == null ? '<span style="font-size:10px;color:var(--text3)">manual</span>'
                          : `<span style="font-size:10px;color:${bucket==='high'?'var(--green)':bucket==='medium'?'var(--amber)':'var(--text3)'}">${bucket} ${conf.toFixed(2)}</span>`;
          targetHtml = `
            <div style="display:flex;align-items:center;gap:0.45rem">
              <span style="font-family:var(--mono);font-size:12px;color:var(--text)">→ ${escapeHtml(tShort)}</span>
              ${confTag}
              <button class="btn btn-sm" data-open-target-picker="${escapeHtml(t.fullName)}" style="padding:2px 8px;font-size:11px">Change</button>
            </div>`;
        } else {
          targetHtml = `
            <div style="display:flex;align-items:center;gap:0.45rem">
              <span style="color:var(--amber);font-size:11.5px">⚠ No target chosen yet</span>
              <button class="btn btn-sm" data-open-target-picker="${escapeHtml(t.fullName)}" style="padding:2px 8px;font-size:11px">Pick target</button>
            </div>`;
        }
      } else if (top) {
        const tShort = top.target.split('.').pop();
        const bucket = confidenceBucket(top.confidence);
        const confColor = bucket === 'high' ? 'var(--green)' : bucket === 'medium' ? 'var(--amber)' : 'var(--text3)';
        targetHtml = `<span style="font-family:var(--mono);font-size:11px;color:var(--text3)">→ ${escapeHtml(tShort)} <span style="color:${confColor}">(${bucket} ${top.confidence.toFixed(2)})</span></span>`;
      } else {
        targetHtml = `<span style="font-size:11px;color:var(--text3);font-style:italic">no match — you'll need to pick a target</span>`;
      }

      // If the target picker is open on this row, render its candidate list below
      let pickerHtml = '';
      if (state.openTargetPicker === t.fullName) {
        pickerHtml = renderTargetPickerInline(t.fullName);
      }

      return `
        <div class="src-pair-row${picked ? ' picked' : ''}" data-src-row="${escapeHtml(t.fullName)}">
          <label style="display:flex;align-items:center;gap:0.7rem;cursor:pointer;flex:1;min-width:0">
            <input type="checkbox" data-pick-source="${escapeHtml(t.fullName)}" ${picked ? 'checked' : ''} style="margin:0;flex-shrink:0">
            <div style="flex:1;min-width:0">
              <div style="font-family:var(--mono);font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(t.name)}</div>
              <div style="font-size:10.5px;color:var(--text3);font-family:var(--mono)">${escapeHtml(t.fullName)} · ${formatRows(t.rows || 0)} rows</div>
            </div>
          </label>
          <div style="flex:1;min-width:0;display:flex;justify-content:flex-end;text-align:right">${targetHtml}</div>
        </div>
        ${pickerHtml}`;
    }).join('');

    return `
      <div class="card src-expanded-panel">
        <div style="display:flex;align-items:flex-start;gap:1rem;justify-content:space-between;flex-wrap:wrap;margin-bottom:0.85rem">
          <div style="min-width:0">
            <div style="font-weight:600;font-size:14px">${escapeHtml(group.name)} — pick source tables</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:2px">
              ${(group.tables || []).length} total · ${pickedInGroup} picked
            </div>
          </div>
          <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
            <button class="btn btn-sm btn-ghost" data-srcgroup-close="${escapeHtml(group.id)}">Close ✕</button>
          </div>
        </div>
        <div style="margin-bottom:0.65rem">
          <input type="text" class="form-input" id="am-srcgroup-search-${escapeHtml(group.id)}"
                 data-srcgroup-search="${escapeHtml(group.id)}"
                 placeholder="Filter — e.g. 'matter', 'rate'"
                 value="${escapeHtml(search)}"
                 style="font-size:12.5px;font-family:var(--mono)">
        </div>
        <div class="src-pair-list">
          ${rowsHtml || '<div style="padding:1rem;text-align:center;color:var(--text3);font-size:12.5px">No tables match your filter.</div>'}
        </div>
      </div>`;
  }

  // Inline target picker that opens beneath a source row when "Change" is
  // clicked. Shows the heuristic's top-5 candidates plus a search field for
  // when none of them is right.
  function renderTargetPickerInline(sourceFullName) {
    const match = autoMatchCache[sourceFullName];
    const search = (state.targetPickerSearch || '').trim();

    // Default candidates from the heuristic; if user is searching, do a
    // fresh fuzzy match across all target tables using the query as source.
    let candidates;
    if (search) {
      const targetNames = [];
      for (const b of state.buckets) for (const t of b.tables) targetNames.push(t.fullName);
      const fresh = matchSourceToTarget(search, targetNames, { topK: 8, minConfidence: 0.2 });
      candidates = fresh.candidates;
    } else {
      candidates = (match && match.candidates) || [];
    }

    const candidatesHtml = candidates.map(c => {
      const bucket = confidenceBucket(c.confidence);
      const confColor = bucket === 'high' ? 'var(--green)' : bucket === 'medium' ? 'var(--amber)' : 'var(--text3)';
      return `
        <div class="target-cand-row" data-pick-target-for="${escapeHtml(sourceFullName)}" data-pick-target-name="${escapeHtml(c.target)}" data-pick-target-conf="${c.confidence.toFixed(4)}" data-pick-target-reason="${escapeHtml(c.reason || '')}">
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--mono);font-size:12px;color:var(--text)">${escapeHtml(c.target.split('.').pop())}</div>
            <div style="font-size:10.5px;color:var(--text3);font-family:var(--mono)">${escapeHtml(c.target)} · ${escapeHtml(c.reason || '')}</div>
          </div>
          <span style="font-size:10.5px;color:${confColor}">${bucket} ${c.confidence.toFixed(2)}</span>
        </div>`;
    }).join('');

    return `
      <div class="target-picker-panel" data-target-picker="${escapeHtml(sourceFullName)}">
        <div style="font-size:11px;color:var(--text3);margin-bottom:0.45rem">Choose target for <strong style="color:var(--text);font-family:var(--mono)">${escapeHtml(sourceFullName)}</strong></div>
        <input type="text" class="form-input" id="am-target-picker-search"
               placeholder="Search target tables — type a name or part of one"
               value="${escapeHtml(search)}"
               style="font-size:12.5px;font-family:var(--mono);margin-bottom:0.55rem">
        <div class="target-cand-list">
          ${candidatesHtml || '<div style="padding:0.85rem;text-align:center;color:var(--text3);font-size:12px">No candidates match. Try a different search term.</div>'}
        </div>
        <div style="display:flex;gap:0.4rem;justify-content:flex-end;margin-top:0.55rem">
          <button class="btn btn-sm btn-ghost" data-cancel-target-picker="${escapeHtml(sourceFullName)}">Cancel</button>
        </div>
      </div>`;
  }

  function renderBucketCards() {
    if (!Array.isArray(state.buckets) || state.buckets.length === 0) {
      return '';
    }

    // Count picked tables per bucket — used in card subtitles
    const pickedCountsByBucket = {};
    for (const b of state.buckets) {
      let n = 0;
      for (const t of b.tables) if (allPickedTargets().has(t.fullName)) n++;
      pickedCountsByBucket[b.key] = n;
    }

    // If a bucket is expanded, render the carousel WITHOUT that card (or
    // with it as a thin "expanded" header tile) plus the full expanded
    // panel below.
    const expanded = state.expandedBucket
      ? state.buckets.find(b => b.key === state.expandedBucket)
      : null;

    const cardsHtml = state.buckets.map(b => {
      const pickedCount = pickedCountsByBucket[b.key];
      const tableCount = b.tables.length;
      const isExpanded = expanded && expanded.key === b.key;

      const pickedBadge = pickedCount > 0
        ? `<div style="font-size:11px;color:var(--accent);font-weight:600;margin-top:0.15rem">${pickedCount}/${tableCount} picked</div>`
        : '';

      const previewNames = b.tables.slice(0, 5).map(t => t.name);
      const previewHtml = previewNames.map(n => `<div style="font-size:11.5px;color:var(--text2);font-family:var(--mono)">${escapeHtml(n)}</div>`).join('');
      const moreHtml = tableCount > 5
        ? `<div style="font-size:10.5px;color:var(--text3);margin-top:0.2rem">+${tableCount - 5} more</div>`
        : '';

      const buttonLabel = isExpanded ? 'Close' : (pickedCount > 0 ? 'Refine' : 'Open');
      const cardClass = 'action-card' + (isExpanded ? ' active' : '') + (pickedCount > 0 ? ' has-picks' : '');

      return `
        <div class="${cardClass}" data-bucket="${escapeHtml(b.key)}" role="button" tabindex="0" style="min-width:220px;max-width:240px;flex-shrink:0;display:flex;flex-direction:column">
          <div class="action-card-title">${escapeHtml(b.label)}</div>
          <div class="action-card-desc">${escapeHtml(b.description)}</div>
          <div class="action-card-meta">${tableCount} table${tableCount === 1 ? '' : 's'} · ${formatRows(b.totalRows)} rows</div>
          ${pickedBadge}
          <div style="margin-top:0.6rem;display:flex;flex-direction:column;gap:0.2rem;min-height:90px">
            ${tableCount === 0 ? '<div style="font-size:11px;color:var(--text3);font-style:italic">(no tables in this bucket)</div>' : previewHtml + moreHtml}
          </div>
          <button class="btn btn-sm ${isExpanded ? 'btn-primary' : ''}" style="margin-top:0.85rem" data-bucket-btn="${escapeHtml(b.key)}" ${tableCount === 0 ? 'disabled' : ''}>${escapeHtml(buttonLabel)}</button>
        </div>`;
    }).join('');

    let html = '';
    html += `
      <div class="card">
        <div class="panel-title" style="margin-bottom:0.85rem">Or pick by group</div>
        <div class="carousel-track-wrap">
          <div class="carousel-track">${cardsHtml}</div>
        </div>
      </div>`;

    // Expanded panel below
    if (expanded) {
      html += renderExpandedBucket(expanded);
    }
    return html;
  }

  // Detailed table picker for one bucket. Shows the table list with
  // fuzzy-search box, checkboxes, select-all/none, and a count summary.
  function renderExpandedBucket(bucket) {
    const visible = visibleTablesForBucket(bucket);
    const search = state.bucketSearch[bucket.key] || '';
    const pickedInBucket = bucket.tables.filter(t => allPickedTargets().has(t.fullName)).length;
    const visiblePickedCount = visible.filter(t => allPickedTargets().has(t.fullName)).length;
    const allVisiblePicked = visible.length > 0 && visiblePickedCount === visible.length;

    // Build the rows. Cap at 500 for safety — 650-table buckets should
    // still scroll fine, but we'll show a soft cap warning if it's hit.
    const ROW_CAP = 500;
    const showing = visible.slice(0, ROW_CAP);
    const overflow = visible.length > ROW_CAP;

    const rowsHtml = showing.map(t => {
      const picked = allPickedTargets().has(t.fullName);
      return `
        <label class="table-pick-row${picked ? ' picked' : ''}" data-table-row="${escapeHtml(t.fullName)}">
          <input type="checkbox" data-pick-table="${escapeHtml(t.fullName)}" ${picked ? 'checked' : ''} style="margin:0;flex-shrink:0">
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--mono);font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(t.name)}</div>
            <div style="font-size:10.5px;color:var(--text3);font-family:var(--mono)">${escapeHtml(t.fullName)} · L${t.level} · ${formatRows(t.rows)} rows</div>
          </div>
        </label>`;
    }).join('');

    const emptyState = visible.length === 0
      ? `<div style="padding:1.5rem;text-align:center;color:var(--text3);font-size:12.5px">
           ${search ? 'No tables match "' + escapeHtml(search) + '". Try a shorter or different search.' : 'No tables in this bucket.'}
         </div>`
      : '';

    const overflowNote = overflow
      ? `<div style="padding:0.6rem 0.85rem;background:var(--amber-bg);border:1px solid rgba(245,158,11,0.3);border-radius:var(--r);font-size:11.5px;color:var(--text2);margin-top:0.5rem">
           Showing first ${ROW_CAP} of ${visible.length} matching tables. Narrow your search to see the rest.
         </div>`
      : '';

    return `
      <div class="card bucket-expanded-panel">
        <div style="display:flex;align-items:flex-start;gap:1rem;justify-content:space-between;flex-wrap:wrap;margin-bottom:0.85rem">
          <div style="min-width:0">
            <div style="font-weight:600;font-size:14px">${escapeHtml(bucket.label)} — refine selection</div>
            <div style="font-size:11.5px;color:var(--text3);margin-top:2px">
              ${bucket.tables.length} total · ${pickedInBucket} picked
              ${search ? ` · ${visible.length} match search` : ''}
            </div>
          </div>
          <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
            <button class="btn btn-sm" data-bucket-select-all="${escapeHtml(bucket.key)}" ${visible.length === 0 || allVisiblePicked ? 'disabled' : ''}>
              ${search ? `Select all ${visible.length} shown` : 'Select all'}
            </button>
            <button class="btn btn-sm" data-bucket-deselect-all="${escapeHtml(bucket.key)}" ${visiblePickedCount === 0 ? 'disabled' : ''}>
              ${search ? `Deselect ${visiblePickedCount} shown` : 'Deselect all'}
            </button>
            <button class="btn btn-sm btn-ghost" data-bucket-close="${escapeHtml(bucket.key)}">Close ✕</button>
          </div>
        </div>

        <div style="margin-bottom:0.65rem">
          <input type="text" class="form-input" id="am-bucket-search-${escapeHtml(bucket.key)}"
                 data-bucket-search="${escapeHtml(bucket.key)}"
                 placeholder="Fuzzy search — e.g. 'matter', 'bill', 'mttr'"
                 value="${escapeHtml(search)}"
                 style="font-size:12.5px;font-family:var(--mono)">
        </div>

        <div class="table-pick-list">
          ${rowsHtml}
        </div>
        ${emptyState}
        ${overflowNote}
      </div>`;
  }

  function renderScopePanel() {
    if (!Array.isArray(state.buckets) || state.buckets.length === 0) return '';
    const pairCount = state.pickedPairs.size;
    const standaloneCount = state.pickedStandaloneTargets.size;
    const targetCount = allPickedTargets().size;

    const scopeListOptions = (state.scopeList || []).map(s =>
      `<option value="${escapeHtml(s.scopeId)}"${state.savedScope && state.savedScope.scopeId === s.scopeId ? ' selected' : ''}>${escapeHtml(s.name)} (${s.rootCount || 0} roots${s.pairCount ? ', ' + s.pairCount + ' pairs' : ''}${s.expandedCount ? ', ' + s.expandedCount + ' expanded' : ''})</option>`
    ).join('');

    const savedBanner = state.savedScope
      ? `<div class="notice" style="margin-top:0.85rem">
          <strong>Scope saved:</strong> "${escapeHtml(state.savedScope.name)}" —
          ${(state.savedScope.rootTables || []).length} root tables,
          ${(state.savedScope.expandedTables || []).length} FK dependencies pulled in${
            state.savedScope.sourceTargetPairs && state.savedScope.sourceTargetPairs.length > 0
              ? `, ${state.savedScope.sourceTargetPairs.length} confirmed source→target pair${state.savedScope.sourceTargetPairs.length === 1 ? '' : 's'}`
              : ''
          }.
          Ready to migrate.
        </div>`
      : '';

    const overWarn = pairCount > 15
      ? `<div class="notice" style="margin-top:0.85rem;background:var(--amber-bg);border-color:rgba(245,158,11,0.4)">
          <strong>${pairCount} pairs picked.</strong> The agent's budget comfortably covers ~10–15 source-target pairs per run. With ${pairCount} pairs, the run may not finish all of them. Consider splitting (e.g. master files first, transactions later) for predictable runs.
        </div>`
      : '';

    let summaryText;
    if (targetCount === 0) {
      summaryText = '<span style="color:var(--text3);font-style:italic">Nothing picked yet — open a source card above to begin.</span>';
    } else {
      const parts = [];
      if (pairCount > 0) parts.push(`<strong style="color:var(--text)">${pairCount}</strong> source→target pair${pairCount === 1 ? '' : 's'}`);
      if (standaloneCount > 0) parts.push(`<strong style="color:var(--text)">${standaloneCount}</strong> standalone target${standaloneCount === 1 ? '' : 's'}`);
      summaryText = parts.join(' + ') + ` → <strong style="color:var(--text)">${targetCount}</strong> target table${targetCount === 1 ? '' : 's'} in scope`;
    }

    return `
      <div class="card">
        <div class="panel-title">Working scope</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div>
            <label style="display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.35rem">Build from picks</label>
            <div style="padding:0.7rem 0.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);font-size:12.5px;color:var(--text2);min-height:54px">${summaryText}</div>
            <div style="margin-top:0.6rem;display:flex;gap:0.4rem">
              <input type="text" class="form-input" id="am-scope-name" placeholder="Name this scope (e.g. Master Files)" style="flex:1;font-size:12.5px" value="${state.savedScope ? escapeHtml(state.savedScope.name) : ''}">
              <button class="btn btn-primary btn-sm" id="am-save-scope-btn" ${targetCount === 0 ? 'disabled' : ''}>Save scope</button>
            </div>
          </div>
          <div>
            <label style="display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.35rem">Or load an existing scope</label>
            <select class="form-input" id="am-load-scope" style="font-size:12.5px">
              <option value="">— Choose a saved scope —</option>
              ${scopeListOptions}
            </select>
            <div style="font-size:10.5px;color:var(--text3);margin-top:0.4rem;line-height:1.5">
              Reusable scopes let you migrate in stages: master files first, transactions later. Each saved scope can be re-run any time.
            </div>
          </div>
        </div>
        ${overWarn}
        ${savedBanner}
      </div>`;
  }

  // Advanced collapsed section: target-side bucket picker for adding
  // standalone target tables that have no source counterpart.
  function renderAdvancedTargetsSection() {
    const open = !!state.showAdvancedTargets;
    const standaloneCount = state.pickedStandaloneTargets.size;
    const summary = standaloneCount > 0
      ? `<span style="color:var(--accent);font-weight:600">${standaloneCount} standalone target${standaloneCount === 1 ? '' : 's'} picked</span>`
      : '<span style="color:var(--text3)">No standalone targets picked</span>';
    if (!open) {
      return `<div class="card" style="padding:0.7rem 0.95rem">
        <div style="display:flex;align-items:center;gap:0.85rem;justify-content:space-between">
          <div>
            <div style="font-size:12.5px;font-weight:600">Advanced: add target tables directly</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">For seeding target tables that have no source counterpart (e.g. 3E lookups). ${summary}</div>
          </div>
          <button class="btn btn-sm" id="am-advanced-toggle">Show ▾</button>
        </div>
      </div>`;
    }
    // Open: render the target buckets + global search as before, but in a
    // visually demoted container.
    return `
      <div class="card" style="background:var(--bg2)">
        <div style="display:flex;align-items:center;gap:0.85rem;justify-content:space-between;margin-bottom:0.85rem">
          <div>
            <div style="font-size:12.5px;font-weight:600">Advanced: add target tables directly</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${summary}</div>
          </div>
          <button class="btn btn-sm" id="am-advanced-toggle">Hide ▴</button>
        </div>
        ${renderGlobalPicker()}
        ${renderBucketCards()}
      </div>`;
  }

  function renderGoalSection() {
    const bothConfigured = state.conns.source && state.conns.target;
    const haveScope = !!state.savedScope;
    const canStart = bothConfigured && haveScope;
    const placeholder = haveScope
      ? `Propose mappings for the scope "${state.savedScope.name}". Stay focused on these tables.`
      : `Save a scope above first, then describe what the agent should do.`;
    return `
      <div class="card">
        <div class="field">
          <label>What should the agent do?</label>
          <textarea id="am-goal" class="form-textarea" placeholder="${escapeHtml(placeholder)}" ${canStart ? '' : 'disabled'}>${haveScope ? `Propose mappings for the scope "${escapeHtml(state.savedScope.name)}".` : ''}</textarea>
          <div class="hint">The agent reads the scoped target tables, introspects the source, and proposes source-to-target column mappings. You review and approve before anything is committed.</div>
        </div>
        <div class="actions">
          <button class="btn btn-primary btn-sm" id="am-start-btn" ${canStart ? '' : 'disabled'}>▶ Start migration</button>
        </div>
      </div>`;
  }

  function renderSetup() {
    state.view = 'setup';
    setTopbarStatus('Ready');

    if (!state.featureEnabled) { renderDisabled(); return; }

    const bothConfigured = state.conns.source && state.conns.target;
    const haveBuckets = Array.isArray(state.buckets) && state.buckets.length > 0;

    let body = '';
    body += renderConnectionSummary();
    if (bothConfigured) {
      body += renderPlanSection();
      // PRIMARY picker: source cards.
      body += renderSourceCards();
      if (haveBuckets) {
        body += renderScopePanel();
        // Advanced (collapsed) panel — target buckets for adding standalone
        // target tables that have no source counterpart (e.g. seeding 3E
        // lookups). Hidden behind a toggle.
        body += renderAdvancedTargetsSection();
      }
      body += renderGoalSection();
    } else {
      body += `<div class="notice"><strong>Configure source and target connections</strong> on the
        <a href="/connections.html" style="color:var(--accent);text-decoration:none">Connections page</a>
        to begin. Cygenix will introspect your target's foreign-key graph and propose a load order.</div>`;
    }

    stage.innerHTML = body;

    // Wire buttons
    const loadSrcBtn = document.getElementById('am-load-source-btn');
    if (loadSrcBtn) loadSrcBtn.addEventListener('click', () => loadSourceSchema(true));

    const genBtn = document.getElementById('am-generate-plan-btn');
    if (genBtn) genBtn.addEventListener('click', () => loadOrCreatePlan(false));

    const regenBtn = document.getElementById('am-regenerate-plan-btn');
    if (regenBtn) regenBtn.addEventListener('click', () => {
      state.plan = null;
      state.buckets = [];
      state.pickedStandaloneTargets = new Set();
      state.pickedPairs = new Map();
      state.openTargetPicker = null;
      state.expandedBucket = null;
      state.bucketSearch = {};
      state.globalSearch = '';
      state.savedScope = null;
      autoMatchCache = {};
      loadOrCreatePlan(true);
    });

    // Source-card handlers (open/close source group)
    document.querySelectorAll('[data-srcgroup]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('[data-srcgroup-btn], [data-pick-source], [data-srcgroup-search], [data-srcgroup-close], [data-open-target-picker], [data-pick-target-for], [data-cancel-target-picker], [data-src-row], #am-target-picker-search, [data-target-picker]')) return;
        expandSourceGroup(el.getAttribute('data-srcgroup'));
      });
    });
    document.querySelectorAll('[data-srcgroup-btn]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        expandSourceGroup(el.getAttribute('data-srcgroup-btn'));
      });
    });
    document.querySelectorAll('[data-srcgroup-close]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        expandSourceGroup(el.getAttribute('data-srcgroup-close'));
      });
    });
    document.querySelectorAll('[data-srcgroup-search]').forEach(el => {
      el.addEventListener('input', (e) => {
        setSourceGroupSearch(el.getAttribute('data-srcgroup-search'), el.value);
      });
    });
    document.querySelectorAll('[data-pick-source]').forEach(el => {
      el.addEventListener('change', (e) => {
        e.stopPropagation();
        togglePairPick(el.getAttribute('data-pick-source'));
      });
    });
    document.querySelectorAll('[data-open-target-picker]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        openTargetPickerFor(el.getAttribute('data-open-target-picker'));
      });
    });
    document.querySelectorAll('[data-pick-target-for]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const src   = el.getAttribute('data-pick-target-for');
        const tgt   = el.getAttribute('data-pick-target-name');
        const conf  = parseFloat(el.getAttribute('data-pick-target-conf'));
        const reason= el.getAttribute('data-pick-target-reason');
        setPairTarget(src, tgt, conf, reason);
      });
    });
    document.querySelectorAll('[data-cancel-target-picker]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        state.openTargetPicker = null;
        state.targetPickerSearch = '';
        renderSetup();
      });
    });
    const tgtPickerSearch = document.getElementById('am-target-picker-search');
    if (tgtPickerSearch) {
      tgtPickerSearch.addEventListener('input', (e) => {
        state.targetPickerSearch = e.target.value || '';
        renderSetup();
        Promise.resolve().then(() => {
          const el = document.getElementById('am-target-picker-search');
          if (el) { el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
        });
      });
    }

    // Advanced section toggle
    const advBtn = document.getElementById('am-advanced-toggle');
    if (advBtn) advBtn.addEventListener('click', () => {
      state.showAdvancedTargets = !state.showAdvancedTargets;
      renderSetup();
    });

    // Card click handlers (open/close the bucket — does NOT toggle selection)
    document.querySelectorAll('[data-bucket]').forEach(el => {
      el.addEventListener('click', (e) => {
        // Don't double-fire when an interactive child is clicked
        if (e.target.closest('[data-bucket-btn], [data-pick-table], [data-bucket-select-all], [data-bucket-deselect-all], [data-bucket-close], [data-bucket-search], [data-global-row], #am-global-search')) return;
        expandBucket(el.getAttribute('data-bucket'));
      });
    });
    document.querySelectorAll('[data-bucket-btn]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        expandBucket(el.getAttribute('data-bucket-btn'));
      });
    });

    // Inside the expanded panel: per-table checkboxes, search box,
    // select-all / deselect-all, and close.
    document.querySelectorAll('[data-pick-table]').forEach(el => {
      el.addEventListener('change', (e) => {
        toggleTablePick(el.getAttribute('data-pick-table'));
      });
    });
    document.querySelectorAll('[data-bucket-search]').forEach(el => {
      el.addEventListener('input', (e) => {
        setBucketSearch(el.getAttribute('data-bucket-search'), el.value);
      });
    });

    // Cross-bucket "Find a table" search input
    const globalSearch = document.getElementById('am-global-search');
    if (globalSearch) {
      globalSearch.addEventListener('input', (e) => setGlobalSearch(e.target.value));
    }
    document.querySelectorAll('[data-bucket-select-all]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        selectAllVisibleInBucket(el.getAttribute('data-bucket-select-all'));
      });
    });
    document.querySelectorAll('[data-bucket-deselect-all]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        deselectAllVisibleInBucket(el.getAttribute('data-bucket-deselect-all'));
      });
    });
    document.querySelectorAll('[data-bucket-close]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        expandBucket(el.getAttribute('data-bucket-close'));  // toggles it closed
      });
    });

    // Save-scope and load-scope
    const saveBtn = document.getElementById('am-save-scope-btn');
    if (saveBtn) saveBtn.addEventListener('click', () => {
      const nameEl = document.getElementById('am-scope-name');
      saveScope(nameEl ? nameEl.value : '');
    });
    const loadSel = document.getElementById('am-load-scope');
    if (loadSel) loadSel.addEventListener('change', (e) => {
      selectScope(e.target.value);
    });

    // Start migration
    const startBtn = document.getElementById('am-start-btn');
    if (startBtn) startBtn.addEventListener('click', startRun);
  }

  async function startRun() {
    const goalEl = document.getElementById('am-goal');
    const goal = goalEl ? goalEl.value.trim() : '';
    if (!state.conns.source || !state.conns.target) {
      alert('Both source and target connections must be configured first.');
      return;
    }
    if (!state.savedScope) {
      alert('Save a scope before starting the migration.');
      return;
    }
    if (goal.length < 10) {
      alert('Please describe what the agent should do (at least a sentence).');
      return;
    }
    stopConnectionWatcher();
    renderLoading('Starting agent…');
    try {
      const result = await api('/agent/migrate', {
        method: 'POST',
        body: JSON.stringify(buildAgentMigrateBody(goal)),
      });
      state.currentRunId = result.runId;
      state.lastSeq = 0;
      saveActiveRun(result.runId);
      startPolling();
    } catch (e) {
      if (e instanceof ApiNotImplementedError) {
        renderBackendPending();
      } else {
        renderError(e.message);
      }
    }
  }

    state.view = 'pending';
    setTopbarStatus('Backend pending');
    stage.innerHTML = `

              <code style="font-family:var(--mono);font-size:11.5px;color:var(--text);background:var(--bg3);padding:1px 5px;border-radius:3px">/api/agent/run/:id/respond</code>)

  function renderRunning(run, messages) {
    state.view = 'running';
    setTopbarStatus('Running');

    const usage = run.tokenUsage || { input: 0, output: 0, costUSD: 0 };
    const cap = (run.budgetCap && run.budgetCap.maxCostUSD) || 10.0;
    const turnCap = (run.budgetCap && run.budgetCap.maxTurns) || 24;
    const pct = Math.min(100, Math.round((usage.costUSD / cap) * 100));
    const entries = messagesToLogEntries(messages);

    const turnCount = (messages || []).filter(m => m.role === 'assistant').length;
    const proposalCount = (messages || []).reduce((acc, m) => {
      if (m.role === 'assistant' && Array.isArray(m.content)) {
        for (const b of m.content) {
          if (b.type === 'tool_use' && b.name === 'propose_table_mapping') acc++;
        }
      }
      return acc;
    }, 0);
    const startedAt = run.createdAt ? new Date(run.createdAt).getTime() : Date.now();
    const elapsedSec = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
    const elapsedStr = elapsedSec < 60 ? `${elapsedSec}s` : `${Math.floor(elapsedSec / 60)}m ${elapsedSec % 60}s`;

    stage.innerHTML = `
      <div class="status-bar">
        <div class="status-left">
          <div class="status-dot"></div>
          <div>
            <div class="status-text">Agent running</div>
            <div class="status-meta">${escapeHtml(currentActivity(messages))}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:0.85rem;flex-wrap:wrap;justify-content:flex-end">
          <div class="status-meta" title="Elapsed time since run started">⏱ ${elapsedStr}</div>
          <div class="status-meta" title="Model round-trips so far (cap: ${turnCap})">Turn ${turnCount}/${turnCap}</div>
          ${proposalCount > 0 ? `<div class="status-meta">${proposalCount} proposal${proposalCount === 1 ? '' : 's'}</div>` : ''}
          <div class="cost-meter">
            <strong>$${usage.costUSD.toFixed(3)}</strong>
            <span>/ $${cap.toFixed(2)}</span>
            <span style="margin-left:4px">(${pct}%)</span>
          </div>
          <button class="btn btn-danger btn-sm" id="am-cancel-btn">Cancel</button>
        </div>
      </div>
      <div class="log" id="am-log">

          ? '<div class="log-empty">Waiting for the agent to start…</div>'
          : entries.map(renderLogEntry).join('')}

    const cancelBtn = document.getElementById('am-cancel-btn');
    if (cancelBtn) cancelBtn.addEventListener('click', cancelRun);

  function currentActivity(messages) {
    if (!messages || messages.length === 0) return 'Initializing…';
    const last = messages[messages.length - 1];
    if (last.role === 'assistant' && last.content) {
      for (const block of last.content) {
        if (block.type === 'tool_use') return prettyToolName(block.name) + '…';
      }
    }
    return 'Thinking…';
  }

  function prettyToolName(name) {
    return ({
      list_schemas:            'Listing schemas',
      list_tables:             'Listing tables',
      search_tables:           'Searching tables',
      describe_tables:         'Describing tables',
      get_table_relationships: 'Reading relationships',
      sample_table:            'Sampling rows',
      propose_table_mapping:   'Proposing mapping',
      finalize_proposal:       'Finalizing proposal',
      introspect_source_schema: 'Reading source schema',
      introspect_target_schema: 'Reading target schema',
      propose_mapping:         'Preparing proposal',
      ask_user:                'Awaiting your input',
    })[name] || name;
  }

  function messagesToLogEntries(messages) {
    const entries = [];
    for (const msg of messages || []) {
      if (msg.role === 'assistant' && Array.isArray(msg.content)) {
        for (const block of msg.content) {
          if (block.type === 'text' && block.text && block.text.trim()) {
            entries.push({ kind: 'thinking', title: 'Thinking', detail: block.text.trim() });
          } else if (block.type === 'tool_use') {
            entries.push({ kind: 'tool', title: prettyToolName(block.name), detail: summarizeToolInput(block.name, block.input) });
          }
        }
      } else if (msg.role === 'user' && Array.isArray(msg.content)) {
        for (const block of msg.content) {
          if (block.type === 'tool_result') {
            entries.push({
              kind: block.is_error ? 'error' : 'result',
              title: block.is_error ? 'Tool error' : 'Result received',
              detail: summarizeToolResult(block.content),
            });
          }
        }
      }
    }
    return entries;
  }

  function summarizeToolInput(name, input) {
    if (!input) return '';
    switch (name) {
      case 'list_schemas':
        return input.side ? `${input.side}` : '';
      case 'list_tables': {
        const parts = [`${input.side || ''}`];
        if (input.schema) parts.push(`schema: ${input.schema}`);
        if (input.namePattern) parts.push(`pattern: ${input.namePattern}`);
        return parts.filter(Boolean).join(' · ');
      }
      case 'search_tables':
        return input.term ? `${input.side} · "${input.term}"` : input.side || '';
      case 'describe_tables': {
        const tables = Array.isArray(input.tables) ? input.tables : [];
        const preview = tables.slice(0, 3).join(', ');
        const more = tables.length > 3 ? ` +${tables.length - 3} more` : '';
        return `${input.side} · ${preview}${more}`;
      }
      case 'get_table_relationships':
        return `${input.side} · ${input.table || ''}`;
      case 'sample_table':
        return `${input.side} · ${input.table || ''} (${input.n || 5} rows)`;
      case 'propose_table_mapping':
        return `${input.sourceTable || '?'} → ${input.targetTable || '?'}`;
      case 'finalize_proposal':
        return input.summary ? input.summary.slice(0, 80) + (input.summary.length > 80 ? '…' : '') : '';
      case 'introspect_source_schema':
      case 'introspect_target_schema': {
        const parts = [];
        if (input.schemaFilter) parts.push(`schema: ${input.schemaFilter}`);
        if (input.tablePattern) parts.push(`pattern: ${input.tablePattern}`);
        return parts.length ? parts.join(', ') : 'all tables';
      }
      default:
        return JSON.stringify(input).slice(0, 160);
    }
  }

  function summarizeToolResult(content) {
    const text = typeof content === 'string' ? content : JSON.stringify(content);
    return text.length <= 200 ? text : text.slice(0, 200) + '…';
  }

  function renderLogEntry(entry) {
    const icons = { thinking: '·', tool: '→', result: '✓', error: '!' };
    return `
      <div class="log-entry log-${entry.kind}">
        <div class="log-icon">${icons[entry.kind] || '·'}</div>
        <div class="log-body">
          <div class="log-title">${escapeHtml(entry.title)}</div>
          ${entry.detail ? `<div class="log-detail">${escapeHtml(entry.detail)}</div>` : ''}
        </div>
      </div>`;
  }

  async function cancelRun() {
    if (!state.currentRunId) return;
    if (!confirm('Cancel this agent run? You can start a new one afterwards.')) return;
    try {
      await api(`/agent/run/${state.currentRunId}/cancel`, { method: 'POST' });
    } catch (e) { console.warn('[AgentiveMigration] cancel failed:', e.message); }
    stopPolling();
    clearActiveRun();
    state.currentRunId = null;
    state.conns = readConnections();
    renderSetup();
    startConnectionWatcher();
  }

  function getActiveProjectId() {
    try {
      return localStorage.getItem('cygenix_active_project_id') || '';
    } catch { return ''; }
  }

  // Build the body for /api/agent/migrate, including the user's CURRENT
  // source/target connections from localStorage. The agent backend prefers
  // body-supplied connections over its Cosmos record, so this guarantees
  // the agent operates on the same database the page is showing.
  //
  // IMPORTANT: We also send srcConnMode and tgtConnMode. The agent's
  // verify-targets step uses these flags to disambiguate Azure-Function
  // targets from direct-SQL targets — without them, an Azure-Function
  // target whose tgtConnString happens to be empty was being reported back
  // as "target not configured" because the agent had no signal that azure
  // mode was the user's intent. Fix: send the mode explicitly, and only
  // send the connection field that matches the chosen mode.
  function buildAgentMigrateBody(goal) {
    const out = { direction: 'source_to_target', goal };
    // Active project id — enables per-project memory loading on the backend.
    // Empty string is acceptable; the agent silently runs without memory in
    // that case (same behaviour as before this feature existed).
    out.projectId = getActiveProjectId();
    // Scope id — when present, the agent anchors its run on the scope's
    // effective table list and writes a "loaded tables" memory entry on
    // successful approval (see agent-scope-wiring doc).
    if (state.savedScope && state.savedScope.scopeId) {
      out.scopeId = state.savedScope.scopeId;
    }
    try {
      const c = (typeof CygenixConnections !== 'undefined' && CygenixConnections.get)
        ? (CygenixConnections.get() || {}) : {};

      // Source — pick the right field based on mode.
      const srcMode = c.srcConnMode === 'azure' ? 'azure' : 'direct';
      out.srcConnMode = srcMode;
      if (srcMode === 'azure' && c.srcFnUrl) {
        out.srcFnUrl = c.srcFnUrl;
        if (c.srcFnKey) out.srcFnKey = c.srcFnKey;
      } else if (srcMode === 'direct' && c.srcConnString) {
        out.srcConnString = c.srcConnString;
      }

      // Target — same pattern.
      const tgtMode = c.tgtConnMode === 'azure' ? 'azure' : 'direct';
      out.tgtConnMode = tgtMode;
      if (tgtMode === 'azure' && c.tgtFnUrl) {
        out.tgtFnUrl = c.tgtFnUrl;
        if (c.tgtFnKey) out.tgtFnKey = c.tgtFnKey;
      } else if (tgtMode === 'direct' && c.tgtConnString) {
        out.tgtConnString = c.tgtConnString;
      }
    } catch (e) {
      console.warn('[AgentiveMigration] could not read connections for migrate body:', e.message);
    }
    return out;
  }

  function renderProposalApproval(run) {
    state.view = 'approval';
    setTopbarStatus('Awaiting your review');
    const payload = (run.pendingApproval && run.pendingApproval.payload) || {};
    const summary = payload.summary || 'No summary provided.';
    const proposedJobs = Array.isArray(payload.proposedJobs) ? payload.proposedJobs : [];
    const decisionsForUser = Array.isArray(payload.decisionsForUser) ? payload.decisionsForUser : [];
    const risks = Array.isArray(payload.risks) ? payload.risks : [];
    const finalized = !!payload.finalized;

    // Scope-coverage fields (added by the server when the run was scope-driven).
    // scopedPairCount=0 means unscoped run — show no coverage indicator.
    const scopedPairCount = Number(payload.scopedPairCount) || 0;
    const unproposedScopedPairs = Array.isArray(payload.unproposedScopedPairs) ? payload.unproposedScopedPairs : [];
    const summaryWarnings = Array.isArray(payload.summaryWarnings) ? payload.summaryWarnings : [];

    // Final cost for this run. tokenUsage is updated by the server after
    // every turn and persisted to Cosmos, so by the time we render this
    // page it holds the run's total. costUSD is 0 only if the run never
    // made a real Anthropic call (e.g. stub mode); show nothing in that
    // case rather than "$0.00", which would look like a bug.
    const runCostUSD = (run.tokenUsage && typeof run.tokenUsage.costUSD === 'number') ? run.tokenUsage.costUSD : 0;
    const costText = runCostUSD > 0
      ? (runCostUSD < 0.01 ? '<$0.01' : `$${runCostUSD.toFixed(2)}`)
      : '';

    const totalCols = proposedJobs.reduce((acc, j) => acc + (Array.isArray(j.columnMapping) ? j.columnMapping.length : 0), 0);

    const noJobsNotice = (proposedJobs.length === 0) ? `
      <div class="notice">
        <strong>No table mappings were proposed.</strong>
        ${finalized
          ? 'The agent finished but did not propose any mappings. Read the summary below for why.'
          : 'The agent did not finalize properly (likely hit a limit). The summary below shows what it had time to figure out.'}
      </div>
    ` : '';

    // Coverage gap notice — only shown for scoped runs where the agent
    // proposed fewer pairs than the scope contained. Lists the unproposed
    // pair names so the user knows what's missing regardless of what the
    // summary text says.
    let coverageNotice = '';
    if (scopedPairCount > 0 && proposedJobs.length < scopedPairCount && unproposedScopedPairs.length > 0) {
      const previewCap = 8;
      const previewPairs = unproposedScopedPairs.slice(0, previewCap)
        .map(p => `${escapeHtml(p.source)} → ${escapeHtml(p.target)}`)
        .join(', ');
      const extra = unproposedScopedPairs.length > previewCap
        ? `, and ${unproposedScopedPairs.length - previewCap} more`
        : '';
      coverageNotice = `
        <div class="notice" style="margin:0 0 1rem 0">
          <strong>${proposedJobs.length} of ${scopedPairCount} scoped pairs were mapped.</strong>
          The agent did not finish the full scope this run. Unmapped: ${previewPairs}${extra}.
          Approve what's here, then run again — the agent should pick up the remaining pairs. If this keeps happening on the same pairs, they may be unusually large or have a structural issue worth checking.
        </div>
      `;
    }

    // Summary-honesty warning — fires when the finalize validator detected
    // that the summary mentions a scoped pair the agent did not actually
    // propose. Shown in addition to the coverage notice.
    let summaryWarningNotice = '';
    if (summaryWarnings.length > 0) {
      const msgs = summaryWarnings.map(w => escapeHtml(w.message || '')).join('<br>');
      summaryWarningNotice = `
        <div class="notice" style="margin:0 0 1rem 0;background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.35)">
          <strong>Summary may be inaccurate.</strong>
          The summary appears to describe pair(s) that were not actually emitted as mapping jobs. Trust the "Proposed mapping jobs" list below over the summary text.
          <div style="margin-top:6px;font-size:11.5px;color:var(--text2)">${msgs}</div>
        </div>
      `;
    }

    stage.innerHTML = `
      <div class="approval-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 9v4"/><path d="M12 17h.01"/>
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        </svg>
        <span style="flex:1">The agent proposed <strong>${proposedJobs.length}</strong> mapping${proposedJobs.length === 1 ? '' : 's'} (${totalCols} column${totalCols === 1 ? '' : 's'} total)${scopedPairCount > 0 ? ` of ${scopedPairCount} scoped pair${scopedPairCount === 1 ? '' : 's'}` : ''}. Review before saving.</span>
        ${costText ? `<span title="Total Anthropic API cost for this run" style="font-family:var(--mono);font-size:12px;color:var(--text2);padding:3px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);white-space:nowrap">Run cost: <strong style="color:var(--text)">${costText}</strong></span>` : ''}
      </div>

      ${coverageNotice}
      ${summaryWarningNotice}

      <div class="card">
        <div class="section-label">Summary</div>
        <div class="proposal-summary">${escapeHtml(summary)}</div>

        ${noJobsNotice}

        ${proposedJobs.length > 0 ? `
          <div style="margin-bottom:1rem">
            <div class="section-label">Proposed mapping jobs (${proposedJobs.length})</div>
            <div class="mapping-preview">
              ${proposedJobs.map(j => {
                const cols = Array.isArray(j.columnMapping) ? j.columnMapping : [];
                const high = cols.filter(c => c.match === 'HIGH').length;
                const med  = cols.filter(c => c.match === 'MEDIUM').length;
                const low  = cols.filter(c => c.match === 'LOW').length;
                const conf = j.confidence || 'MEDIUM';
                const warn = Array.isArray(j.warnings) && j.warnings.length > 0 ? j.warnings.length : 0;
                return `
                  <div class="mapping-row">
                    <div class="mapping-name">
                      <span>${escapeHtml(j.sourceTable || '?')}</span>
                      <span class="mapping-arrow">→</span>
                      <span>${escapeHtml(j.targetTable || '?')}</span>
                      <span class="decision-confidence ${escapeHtml(conf.toLowerCase())}" style="margin-left:auto">${escapeHtml(conf)}</span>
                    </div>
                    <div class="mapping-meta">
                      ${cols.length} column${cols.length === 1 ? '' : 's'}
                      ${high > 0 ? ` · ${high} high` : ''}${med > 0 ? ` · ${med} medium` : ''}${low > 0 ? ` · ${low} low` : ''}
                      ${warn > 0 ? ` · ⚠ ${warn} warning${warn === 1 ? '' : 's'}` : ''}
                    </div>
                    ${j.reasoning ? `<div class="decision-reasoning" style="margin-top:6px">${escapeHtml(j.reasoning)}</div>` : ''}
                  </div>`;
              }).join('')}
            </div>
          </div>
        ` : ''}

        ${decisionsForUser.length > 0 ? `
          <div class="decisions">
            <div class="section-label">Decisions for you to weigh in on</div>
            ${decisionsForUser.map(d => `
              <div class="decision">
                <div class="decision-label">${escapeHtml(d.question || '')}</div>
                <div class="decision-reasoning">${escapeHtml(d.context || '')}</div>
              </div>`).join('')}
          </div>` : ''}

        ${risks.length > 0 ? `
          <div class="decisions">
            <div class="section-label">Risks</div>
            ${risks.map(r => `
              <div class="decision">
                <div class="decision-reasoning">⚠ ${escapeHtml(r)}</div>
              </div>`).join('')}
          </div>` : ''}

        <div class="actions">
          <button class="btn btn-danger btn-sm" id="am-reject-btn">Reject &amp; revise</button>
          <button class="btn btn-green btn-sm" id="am-approve-btn"${proposedJobs.length === 0 ? ' disabled' : ''}>
            ✓ Approve &amp; save ${proposedJobs.length} job${proposedJobs.length === 1 ? '' : 's'}
          </button>
        </div>
      </div>`;

    document.getElementById('am-approve-btn').addEventListener('click', () => {
      const projectId = getActiveProjectId();
      respondToApproval('approve', null, null, null, projectId);
    });
    document.getElementById('am-reject-btn').addEventListener('click', async () => {
      const feedback = prompt('What should the agent change? Be specific.');
      if (feedback && feedback.trim()) respondToApproval('reject', null, feedback.trim());
    });
  }

  function renderQuestion(run) {
    state.view = 'question';
    setTopbarStatus('Awaiting your input');
    const payload = (run.pendingApproval && run.pendingApproval.payload) || {};
    const options = Array.isArray(payload.options) ? payload.options : [];

    stage.innerHTML = `
      <div class="card question">
        <h3>${escapeHtml(payload.question || 'The agent has a question.')}</h3>
        ${payload.context ? `<div class="context">${escapeHtml(payload.context)}</div>` : ''}
        <div class="question-options">
          ${options.map((opt, i) => `<button class="question-option" data-idx="${i}">${escapeHtml(opt.label || opt.value || '')}</button>`).join('')}
        </div>
        <div style="margin-top:1rem;display:flex;justify-content:flex-end">
          <button class="btn btn-danger btn-sm" id="am-cancel-q-btn">Cancel run</button>
        </div>
      </div>`;

    document.querySelectorAll('.question-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx, 10);
        const chosen = options[idx];
        if (chosen) respondToApproval('answer', null, null, chosen.value);
      });
    });
    document.getElementById('am-cancel-q-btn').addEventListener('click', cancelRun);
  }

  async function respondToApproval(action, mapping, feedback, answer, projectId) {
    if (!state.currentRunId) return;
    renderLoading('Submitting your response…');
    try {
      const body = { action };
      if (mapping) body.mapping = mapping;
      if (feedback) body.feedback = feedback;
      if (answer != null) body.answer = answer;
      if (projectId) body.projectId = projectId;
      await api(`/agent/run/${state.currentRunId}/respond`, {
        method: 'POST', body: JSON.stringify(body),
      });
      startPolling();
    } catch (e) { renderError(e.message); }
  }

  function renderCompleted(run) {
    state.view = 'completed';
    setTopbarStatus('Completed');
    const result = run.result || {};
    const firstJobId = result.firstJobId;
    const jobCount = result.jobCount || 0;

    // Final run cost — same logic as the approval screen. tokenUsage was
    // persisted by the server on every turn so it's still here after
    // approval and after the page is reloaded.
    const runCostUSD = (run.tokenUsage && typeof run.tokenUsage.costUSD === 'number') ? run.tokenUsage.costUSD : 0;
    const costText = runCostUSD > 0
      ? (runCostUSD < 0.01 ? '<$0.01' : `$${runCostUSD.toFixed(2)}`)
      : '';

    stage.innerHTML = `
      <div class="card completed">
        <div class="success-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2>${jobCount > 0 ? `Saved ${jobCount} mapping job${jobCount === 1 ? '' : 's'}` : 'Run complete'}</h2>
        <p>${escapeHtml(result.summary || 'The run is finished.')}</p>
        ${costText ? `<p style="font-size:12px;color:var(--text2);margin-top:-0.4rem">Run cost: <strong style="color:var(--text);font-family:var(--mono)">${costText}</strong></p>` : ''}
        <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap">
          ${firstJobId ? `<a class="btn btn-primary btn-sm" href="/object_mapping.html?edit=${encodeURIComponent(firstJobId)}">Open first job in Object Mapping</a>` : ''}
          ${jobCount > 1 ? `<a class="btn btn-sm" href="/dashboard.html#jobs">View all jobs</a>` : ''}
          <button class="btn btn-sm" id="am-new-btn">Start a new run</button>
        </div>
      </div>`;
    document.getElementById('am-new-btn').addEventListener('click', () => {
      clearActiveRun();
      state.currentRunId = null;
      state.conns = readConnections();
      // Reset scope-related state so the user can build a fresh scope (or
      // re-select an existing one). The plan persists across runs because
      // it's tied to the target schema, not the run.
      state.pickedStandaloneTargets = new Set();
      state.pickedPairs = new Map();
      state.openTargetPicker = null;
      state.expandedBucket = null;
      state.expandedSourceGroup = null;
      state.bucketSearch = {};
        state.globalSearch = '';
      state.savedScope = null;
      renderSetup();
      startConnectionWatcher();
      // Refresh the scope list — a new run may have written a "loaded"
      // memory entry that the next session benefits from.
      loadScopeList().then(() => {
        if (state.view === 'setup') renderSetup();
      });
    });
  }

  function renderFailed(run) {
    state.view = 'failed';
    setTopbarStatus('Failed');
    stage.innerHTML = `
      <div class="error-card">
        <h3>Run failed</h3>
        <p>${escapeHtml((run.result && run.result.error) || 'The agent encountered an error and could not complete.')}</p>
        <button class="btn btn-sm" id="am-retry-btn">Start a new run</button>
      </div>`;
    document.getElementById('am-retry-btn').addEventListener('click', () => {
      clearActiveRun();
      state.currentRunId = null;
      state.conns = readConnections();
      renderSetup();
      startConnectionWatcher();
    });
  }

  // ── Polling ───────────────────────────────────────────────────
  function startPolling() {
    stopPolling();
    poll();
    state.polling = setInterval(poll, POLL_INTERVAL_MS);
  }
  function stopPolling() {
    if (state.polling) { clearInterval(state.polling); state.polling = null; }
  }

  async function poll() {
    if (!state.currentRunId) return;
    try {
      const data = await api(`/agent/run/${state.currentRunId}?sinceSeq=${state.lastSeq}`);
      const run = data.run;
      const messages = data.messages || [];
      if (messages.length > 0) state.lastSeq = messages[messages.length - 1].seq || state.lastSeq;

      switch (run.status) {
        case 'running':
          renderRunning(run, data.allMessages || messages);
          break;
        case 'awaiting_approval':
          stopPolling();
          if (run.pendingApproval && run.pendingApproval.type === 'ask_user') renderQuestion(run);
          else renderProposalApproval(run);
          break;
        case 'completed':
          stopPolling();
          clearActiveRun();
          renderCompleted(run);
          break;
        case 'failed':
        case 'cancelled':
          stopPolling();
          clearActiveRun();
          renderFailed(run);
          break;
      }
    } catch (e) {
      console.warn('[AgentiveMigration] poll error:', e.message);
    }
  }

  // ── Boot ──────────────────────────────────────────────────────
  async function init() {
    console.log('[AgentiveMigration] boot diagnostics:', {
      hasCygenixConnections: typeof CygenixConnections !== 'undefined',
      activeProjectId: localStorage.getItem('cygenix_active_project_id'),
      activeProjectSession: sessionStorage.getItem('cygenix_active_project'),
      hasProjects: !!localStorage.getItem('cygenix_projects'),
      projectsLength: (() => {
        try { return JSON.parse(localStorage.getItem('cygenix_projects') || '[]').length; }
        catch { return 'parse-error'; }
      })(),
      hasToken: !!sessionStorage.getItem('cygenix_token'),
    });

    renderLoading('Checking access…');
    await checkFeatureEnabled();
    if (!state.featureEnabled) { renderDisabled(); return; }

    const existing = loadActiveRun();
    if (existing) {
      state.currentRunId = existing;
      renderLoading('Resuming run…');
      startPolling();
      return;
    }

    renderLoading('Loading connections…');
    state.conns = readConnections();
    renderSetup();
    startConnectionWatcher();

    // Load saved scopes for this project so they appear in the dropdown.
    loadScopeList().then(() => {
      if (state.view === 'setup') renderSetup();
    });

    // Kick off source-schema introspection if the source is configured.
    // The source side is the primary picker now, so load eagerly.
    if (state.conns.source) loadSourceSchema(true);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
