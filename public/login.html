<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Cygenix – Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --accent:#3d7eff;--accent2:#2563eb;
  --green:#22c97a;--red:#f04646;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:10px;--r-lg:16px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
.card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r-lg);padding:2.5rem;width:100%;max-width:420px}
.logo{font-family:var(--serif);font-size:1.8rem;color:var(--text);letter-spacing:-0.02em;text-align:center;margin-bottom:0.25rem}
.logo span{color:var(--accent)}
.tagline{font-size:13px;color:var(--text3);text-align:center;margin-bottom:2rem}
.btn{width:100%;padding:0.8rem;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:0.75rem}
.btn:last-child{margin-bottom:0}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:0.5px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-google{background:#fff;color:#3c4043;border:0.5px solid #dadce0}
.btn-google:hover{background:#f8f9fa}
.divider{display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.alert{padding:0.7rem 1rem;border-radius:var(--r);font-size:13px;margin-bottom:1rem}
.alert-error{background:rgba(240,70,70,0.1);border:0.5px solid rgba(240,70,70,0.3);color:#f8a0a0}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;font-size:12px;color:var(--text3);margin-top:1.5rem}
.footer a{color:var(--text2);text-decoration:none}
.footer a:hover{color:var(--text)}
</style>
</head>
<body>
<div class="card" id="main-card">
  <div class="logo">Cyge<span>nix</span></div>
  <div class="tagline">AI-powered SQL database migration</div>

  <div id="alert" class="alert alert-error" style="display:none"></div>

  <button class="btn btn-google" id="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 5.29C4.672 3.163 6.656 1.58 9 1.58z"/></svg>
    Continue with Google
  </button>

  <div class="divider">or</div>

  <button class="btn btn-primary" id="email-btn" onclick="signInWithEmail()">
    Sign in with email &amp; password
  </button>

  <div id="loading" style="display:none;text-align:center;padding:2rem">
    <div class="spinner" style="margin:0 auto 1rem"></div>
    <div style="font-size:13px;color:var(--text2)" id="loading-msg">Signing in…</div>
  </div>
</div>

<div class="footer">
  <a href="/">← Back to cygenix.co.uk</a>
  &nbsp;·&nbsp;
  <a href="/terms.html">Terms</a>
  &nbsp;·&nbsp;
  <a href="/privacy.html">Privacy</a>
</div>

<!-- MSAL.js from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>
<script src="/cookie-consent.js"></script>
<script>
// ── Entra External ID config ─────────────────────────────────────────────────
const ENTRA = {
  clientId:  'f3478996-b2b5-4b21-9a23-a6b97a0e5b13',
  authority: 'https://cygenix.ciamlogin.com/',
  redirectUri: window.location.origin + '/login.html',
  scopes: ['openid', 'profile', 'email'],
};

const msalConfig = {
  auth: {
    clientId:    ENTRA.clientId,
    authority:   ENTRA.authority,
    redirectUri: ENTRA.redirectUri,
    knownAuthorities: ['cygenix.ciamlogin.com'],
    navigateToLoginRequestUrl: false,  // prevent redirect to pre-login URL
  },
  cache: {
    cacheLocation: 'localStorage',
    storeAuthStateInCookie: false,
  },
  system: {
    allowNativeBroker: false,
  },
};

// msalInstance is set after MSAL.js CDN script loads and initializes
let msalInstance = null;

// ── Handle redirect after login ──────────────────────────────────────────────
async function init() {
  // If user just signed out, skip silent re-login and show the login UI
  const justSignedOut = sessionStorage.getItem('cygenix_just_signed_out') === '1';
  sessionStorage.removeItem('cygenix_just_signed_out');

  try {
    const result = await msalInstance.handleRedirectPromise();
    if (result) {
      // Came back from Entra login redirect
      saveSession(result);
      redirectAfterLogin();
      return;
    }

    if (justSignedOut) {
      console.log('[Auth] User just signed out — showing login UI');
      showCard();
      return;
    }

    // Already signed in?
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      // Try silent token refresh
      try {
        const silent = await msalInstance.acquireTokenSilent({
          scopes: ENTRA.scopes,
          account: accounts[0],
        });
        saveSession(silent);
        redirectAfterLogin();
        return;
      } catch(e) {
        // Silent failed — fall through to show login buttons
        console.log('[Auth] Silent token failed, showing login UI');
      }
    }
  } catch(e) {
    console.error('[Auth] Init error:', e);
    showError('Authentication error: ' + e.message);
  }
  // Show login UI
  showCard();
}

function showCard() {
  document.getElementById('main-card').style.display = '';
  document.getElementById('loading').style.display = 'none';
}

function showLoading(msg) {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading-msg').textContent = msg || 'Signing in…';
  document.getElementById('google-btn').style.display = 'none';
  document.getElementById('email-btn').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.style.display = 'block';
  showCard();
}

// ── Sign in methods ──────────────────────────────────────────────────────────
async function signInWithGoogle() {
  if (!msalInstance) { showError('Auth not ready — please wait a moment and try again.'); return; }
  showLoading('Redirecting to Google…');
  try {
    await msalInstance.loginRedirect({
      scopes: ENTRA.scopes,
      extraQueryParameters: { domain_hint: 'google.com' },
    });
  } catch(e) {
    showError('Google sign-in failed: ' + e.message);
  }
}

async function signInWithEmail() {
  if (!msalInstance) { showError('Auth not ready — please wait a moment and try again.'); return; }
  showLoading('Redirecting to sign in…');
  try {
    await msalInstance.loginRedirect({
      scopes: ENTRA.scopes,
    });
  } catch(e) {
    showError('Sign-in failed: ' + e.message);
  }
}

// ── Save session ─────────────────────────────────────────────────────────────
function saveSession(authResult) {
  const account = authResult.account;
  const claims  = authResult.idTokenClaims || {};

  const email  = claims.email || claims.preferred_username || account?.username || '';
  const name   = claims.name  || account?.name || '';
  const userId = claims.sub   || account?.homeAccountId || account?.username || email;
  const exp    = claims.exp ? (claims.exp * 1000) : (Date.now() + 3600000);

  const sessionData = { email, name, userId, exp,
    accessToken: authResult.accessToken,
    idToken:     authResult.idToken,
    provider:    claims.idp || 'entra',
  };

  // Store in BOTH localStorage and sessionStorage for resilience
  const sessionJson = JSON.stringify(sessionData);
  localStorage.setItem('cygenix_entra_account',   sessionJson);
  sessionStorage.setItem('cygenix_entra_account', sessionJson);

  // Legacy keys — keeps cosmos-sync and nav working
  const token = authResult.idToken || authResult.accessToken;
  localStorage.setItem('cygenix_token',   token);
  sessionStorage.setItem('cygenix_token', token);
  sessionStorage.setItem('cygenix_expires', String(exp));
  const userJson = JSON.stringify({
    email, name,
    access_token: authResult.accessToken,
    user_metadata: { full_name: name },
  });
  localStorage.setItem('cygenix_user',   userJson);
  sessionStorage.setItem('cygenix_user', userJson);

  console.log('[Auth] Session saved for:', email);
}

// ── Redirect after login ─────────────────────────────────────────────────────
function redirectAfterLogin() {
  const redirect = sessionStorage.getItem('cygenix_redirect_after_login');
  sessionStorage.removeItem('cygenix_redirect_after_login');
  window.location.href = redirect || '/dashboard.html';
}

// ── Start — wait for MSAL CDN to load then initialise ───────────────────────
document.getElementById('main-card').style.display = 'none';
document.getElementById('loading').style.display = 'block';
document.getElementById('loading-msg').textContent = 'Checking session…';

function startMsal() {
  try {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    msalInstance.initialize().then(init).catch(e => {
      console.error('[Auth] Init failed:', e);
      showError('Authentication init failed: ' + e.message);
      showCard();
    });
  } catch(e) {
    console.error('[Auth] MSAL create failed:', e);
    showError('Authentication failed to load: ' + e.message);
    showCard();
  }
}

// Retry loop — wait up to 5s for MSAL to load from CDN
let msalWait = 0;
function waitForMsal() {
  if (typeof msal !== 'undefined') {
    startMsal();
  } else if (msalWait < 50) {
    msalWait++;
    setTimeout(waitForMsal, 100);
  } else {
    showError('Authentication library failed to load. Please refresh the page.');
    showCard();
  }
}
waitForMsal();
</script>
</body>
</html>
