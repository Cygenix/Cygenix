<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cygenix – Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --accent:#3d7eff;--accent2:#2563eb;--accent-glow:rgba(61,126,255,0.15);
  --green:#22c97a;--green-bg:rgba(34,201,122,0.1);
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:10px;--r-lg:16px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}

.card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r-lg);padding:2.5rem;width:100%;max-width:420px}

.logo{font-family:var(--serif);font-size:1.8rem;color:var(--text);letter-spacing:-0.02em;text-align:center;margin-bottom:0.25rem}
.logo span{color:var(--accent)}
.tagline{font-size:13px;color:var(--text3);text-align:center;margin-bottom:2rem}

.tabs{display:flex;border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.75rem}
.tab{flex:1;padding:0.6rem;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);transition:all 0.15s}
.tab.active{background:var(--accent);color:#fff}

.form-row{margin-bottom:1rem}
.form-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.4rem;display:block}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:0.7rem 0.9rem;font-size:14px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}

.btn{width:100%;padding:0.8rem;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff;margin-bottom:0.75rem}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-google{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2);margin-bottom:0.75rem}
.btn-google:hover{border-color:var(--border2);background:var(--bg3);opacity:0.85}
.btn-ms{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2)}
.btn-ms:hover{opacity:0.85}

.divider{display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

.error-box{background:rgba(240,70,70,0.1);border:0.5px solid rgba(240,70,70,0.3);border-radius:var(--r);padding:0.75rem;font-size:13px;color:#f04646;margin-bottom:1rem;display:none}
.error-box.visible{display:block}
.success-box{background:var(--green-bg);border:0.5px solid rgba(34,201,122,0.3);border-radius:var(--r);padding:0.75rem;font-size:13px;color:var(--green);margin-bottom:1rem;display:none}
.success-box.visible{display:block}

.footer-link{text-align:center;font-size:12px;color:var(--text3);margin-top:1.25rem}
.footer-link a{color:var(--accent);text-decoration:none}
.footer-link a:hover{text-decoration:underline}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Google icon */
.g-icon{width:18px;height:18px;flex-shrink:0}
/* MS icon */
.ms-icon{width:18px;height:18px;flex-shrink:0}
</style>
</head>
<body>

<div class="card">
  <div class="logo">Cyge<span>nix</span></div>
  <div class="tagline">AI-powered cloud migration platform</div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</div>
  </div>

  <div id="error-box" class="error-box"></div>
  <div id="success-box" class="success-box"></div>

  <!-- SIGN IN FORM -->
  <div id="form-signin">
    <div class="form-row">
      <label class="form-label">Email</label>
      <input id="signin-email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-row">
      <label class="form-label">Password</label>
      <input id="signin-password" class="form-input" type="password" placeholder="Your password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') signIn()"/>
    </div>
    <button class="btn btn-primary" id="signin-btn" onclick="signIn()">Sign in</button>
    <div style="text-align:right;margin-top:-0.5rem;margin-bottom:1rem">
      <a href="#" onclick="forgotPassword()" style="font-size:12px;color:var(--text3);text-decoration:none">Forgot password?</a>
    </div>
  </div>

  <!-- SIGN UP FORM -->
  <div id="form-signup" style="display:none">
    <div class="form-row">
      <label class="form-label">Full name</label>
      <input id="signup-name" class="form-input" type="text" placeholder="Your name" autocomplete="name"/>
    </div>
    <div class="form-row">
      <label class="form-label">Email</label>
      <input id="signup-email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-row">
      <label class="form-label">Password <span style="color:var(--text3);font-size:10px;text-transform:none">(min 8 chars)</span></label>
      <input id="signup-password" class="form-input" type="password" placeholder="Choose a strong password" autocomplete="new-password"
        onkeydown="if(event.key==='Enter') signUp()"/>
    </div>
    <button class="btn btn-primary" id="signup-btn" onclick="signUp()">Create account</button>
  </div>

  <div class="divider">or continue with</div>

  <button class="btn btn-google" onclick="loginWithProvider('google')">
    <svg class="g-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <button class="btn btn-ms" onclick="loginWithProvider('microsoft')">
    <svg class="ms-icon" viewBox="0 0 24 24"><path fill="#f25022" d="M1 1h10v10H1z"/><path fill="#00a4ef" d="M13 1h10v10H13z"/><path fill="#7fba00" d="M1 13h10v10H1z"/><path fill="#ffb900" d="M13 13h10v10H13z"/></svg>
    Continue with Microsoft
  </button>

  <div class="footer-link" id="footer-link-signin">
    Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up free</a>
  </div>
  <div class="footer-link" id="footer-link-signup" style="display:none">
    Already have an account? <a href="#" onclick="switchTab('signin')">Sign in</a>
  </div>
</div>

<script>
// ── Netlify Identity ──────────────────────────────────────────────────────────
const identity = window.netlifyIdentity;

// If already logged in, redirect immediately
identity.on('init', user => {
  if (user) window.location.href = '/dashboard.html';
});

identity.on('login', user => {
  window.location.href = '/dashboard.html';
});

identity.on('error', err => {
  showError(err.message || 'Authentication error');
});

identity.init();

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  const isSignin = tab === 'signin';
  document.getElementById('tab-signin').classList.toggle('active', isSignin);
  document.getElementById('tab-signup').classList.toggle('active', !isSignin);
  document.getElementById('form-signin').style.display  = isSignin ? 'block' : 'none';
  document.getElementById('form-signup').style.display  = isSignin ? 'none'  : 'block';
  document.getElementById('footer-link-signin').style.display = isSignin ? 'block' : 'none';
  document.getElementById('footer-link-signup').style.display = isSignin ? 'none'  : 'block';
  clearMessages();
}

// ── Sign in ───────────────────────────────────────────────────────────────────
async function signIn() {
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  if (!email || !password) { showError('Please enter your email and password.'); return; }

  setLoading('signin-btn', true);
  clearMessages();
  try {
    await identity.store.user; // ensure init
    await identity.login({ email, password });
    // login event fires above → redirects to dashboard
  } catch(e) {
    showError(e.message || 'Sign in failed. Check your email and password.');
  }
  setLoading('signin-btn', false);
}

// ── Sign up ───────────────────────────────────────────────────────────────────
async function signUp() {
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 8)          { showError('Password must be at least 8 characters.'); return; }

  setLoading('signup-btn', true);
  clearMessages();
  try {
    await identity.signup({ email, password, data: { full_name: name } });
    showSuccess('Account created! Please check your email to confirm your address, then sign in.');
    switchTab('signin');
  } catch(e) {
    showError(e.message || 'Sign up failed. This email may already be registered.');
  }
  setLoading('signup-btn', false);
}

// ── OAuth providers ───────────────────────────────────────────────────────────
function loginWithProvider(provider) {
  clearMessages();
  identity.open('login');
  // Netlify Identity widget handles OAuth redirect
  // For Google/Microsoft this opens a popup
}

// ── Forgot password ───────────────────────────────────────────────────────────
async function forgotPassword() {
  const email = document.getElementById('signin-email').value.trim();
  if (!email) { showError('Enter your email address above first.'); return; }
  try {
    await identity.requestPasswordRecovery(email);
    showSuccess('Password reset email sent. Check your inbox.');
  } catch(e) {
    showError(e.message || 'Could not send reset email.');
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg; el.classList.add('visible');
  document.getElementById('success-box').classList.remove('visible');
}
function showSuccess(msg) {
  const el = document.getElementById('success-box');
  el.textContent = msg; el.classList.add('visible');
  document.getElementById('error-box').classList.remove('visible');
}
function clearMessages() {
  document.getElementById('error-box').classList.remove('visible');
  document.getElementById('success-box').classList.remove('visible');
}
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
  } else {
    btn.disabled = false;
    btn.innerHTML = btnId === 'signin-btn' ? 'Sign in' : 'Create account';
  }
}
</script>
</body>
</html>
