<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cygenix – Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --accent:#3d7eff;--accent2:#2563eb;
  --green:#22c97a;--green-bg:rgba(34,201,122,0.1);
  --red:#f04646;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:10px;--r-lg:16px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
.card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r-lg);padding:2.5rem;width:100%;max-width:420px}
.logo{font-family:var(--serif);font-size:1.8rem;color:var(--text);letter-spacing:-0.02em;text-align:center;margin-bottom:0.25rem}
.logo span{color:var(--accent)}
.tagline{font-size:13px;color:var(--text3);text-align:center;margin-bottom:2rem}
.tabs{display:flex;border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.75rem}
.tab{flex:1;padding:0.6rem;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);transition:all 0.15s}
.tab.active{background:var(--accent);color:#fff}
.form-row{margin-bottom:1rem}
.form-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.4rem;display:block}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:0.7rem 0.9rem;font-size:14px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}
.btn{width:100%;padding:0.8rem;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:0.75rem}
.btn:last-child{margin-bottom:0}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-social{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2)}
.btn-social:hover{opacity:0.85}
.divider{display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.alert{border-radius:var(--r);padding:0.75rem;font-size:13px;margin-bottom:1rem;display:none}
.alert.visible{display:block}
.alert-error{background:rgba(240,70,70,0.1);border:0.5px solid rgba(240,70,70,0.3);color:var(--red)}
.alert-success{background:var(--green-bg);border:0.5px solid rgba(34,201,122,0.3);color:var(--green)}
.footer-link{text-align:center;font-size:12px;color:var(--text3);margin-top:1.25rem}
.footer-link a{color:var(--accent);text-decoration:none;cursor:pointer}
.forgot-link{text-align:right;margin-top:-0.5rem;margin-bottom:1rem}
.forgot-link a{font-size:12px;color:var(--text3);text-decoration:none;cursor:pointer}
.forgot-link a:hover{color:var(--text2)}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Cyge<span>nix</span></div>
  <div class="tagline">AI-powered cloud migration platform</div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</div>
  </div>

  <div id="alert-error" class="alert alert-error"></div>
  <div id="alert-success" class="alert alert-success"></div>

  <!-- SIGN IN -->
  <div id="form-signin">
    <div class="form-row">
      <label class="form-label">Email</label>
      <input id="signin-email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-row">
      <label class="form-label">Password</label>
      <input id="signin-password" class="form-input" type="password" placeholder="Your password"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"/>
    </div>
    <div class="forgot-link"><a onclick="forgotPassword()">Forgot password?</a></div>
    <button class="btn btn-primary" id="signin-btn" onclick="signIn()">Sign in</button>
  </div>

  <!-- SIGN UP -->
  <div id="form-signup" style="display:none">
    <div class="form-row">
      <label class="form-label">Full name</label>
      <input id="signup-name" class="form-input" type="text" placeholder="Your name" autocomplete="name"/>
    </div>
    <div class="form-row">
      <label class="form-label">Email</label>
      <input id="signup-email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-row">
      <label class="form-label">Password <span style="color:var(--text3);font-size:10px;text-transform:none">(min 8 chars)</span></label>
      <input id="signup-password" class="form-input" type="password" placeholder="Choose a strong password"
        autocomplete="new-password" onkeydown="if(event.key==='Enter')signUp()"/>
    </div>
    <button class="btn btn-primary" id="signup-btn" onclick="signUp()">Create account</button>
  </div>

  <div class="divider">or continue with</div>

  <button class="btn btn-social" onclick="oauthLogin('google')">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <button class="btn btn-social" onclick="oauthLogin('microsoft')">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#f25022" d="M1 1h10v10H1z"/><path fill="#00a4ef" d="M13 1h10v10H13z"/><path fill="#7fba00" d="M1 13h10v10H1z"/><path fill="#ffb900" d="M13 13h10v10H13z"/></svg>
    Continue with Microsoft
  </button>

  <div class="footer-link" id="footer-signin">
    Don't have an account? <a onclick="switchTab('signup')">Sign up free</a>
  </div>
  <div class="footer-link" id="footer-signup" style="display:none">
    Already have an account? <a onclick="switchTab('signin')">Sign in</a>
  </div>
</div>

<script>
const GOTRUE = window.location.origin + '/.netlify/identity';

function saveSession(data) {
  sessionStorage.setItem('cygenix_token',   data.access_token);
  sessionStorage.setItem('cygenix_user',    JSON.stringify(data));
  sessionStorage.setItem('cygenix_expires', String(Date.now() + (data.expires_in || 3600) * 1000));
  if (data.refresh_token) localStorage.setItem('cygenix_refresh_token', data.refresh_token);
  if (data.token_type === 'bearer' && data.user) {
    sessionStorage.setItem('cygenix_user', JSON.stringify({ ...data, ...data.user, access_token: data.access_token }));
  }
}

function redirectAfterLogin(userData) {
  // Check role in app_metadata (set via Netlify Identity admin)
  const role = userData?.app_metadata?.role || userData?.role || '';
  if (role === 'client') {
    window.location.href = '/client.html';
  } else {
    window.location.href = '/projects.html';
  }
}

// Already logged in — go straight to projects
if (sessionStorage.getItem('cygenix_token') &&
    Date.now() < parseInt(sessionStorage.getItem('cygenix_expires') || '0')) {
  try {
    const u = JSON.parse(sessionStorage.getItem('cygenix_user') || '{}');
    redirectAfterLogin(u);
  } catch { window.location.href = '/projects.html'; }
}

// Handle OAuth redirect — GoTrue puts token in URL hash
(function handleOAuthCallback() {
  const hash = window.location.hash;
  if (!hash || !hash.includes('access_token')) return;
  const params = new URLSearchParams(hash.replace(/^#/, ''));
  const token = params.get('access_token');
  if (token) {
    saveSession({ access_token: token, expires_in: parseInt(params.get('expires_in') || '3600') });
    window.history.replaceState(null, '', window.location.pathname);
    // Check role after OAuth
    try {
      const u = JSON.parse(sessionStorage.getItem('cygenix_user') || '{}');
      redirectAfterLogin(u);
    } catch { window.location.href = '/projects.html'; }
  }
})();

async function goTrue(path, body) {
  const res = await fetch(GOTRUE + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.msg || data.error_description || data.error || 'Error ' + res.status);
  return data;
}

async function signIn() {
  const email    = val('signin-email');
  const password = val('signin-password');
  if (!email || !password) { showError('Please enter your email and password.'); return; }
  setLoading('signin-btn', true, 'Sign in');
  clearAlerts();
  try {
    const data = await goTrue('/token?grant_type=password', { email, password });
    saveSession(data);
    redirectAfterLogin(data.user || data);
  } catch(e) { showError(friendly(e.message)); }
  setLoading('signin-btn', false, 'Sign in');
}

async function signUp() {
  const name     = val('signup-name');
  const email    = val('signup-email');
  const password = val('signup-password');
  if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  setLoading('signup-btn', true, 'Create account');
  clearAlerts();
  try {
    await goTrue('/signup', { email, password, data: { full_name: name } });
    showSuccess('Account created! Check your email for a confirmation link, then sign in.');
    switchTab('signin');
  } catch(e) { showError(friendly(e.message)); }
  setLoading('signup-btn', false, 'Create account');
}

async function forgotPassword() {
  const email = val('signin-email');
  if (!email) { showError('Enter your email address above first.'); return; }
  clearAlerts();
  try {
    await goTrue('/recover', { email });
    showSuccess('Password reset email sent — check your inbox.');
  } catch(e) { showError(friendly(e.message)); }
}

function oauthLogin(provider) {
  clearAlerts();
  const redirectTo = encodeURIComponent(window.location.origin + '/projects.html');
  window.location.href = GOTRUE + '/authorize?provider=' + provider + '&redirect_to=' + redirectTo;
}

function switchTab(tab) {
  const s = tab === 'signin';
  $('tab-signin').classList.toggle('active', s);
  $('tab-signup').classList.toggle('active', !s);
  $('form-signin').style.display = s ? 'block' : 'none';
  $('form-signup').style.display = s ? 'none'  : 'block';
  $('footer-signin').style.display = s ? 'block' : 'none';
  $('footer-signup').style.display = s ? 'none'  : 'block';
  clearAlerts();
}

function $(id) { return document.getElementById(id); }
function val(id) { return ($(id)?.value || '').trim(); }
function showError(m)   { const e=$('alert-error');   e.textContent=m; e.classList.add('visible'); $('alert-success').classList.remove('visible'); }
function showSuccess(m) { const e=$('alert-success'); e.textContent=m; e.classList.add('visible'); $('alert-error').classList.remove('visible'); }
function clearAlerts()  { $('alert-error').classList.remove('visible'); $('alert-success').classList.remove('visible'); }
function setLoading(id, on, label) { const b=$(id); b.disabled=on; b.innerHTML=on?'<div class="spinner"></div>':label; }
function friendly(msg) {
  if (!msg) return 'Something went wrong. Please try again.';
  if (msg.includes('invalid_grant') || msg.includes('Invalid login credentials')) return 'Incorrect email or password.';
  if (msg.includes('already registered') || msg.includes('already exists')) return 'This email is already registered — try signing in.';
  if (msg.includes('Email not confirmed')) return 'Please check your email and click the confirmation link first.';
  if (msg.includes('signup is not enabled')) return 'Signups are currently disabled. Contact your administrator.';
  return msg;
}
</script>
</body>
</html>
