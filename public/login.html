<html lang="en">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --accent:#3d7eff;--accent2:#2563eb;
  --green:#22c97a;--green-bg:rgba(34,201,122,0.1);
  --red:#f04646;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:10px;--r-lg:16px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
.card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r-lg);padding:2.5rem;width:100%;max-width:420px}
.logo{font-family:var(--serif);font-size:1.8rem;color:var(--text);letter-spacing:-0.02em;text-align:center;margin-bottom:0.25rem}
.logo span{color:var(--accent)}
.tagline{font-size:13px;color:var(--text3);text-align:center;margin-bottom:2rem}
.tabs{display:flex;border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.75rem}
.tab{flex:1;padding:0.6rem;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);transition:all 0.15s}
.tab.active{background:var(--accent);color:#fff}
.form-row{margin-bottom:1rem}
.form-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.4rem;display:block}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:0.7rem 0.9rem;font-size:14px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}
.btn{width:100%;padding:0.8rem;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:0.75rem}
.btn:last-child{margin-bottom:0}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-social{background:var(--bg3);color:var(--text);border:0.5px solid var(--border2)}
.btn-social:hover{opacity:0.85}
.divider{display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.alert{border-radius:var(--r);padding:0.75rem;font-size:13px;margin-bottom:1rem;display:none}
.alert.visible{display:block}
.alert-error{background:rgba(240,70,70,0.1);border:0.5px solid rgba(240,70,70,0.3);color:var(--red)}
.alert-success{background:var(--green-bg);border:0.5px solid rgba(34,201,122,0.3);color:var(--green)}
.footer-link{text-align:center;font-size:12px;color:var(--text3);margin-top:1.25rem}
.footer-link a{color:var(--accent);text-decoration:none;cursor:pointer}
.forgot-link{text-align:right;margin-top:-0.5rem;margin-bottom:1rem}
.forgot-link a{font-size:12px;color:var(--text3);text-decoration:none;cursor:pointer}
.forgot-link a:hover{color:var(--text2)}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Cyge<span>nix</span></div>
  <div class="tagline" id="login-tagline">AI-powered SQL database migration</div>

  <!-- Shown when redirected from a protected page -->
  <div id="access-banner" style="display:none;background:rgba(61,126,255,0.1);border:0.5px solid rgba(61,126,255,0.3);border-radius:8px;padding:0.75rem;margin-bottom:1.25rem;text-align:center;font-size:13px;color:var(--accent)">
    🔒 <strong>Sign in or create a free account</strong> to access the platform
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</div>
  </div>

  <div id="alert-error" class="alert alert-error"></div>
  <div id="alert-success" class="alert alert-success"></div>

  <!-- SIGN IN -->
  <div id="form-signin">
    <div class="form-row">
      <label class="form-label">Email</label>
      <input id="signin-email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-row">
      <label class="form-label">Password</label>
      <input id="signin-password" class="form-input" type="password" placeholder="Your password"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"/>
    </div>
    <div class="forgot-link"><a onclick="forgotPassword()">Forgot password?</a></div>
    <button class="btn btn-primary" id="signin-btn" onclick="signIn()">Sign in</button>
  </div>

  <!-- SIGN UP -->
  <div id="form-signup" style="display:none">
    <div class="form-row">
      <label class="form-label">Full name</label>
      <input id="signup-name" class="form-input" type="text" placeholder="Your name" autocomplete="name"/>
    </div>
    <div class="form-row">
      <label class="form-label">Email</label>
      <input id="signup-email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email"/>
    </div>
    <div class="form-row">
      <label class="form-label">Password <span style="color:var(--text3);font-size:10px;text-transform:none">(min 8 chars)</span></label>
      <input id="signup-password" class="form-input" type="password" placeholder="Choose a strong password"
        autocomplete="new-password" onkeydown="if(event.key==='Enter')signUp()"/>
    </div>
    <button class="btn btn-primary" id="signup-btn" onclick="signUp()">Create free account</button>
  </div>

  <div class="divider">or continue with</div>

  <button class="btn btn-social" onclick="oauthLogin('google')">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <button class="btn btn-social" onclick="oauthLogin('microsoft')">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#f25022" d="M1 1h10v10H1z"/><path fill="#00a4ef" d="M13 1h10v10H13z"/><path fill="#7fba00" d="M1 13h10v10H1z"/><path fill="#ffb900" d="M13 13h10v10H13z"/></svg>
    Continue with Microsoft
  </button>

  <div class="footer-link" id="footer-signin">
    No account yet? <a onclick="switchTab('signup')">Create a free account</a>
  </div>
  <div class="footer-link" id="footer-signup" style="display:none">
    Already have an account? <a onclick="switchTab('signin')">Sign in</a>
  </div>
  <div class="footer-link" style="margin-top:0.5rem">
    <a href="/" style="color:var(--text3)">← Back to cygenix.co.uk</a>
  </div>
</div>

<script>
const GOTRUE = window.location.origin + '/.netlify/identity';

// Show access banner if redirected from a protected page
(function(){
  const params = new URLSearchParams(window.location.search);
  if (params.get('reason') === 'protected') {
    const banner = document.getElementById('access-banner');
    if (banner) banner.style.display = 'block';
    // Auto-switch to sign-up tab if no account hint
    const tab = params.get('tab');
    if (tab === 'signup') switchTab('signup');
  }
})();

// After successful login, redirect back to where they came from
function getRedirectUrl() {
  return sessionStorage.getItem('cygenix_redirect_after_login') || '/dashboard.html';
}

function saveSession(data) {
  sessionStorage.setItem('cygenix_token',   data.access_token);
  sessionStorage.setItem('cygenix_user',    JSON.stringify(data));
  sessionStorage.setItem('cygenix_expires', String(Date.now() + (data.expires_in || 3600) * 1000));
  if (data.refresh_token) localStorage.setItem('cygenix_refresh_token', data.refresh_token);
  if (data.token_type === 'bearer' && data.user) {
    sessionStorage.setItem('cygenix_user', JSON.stringify({ ...data, ...data.user, access_token: data.access_token }));
  }
}

function redirectAfterLogin(userData) {
  // Check role in app_metadata (set via Netlify Identity admin)
  const role = userData?.app_metadata?.role || userData?.role || '';
  if (role === 'client') {
    window.location.href = '/dashboard.html';
  } else {
    window.location.href = getRedirectUrl();
  }
}

// Already logged in — go straight to projects
if (sessionStorage.getItem('cygenix_token') &&
    Date.now() < parseInt(sessionStorage.getItem('cygenix_expires') || '0')) {
  try {
    const u = JSON.parse(sessionStorage.getItem('cygenix_user') || '{}');
    redirectAfterLogin(u);
  } catch { window.location.href = getRedirectUrl(); }
}

// Handle URL tokens — checks query string (?token=) AND hash (#token=)
// Query string survives Microsoft SafeLinks / Outlook wrapping; hash does not
(function handleTokens() {

  // ── Check query string first — survives SafeLinks redirects ──────────────
  const qp = new URLSearchParams(window.location.search);
  const qInvite    = qp.get('invite_token');
  const qRecovery  = qp.get('recovery_token');

  if (qInvite) {
    window.history.replaceState(null, '', window.location.pathname);
    showInviteAccept(qInvite);
    return;
  }
  if (qRecovery) {
    window.history.replaceState(null, '', window.location.pathname);
    showPasswordReset(qRecovery);
    return;
  }

  // ── Check hash — used by Netlify default emails and OAuth ─────────────────
  let hash = window.location.hash;
  if (!hash || hash === '#') {
    const stored = sessionStorage.getItem('cygenix_pending_token');
    if (stored) { hash = stored; }
  }
  sessionStorage.removeItem('cygenix_pending_token');
  if (!hash) return;
  const params = new URLSearchParams(hash.replace(/^#/, ''));

  const inviteToken = params.get('invite_token');
  if (inviteToken) {
    window.history.replaceState(null, '', window.location.pathname);
    showInviteAccept(inviteToken);
    return;
  }

  const recoveryToken = params.get('recovery_token');
  if (recoveryToken) {
    window.history.replaceState(null, '', window.location.pathname);
    showPasswordReset(recoveryToken);
    return;
  }

  // ── Access token — OAuth redirect (Google, Microsoft) ──────────────────────
  const accessToken = params.get('access_token');
  if (accessToken) {
    saveSession({ access_token: accessToken, expires_in: parseInt(params.get('expires_in') || '3600') });
    window.history.replaceState(null, '', window.location.pathname);
    try {
      const u = JSON.parse(sessionStorage.getItem('cygenix_user') || '{}');
      redirectAfterLogin(u);
    } catch { window.location.href = '/dashboard.html'; }
  }
})();

// Show invite acceptance form — user sets their password
function showInviteAccept(token) {
  const card = document.querySelector('.card') || document.body;
  card.innerHTML = `
    <div class="logo">Cyge<span>nix</span></div>
    <div class="tagline">You've been invited to Cygenix</div>
    <div id="invite-alert" class="alert alert-error" style="display:none"></div>
    <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1.25rem;text-align:center">
      Enter your name then click below.<br>You'll receive an email to set your password.
    </div>
    <div class="form-row">
      <label class="form-label">Your name <span style="color:var(--text3);font-size:10px;text-transform:none">(optional)</span></label>
      <input id="invite-name" class="form-input" type="text" placeholder="Your full name" autocomplete="name"
        onkeydown="if(event.key==='Enter')acceptInvite('${token}')"/>
    </div>
    <button class="btn btn-primary" onclick="acceptInvite('${token}')" style="width:100%">Activate account &amp; set password →</button>
    <div class="footer-link" style="margin-top:1rem">
      <a href="/" style="color:var(--text3)">← Back to cygenix.co.uk</a>
    </div>
  `;
}

// Show password reset form — user sets new password via recovery token
function showPasswordReset(token) {
  const card = document.querySelector('.card') || document.body;
  card.innerHTML = `
    <div class="logo">Cyge<span>nix</span></div>
    <div class="tagline">Set your new password</div>
    <div id="reset-alert" class="alert alert-error" style="display:none"></div>
    <div class="form-row">
      <label class="form-label">New password <span style="color:var(--text3);font-size:10px;text-transform:none">(min 8 chars)</span></label>
      <input id="reset-password" class="form-input" type="password" placeholder="Choose a strong password"
        autocomplete="new-password" onkeydown="if(event.key==='Enter')doPasswordReset('${token}')"/>
    </div>
    <div class="form-row">
      <label class="form-label">Confirm password</label>
      <input id="reset-password2" class="form-input" type="password" placeholder="Repeat your password"
        autocomplete="new-password" onkeydown="if(event.key==='Enter')doPasswordReset('${token}')"/>
    </div>
    <button class="btn btn-primary" onclick="doPasswordReset('${token}')">Set new password &amp; sign in</button>
    <div class="footer-link" style="margin-top:1rem">
      <a href="/login.html" style="color:var(--text3)">← Back to sign in</a>
    </div>
  `;
}

async function doPasswordReset(token) {
  const password  = document.getElementById('reset-password')?.value || '';
  const password2 = document.getElementById('reset-password2')?.value || '';
  const alertEl   = document.getElementById('reset-alert');

  if (!password || password.length < 8) {
    if (alertEl) { alertEl.textContent = 'Password must be at least 8 characters.'; alertEl.style.display = 'block'; }
    return;
  }
  if (password !== password2) {
    if (alertEl) { alertEl.textContent = 'Passwords do not match.'; alertEl.style.display = 'block'; }
    return;
  }

  const btn = document.querySelector('.btn-primary');
  if (btn) { btn.textContent = 'Setting password…'; btn.disabled = true; }

  try {
    const res = await fetch(GOTRUE + '/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, type: 'recovery', password })
    });
    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      const msg = data.msg || data.error_description || data.error || 'Failed to reset password.';
      if (alertEl) { alertEl.textContent = `${msg} (HTTP ${res.status})`; alertEl.style.display = 'block'; }
      if (btn) { btn.textContent = 'Set new password & sign in'; btn.disabled = false; }
      return;
    }

    // Auto-login with returned token
    if (data.access_token) {
      saveSession(data);
      setTimeout(() => { window.location.href = getRedirectUrl(); }, 300);
    } else {
      const card = document.querySelector('.card');
      if (card) card.innerHTML = `
        <div class="logo">Cyge<span>nix</span></div>
        <div class="tagline" style="color:var(--green)">✓ Password updated!</div>
        <div style="font-size:13px;color:var(--text2);text-align:center;margin:1rem 0 1.5rem;line-height:1.6">
          Your password has been set. Please sign in.
        </div>
        <button class="btn btn-primary" onclick="window.location.href='/login.html'" style="width:100%">Sign in now →</button>
      `;
    }
  } catch(e) {
    if (alertEl) { alertEl.textContent = 'Error: ' + e.message; alertEl.style.display = 'block'; }
    if (btn) { btn.textContent = 'Set new password & sign in'; btn.disabled = false; }
  }
}

async function acceptInvite(token) {
  const name    = document.getElementById('invite-name')?.value?.trim() || '';
  const alertEl = document.getElementById('invite-alert');
  const btn     = document.querySelector('.btn-primary');
  if (btn) { btn.textContent = 'Activating…'; btn.disabled = true; }

  try {
    // Step 1: Confirm the invite — Netlify needs a dummy password just to accept the token
    // The real password is set via the recovery email in step 3
    const dummyPw = 'Temp!' + Math.random().toString(36).slice(2,10) + 'Ax9';
    const res = await fetch(GOTRUE + '/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, type: 'signup', password: dummyPw })
    });
    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      const msg = data.msg || data.error_description || data.error || 'Failed to activate account.';
      if (alertEl) { alertEl.textContent = `${msg} (HTTP ${res.status})`; alertEl.style.display = 'block'; }
      if (btn) { btn.textContent = 'Activate account & set password →'; btn.disabled = false; }
      return;
    }

    const email = data.email || data.user?.email || '';

    // Step 2: Update name if provided
    if (data.access_token && name) {
      await fetch(GOTRUE + '/user', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + data.access_token },
        body: JSON.stringify({ data: { full_name: name } })
      }).catch(() => {});
    }

    // Step 3: Send recovery email — this is the ONLY reliable way to set
    // a persistent password in Netlify Identity for invited users
    if (email) {
      await fetch(GOTRUE + '/recover', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      }).catch(() => {});
    }

    // Step 4: Show confirmation — session is active for now, password email sent
    if (data.access_token) saveSession(data);

    const card = document.querySelector('.card');
    if (card) card.innerHTML = `
      <div class="logo">Cyge<span>nix</span></div>
      <div style="font-size:1.4rem;font-weight:600;color:#22c97a;margin-bottom:0.5rem;text-align:center">✓ Account activated!</div>
      <div style="font-size:13px;color:var(--text2);text-align:center;margin:0.75rem 0 1.5rem;line-height:1.75">
        We've sent a <strong style="color:var(--text)">password setup email</strong> to<br>
        <strong style="color:var(--accent)">${email}</strong><br><br>
        Click the link in that email to set your password.<br>
        After that you can sign in here with your email and password.
      </div>
      <div style="background:rgba(34,201,122,0.07);border:0.5px solid rgba(34,201,122,0.25);border-radius:8px;padding:0.875rem 1rem;font-size:12px;color:var(--text2);margin-bottom:1.25rem;line-height:1.6">
        💡 Can't find the email? Check your spam folder or click below to resend.
      </div>
      <button class="btn btn-primary" style="width:100%;margin-bottom:0.75rem"
        onclick="resendSetupEmail('${email}',this)">Resend password setup email</button>
      <button class="btn btn-ghost" style="width:100%"
        onclick="window.location.href='/dashboard.html'">Go to dashboard (set password later) →</button>
    `;

  } catch(e) {
    if (alertEl) { alertEl.textContent = 'Error: ' + e.message; alertEl.style.display = 'block'; }
    if (btn) { btn.textContent = 'Activate account & set password →'; btn.disabled = false; }
  }
}

async function resendSetupEmail(email, btn) {
  if (!email) return;
  if (btn) { btn.textContent = 'Sending…'; btn.disabled = true; }
  await fetch(GOTRUE + '/recover', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  }).catch(() => {});
  if (btn) { btn.textContent = '✓ Sent — check your inbox'; }
}

async function goTrue(path, body) {
  const res = await fetch(GOTRUE + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.msg || data.error_description || data.error || 'Error ' + res.status);
  return data;
}

async function signIn() {
  const email    = val('signin-email');
  const password = val('signin-password');
  if (!email || !password) { showError('Please enter your email and password.'); return; }
  setLoading('signin-btn', true, 'Sign in');
  clearAlerts();
  try {
    const data = await goTrue('/token?grant_type=password', { email, password });
    saveSession(data);
    redirectAfterLogin(data.user || data);
  } catch(e) { showError(friendly(e.message)); }
  setLoading('signin-btn', false, 'Sign in');
}

async function signUp() {
  const name     = val('signup-name');
  const email    = val('signup-email');
  const password = val('signup-password');
  if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  setLoading('signup-btn', true, 'Create account');
  clearAlerts();
  try {
    await goTrue('/signup', { email, password, data: { full_name: name } });
    showSuccess('Account created! Check your email for a confirmation link, then sign in.');
    switchTab('signin');
  } catch(e) { showError(friendly(e.message)); }
  setLoading('signup-btn', false, 'Create account');
}

async function forgotPassword() {
  const email = val('signin-email');
  if (!email) { showError('Enter your email address above first.'); return; }
  clearAlerts();
  try {
    await goTrue('/recover', { email });
    showSuccess('Password reset email sent — check your inbox.');
  } catch(e) { showError(friendly(e.message)); }
}

function oauthLogin(provider) {
  clearAlerts();
  const redirectTo = encodeURIComponent(window.location.origin + '/dashboard.html');
  window.location.href = GOTRUE + '/authorize?provider=' + provider + '&redirect_to=' + redirectTo;
}

function switchTab(tab) {
  const s = tab === 'signin';
  $('tab-signin').classList.toggle('active', s);
  $('tab-signup').classList.toggle('active', !s);
  $('form-signin').style.display = s ? 'block' : 'none';
  $('form-signup').style.display = s ? 'none'  : 'block';
  $('footer-signin').style.display = s ? 'block' : 'none';
  $('footer-signup').style.display = s ? 'none'  : 'block';
  clearAlerts();
}

function $(id) { return document.getElementById(id); }
function val(id) { return ($(id)?.value || '').trim(); }
function showError(m)   { const e=$('alert-error');   e.textContent=m; e.classList.add('visible'); $('alert-success').classList.remove('visible'); }
function showSuccess(m) { const e=$('alert-success'); e.textContent=m; e.classList.add('visible'); $('alert-error').classList.remove('visible'); }
function clearAlerts()  { $('alert-error').classList.remove('visible'); $('alert-success').classList.remove('visible'); }
function setLoading(id, on, label) { const b=$(id); b.disabled=on; b.innerHTML=on?'<div class="spinner"></div>':label; }
function friendly(msg) {
  if (!msg) return 'Something went wrong. Please try again.';
  if (msg.includes('invalid_grant') || msg.includes('Invalid login credentials')) return 'Incorrect email or password.';
  if (msg.includes('already registered') || msg.includes('already exists')) return 'This email is already registered — try signing in.';
  if (msg.includes('Email not confirmed')) return 'Please check your email and click the confirmation link first.';
  if (msg.includes('signup is not enabled')) return 'Signups are currently disabled. Contact your administrator.';
  return msg;
}
