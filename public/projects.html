<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cygenix – My Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="/project-manager.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222733;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --accent:#3d7eff;--accent2:#2563eb;--accent-glow:rgba(61,126,255,0.15);
  --green:#22c97a;--green-bg:rgba(34,201,122,0.1);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);
  --red:#f04646;--red-bg:rgba(240,70,70,0.1);
  --serif:'Syne',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:8px;--r-lg:12px;
}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;border-bottom:0.5px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100}
.logo{font-family:var(--serif);font-size:1.1rem;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:100px;padding:4px 12px 4px 4px;cursor:pointer}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--accent-glow);border:0.5px solid rgba(61,126,255,0.4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--accent)}
.user-name-pill{font-size:12px;color:var(--text2)}
.btn{padding:0.45rem 1rem;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:var(--serif);transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:0.5px solid var(--border2)}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.btn-red{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(240,70,70,0.2)}
.main{max-width:1000px;margin:0 auto;padding:2.5rem 1.5rem}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.page-title{font-size:1.4rem;font-weight:600}
.page-sub{font-size:13px;color:var(--text3);margin-top:2px}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem}
.project-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;transition:border-color 0.15s;cursor:pointer;position:relative}
.project-card:hover{border-color:var(--border2)}
.project-card.complete{border-color:rgba(34,201,122,0.2)}
.project-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:0.3rem}
.project-date{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:1rem}
.project-stats{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
.pstat{font-size:11px;color:var(--text3);font-family:var(--mono)}
.pstat strong{color:var(--text2);font-weight:500}
.project-files{font-size:11px;color:var(--text3);margin-bottom:1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:100px;font-weight:500;font-family:var(--mono)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-gray{background:rgba(255,255,255,0.05);color:var(--text2)}
.project-actions{display:flex;gap:0.5rem;margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--border)}
.empty-state{text-align:center;padding:5rem 1rem;color:var(--text3)}
.empty-state h2{font-size:18px;color:var(--text2);margin-bottom:0.5rem;font-weight:500}
.empty-state p{font-size:13px;margin-bottom:2rem;line-height:1.7}
.loading{text-align:center;padding:4rem;color:var(--text3);font-size:13px}
/* New project modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r-lg);padding:1.75rem;width:420px;max-width:95vw}
.modal-title{font-size:16px;font-weight:600;margin-bottom:0.3rem}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:1.25rem}
.form-row{margin-bottom:1rem}
.form-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.4rem;display:block}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:0.6rem 0.75rem;font-size:13px;color:var(--text);font-family:var(--serif);outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem}
</style>
</head>
<body>

<div class="topbar">
  <a href="/dashboard.html" class="logo">Cyge<span>nix</span></a>
  <div class="topbar-right">
    <a href="/dashboard.html" class="btn btn-ghost">Migration Console</a>
    <div class="user-pill" onclick="window.CygenixAuth.logout()">
      <div class="avatar" id="user-avatar">?</div>
      <span class="user-name-pill" id="user-name">Loading…</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="page-header">
    <div>
      <div class="page-title">My projects</div>
      <div class="page-sub" id="page-sub">Loading…</div>
    </div>
    <button class="btn btn-primary" onclick="openNewProjectModal()">+ New project</button>
  </div>

  <div id="projects-container"><div class="loading">Loading your projects…</div></div>
</div>

<!-- New project modal -->
<div class="modal-overlay" id="new-project-modal">
  <div class="modal">
    <div class="modal-title">New project</div>
    <div class="modal-sub">Give your migration project a name to get started.</div>
    <div class="form-row">
      <label class="form-label">Project name</label>
      <input class="form-input" id="new-project-name" placeholder="e.g. CRM Legacy Migration Q1 2026"
        onkeydown="if(event.key==='Enter') createProject()"/>
    </div>
    <div class="form-row">
      <label class="form-label">Description (optional)</label>
      <input class="form-input" id="new-project-desc" placeholder="Brief notes about this migration"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeNewProjectModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create project</button>
    </div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function fmtDate(iso){ if(!iso)return'—'; return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmt(n){ return n!=null ? Number(n).toLocaleString() : '0'; }

async function loadProjects() {
  const container = $('projects-container');
  try {
    const { projects } = await window.CygenixAuth.listProjects();
    $('page-sub').textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''}`;

    if (projects.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <h2>No projects yet</h2>
          <p>Create a new project to start migrating data.<br>Your progress is saved automatically as you work.</p>
          <button class="btn btn-primary" onclick="openNewProjectModal()">Create your first project</button>
        </div>`;
      return;
    }

    const sorted = projects.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    container.innerHTML = '<div class="projects-grid">' + sorted.map(p => `
      <div class="project-card ${p.status === 'complete' ? 'complete' : ''}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.25rem">
          <div class="project-name">${p.name}</div>
          ${p.status === 'complete'
            ? '<span class="badge badge-green">Complete</span>'
            : '<span class="badge badge-amber">In progress</span>'}
        </div>
        <div class="project-date">Last updated ${fmtDate(p.updatedAt)}</div>
        <div class="project-stats">
          <span class="pstat"><strong>${fmt(p.totalRows)}</strong> rows</span>
          ${p.sourceFile ? `<span class="pstat">src: <strong>${p.sourceFile}</strong></span>` : ''}
          ${p.targetDb   ? `<span class="pstat">→ <strong>${p.targetDb}</strong></span>` : ''}
        </div>
        <div class="project-actions">
          <button class="btn btn-primary" onclick="resumeProject('${p.id}')">Resume →</button>
          ${p.status === 'complete'
            ? `<button class="btn btn-ghost" onclick="viewReport('${p.id}')">View report</button>`
            : ''}
          <button class="btn btn-ghost" style="margin-left:auto" onclick="confirmDelete('${p.id}','${p.name.replace(/'/g,"\\'")}')">Delete</button>
        </div>
      </div>`).join('') + '</div>';

  } catch(e) {
    container.innerHTML = `<div class="empty-state"><h2>Could not load projects</h2><p>${e.message}</p></div>`;
    $('page-sub').textContent = 'Error loading';
  }
}

async function resumeProject(id) {
  try {
    const { project } = await window.CygenixAuth.loadProject(id);
    sessionStorage.setItem('cygenix_active_project', JSON.stringify(project));
    window.location.href = '/dashboard.html?project=' + id;
  } catch(e) {
    alert('Could not load project: ' + e.message);
  }
}

async function viewReport(id) {
  try {
    const { project } = await window.CygenixAuth.loadProject(id);
    if (project.reportData) {
      sessionStorage.setItem('cygenix_report', JSON.stringify(project.reportData));
    } else {
      sessionStorage.setItem('cygenix_report', JSON.stringify(buildReportFromProject(project)));
    }
    window.open('/report.html', '_blank');
  } catch(e) {
    alert('Could not load report: ' + e.message);
  }
}

function buildReportFromProject(p) {
  return {
    id: p.id,
    projectName: p.name,
    userName: p.userName || p.userEmail,
    userEmail: p.userEmail,
    sourceSystem: p.sourceSystem,
    sourceFile: p.sourceFile,
    targetServer: p.targetServer,
    targetDatabase: p.targetDatabase,
    targetTable: p.targetTable,
    totalRows: p.totalRows,
    insertedRows: p.insertedRows,
    errors: p.errors,
    rowsBefore: p.rowsBefore,
    rowsAfter: p.rowsAfter,
    columnMapping: p.columnMapping,
    warnings: p.warnings,
    startedAt: p.startedAt,
    completedAt: p.completedAt,
    tables: p.tables,
  };
}

async function confirmDelete(id, name) {
  if (!confirm(`Delete project "${name}"? This cannot be undone.`)) return;
  try {
    await window.CygenixAuth.deleteProject(id);
    loadProjects();
  } catch(e) {
    alert('Could not delete: ' + e.message);
  }
}

function openNewProjectModal(){ $('new-project-modal').classList.add('open'); setTimeout(()=>$('new-project-name').focus(),100); }
function closeNewProjectModal(){ $('new-project-modal').classList.remove('open'); }

async function createProject() {
  const name = $('new-project-name').value.trim();
  const desc = $('new-project-desc').value.trim();
  if (!name) { alert('Please enter a project name.'); return; }

  try {
    const result = await window.CygenixAuth.saveProject({
      name, description: desc, status: 'in-progress',
      createdAt: new Date().toISOString(),
    }, name);
    closeNewProjectModal();
    $('new-project-name').value = '';
    $('new-project-desc').value = '';
    // Navigate to dashboard with new project
    sessionStorage.setItem('cygenix_active_project', JSON.stringify({ id: result.id, name, description: desc }));
    window.location.href = '/dashboard.html?project=' + result.id;
  } catch(e) {
    alert('Could not create project: ' + e.message + '\n\nIf this says "Blobs", go to Netlify → your site → Storage tab → Enable Blobs, then redeploy.');
  }
}

// Load projects once auth is ready
const checkReady = setInterval(() => {
  if (window.CygenixAuth?.getUser()) {
    clearInterval(checkReady);
    loadProjects();
  }
}, 200);
</script>
</body>
</html>
