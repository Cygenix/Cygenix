<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cygenix – Diagnostics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #0d0f14; color: #e8eaf0; padding: 2rem; font-size: 14px; line-height: 1.8; }
  h1 { font-family: sans-serif; font-size: 1.4rem; margin-bottom: 0.25rem; color: #3d7eff; }
  .sub { font-size: 12px; color: #555a6a; margin-bottom: 2rem; }
  button { background: #3d7eff; color: #fff; border: none; padding: 0.75rem 2rem; font-size: 14px; border-radius: 8px; cursor: pointer; font-family: sans-serif; margin-bottom: 2rem; }
  button:hover { background: #2563eb; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #output { white-space: pre-wrap; }
  .ok  { color: #22c97a; }
  .err { color: #f04646; }
  .inf { color: #8b90a0; }
  .hdr { color: #3d7eff; margin-top: 1rem; font-weight: bold; }
  .warn { color: #f59e0b; }
</style>
</head>
<body>
<h1>Cygenix — Connection Diagnostics</h1>
<p class="sub">Tests your Netlify function setup. Visit: <strong>https://cygenix.netlify.app/diag.html</strong></p>
<button id="run-btn" onclick="run()">▶ Run All Tests</button>
<div id="output"><span style="color:#555a6a">Click the button above to start…</span></div>

<script>
const out = document.getElementById('output');
const btn = document.getElementById('run-btn');

function log(msg, cls) {
  const span = document.createElement('span');
  span.className = cls || '';
  span.textContent = msg + '\n';
  out.appendChild(span);
}

function clear() { out.innerHTML = ''; }

async function run() {
  clear();
  btn.disabled = true;
  btn.textContent = 'Running…';

  const ok   = m => log('✓ ' + m, 'ok');
  const err  = m => log('✗ ' + m, 'err');
  const inf  = m => log('  ' + m, 'inf');
  const warn = m => log('⚠ ' + m, 'warn');
  const hdr  = m => log('\n▸ ' + m, 'hdr');

  log('Cygenix Diagnostics — ' + new Date().toLocaleTimeString(), 'warn');
  log('Page URL: ' + window.location.href, 'inf');
  log('Origin:   ' + window.location.origin, 'inf');

  // ── TEST 1: health function ────────────────────────────────────────────────
  hdr('TEST 1: Health function');
  inf('Calling: /.netlify/functions/health');
  try {
    const r = await fetch('/.netlify/functions/health', {
      signal: AbortSignal.timeout(10000)
    });
    inf('HTTP status: ' + r.status);
    const txt = await r.text();
    inf('Raw response: ' + txt.slice(0, 300));

    if (r.ok) {
      try {
        const d = JSON.parse(txt);
        if (d.apiKeyConfigured === true) {
          ok('Health function works — API key IS configured');
        } else if (d.apiKeyConfigured === false) {
          err('Health function works BUT API key is NOT set');
          warn('Fix: Netlify → Site configuration → Environment variables');
          warn('     Add variable: ANTHROPIC_API_KEY = your key from console.anthropic.com');
          warn('     Then: Deploys → Trigger deploy → Deploy site');
        } else {
          ok('Health function reachable (unexpected response format)');
        }
      } catch {
        warn('Response is not JSON: ' + txt.slice(0, 100));
      }
    } else if (r.status === 404) {
      err('Health function NOT FOUND (404)');
      warn('Fix: Make sure netlify/functions/health.js exists in your GitHub repo');
      warn('     The file must be at: netlify/functions/health.js (not inside public/)');
    } else {
      err('Health function returned error HTTP ' + r.status);
    }
  } catch(e) {
    err('Could not reach health function at all');
    inf('Error: ' + e.message);
    warn('Most likely cause: netlify/functions/health.js is not in your repo');
    warn('Or: Netlify has not redeployed since you added the files');
  }

  // ── TEST 2: analyse function with tiny payload ────────────────────────────
  hdr('TEST 2: Analyse function (small test payload)');
  inf('Calling: /.netlify/functions/analyse');
  inf('Payload: single tiny SQL file');
  try {
    const r = await fetch('/.netlify/functions/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        files: [{
          name: 'test.sql',
          size: 80,
          type: 'text/plain',
          contentSnippet: 'CREATE TABLE customers (id INT PRIMARY KEY, name VARCHAR(100), email VARCHAR(200));'
        }],
        jobName: 'Diagnostic Test',
        targetServer: 'Microsoft SQL Server (on-premises)'
      }),
      signal: AbortSignal.timeout(30000)
    });

    inf('HTTP status: ' + r.status);
    const txt = await r.text();
    inf('Response length: ' + txt.length + ' chars');

    if (r.ok) {
      try {
        const d = JSON.parse(txt);
        if (d.analysis && d.analysis.length > 50) {
          ok('SUCCESS — Analyse function is working correctly!');
          ok('Claude response received (' + d.analysis.length + ' chars)');
          inf('Preview: ' + d.analysis.slice(0, 200) + '…');
          log('\n✓✓✓ EVERYTHING IS WORKING — go back to the dashboard and try uploading a file', 'ok');
        } else {
          warn('Function returned 200 but analysis is empty or very short');
          inf('Response: ' + txt.slice(0, 300));
        }
      } catch {
        warn('Could not parse response as JSON');
        inf('Raw: ' + txt.slice(0, 300));
      }
    } else if (r.status === 404) {
      err('Analyse function NOT FOUND (404)');
      warn('Fix: netlify/functions/analyse.js must be in your GitHub repo');
    } else if (r.status === 500) {
      err('Analyse function error (500)');
      inf('Response: ' + txt.slice(0, 400));
      if (txt.includes('API key') || txt.includes('ANTHROPIC')) {
        warn('→ Root cause: ANTHROPIC_API_KEY not set in Netlify environment variables');
        warn('Fix: Netlify → Site config → Environment variables → Add ANTHROPIC_API_KEY');
        warn('     Then redeploy: Deploys → Trigger deploy → Deploy site');
      }
    } else if (r.status === 401) {
      err('Unauthorised (401) — API key is invalid');
      warn('Fix: Get a fresh API key from https://console.anthropic.com');
      inf('Response: ' + txt.slice(0, 300));
    } else if (r.status === 504 || r.status === 502) {
      err('Gateway timeout — function took too long');
      warn('Fix: Check netlify.toml has: [functions] timeout = 26');
      inf('Response: ' + txt.slice(0, 300));
    } else {
      err('Unexpected status ' + r.status);
      inf('Response: ' + txt.slice(0, 400));
    }
  } catch(e) {
    err('Failed to call analyse function: ' + e.message);
    if (e.name === 'TimeoutError') {
      warn('Request timed out after 30 seconds');
      warn('Fix: Add [functions] timeout = 26 to netlify.toml');
    }
  }

  // ── TEST 3: redirect check ────────────────────────────────────────────────
  hdr('TEST 3: /api/analyse redirect (via netlify.toml)');
  inf('Calling: /api/analyse');
  try {
    const r = await fetch('/api/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: [], jobName: 'redirect-test' }),
      signal: AbortSignal.timeout(8000)
    });
    inf('HTTP status: ' + r.status);
    if (r.status === 400) {
      ok('Redirect working (400 = function reached and rejected empty payload correctly)');
    } else if (r.status === 404) {
      err('Redirect NOT working — /api/analyse returns 404');
      warn('Fix: Make sure netlify.toml is in the ROOT of your repo (not inside public/)');
      warn('     Contents should include:');
      warn('     [[redirects]]');
      warn('       from = "/api/*"');
      warn('       to = "/.netlify/functions/:splat"');
      warn('       status = 200');
    } else if (r.ok || r.status < 500) {
      ok('Redirect working (HTTP ' + r.status + ')');
    } else {
      warn('Redirect responded with HTTP ' + r.status);
    }
  } catch(e) {
    err('Redirect test failed: ' + e.message);
  }

  // ── TEST 4: check what files Netlify sees ────────────────────────────────
  hdr('TEST 4: Environment info');
  inf('window.location.hostname: ' + window.location.hostname);
  inf('Is Netlify: ' + (window.location.hostname.includes('netlify') ? 'YES' : 'UNKNOWN'));
  inf('Protocol: ' + window.location.protocol);

  log('\n─────────────────────────────────────', 'inf');
  log('Diagnostics complete. Share the output above if you need help.', 'warn');

  btn.disabled = false;
  btn.textContent = '▶ Run All Tests Again';
}
</script>
</body>
</html>
